version: 0.2

phases:
  build:
    commands:
      - |
        set -euo pipefail

        : "${APP_NAME:?APP_NAME is required}"
        : "${GITOPS_BRANCH:=main}"

        MANIFEST_PATH="${MANIFEST_PATH:-apps/${APP_NAME}/deployment.yaml}"
        TARGET_CONTAINER="${TARGET_CONTAINER:-${APP_NAME}}"
        CREATE_MANIFESTS="${CREATE_MANIFESTS:-false}"
        MANIFESTS_ONLY="${MANIFESTS_ONLY:-false}"
        K8S_NAMESPACE="${K8S_NAMESPACE:-${APP_NAME}}"
        SERVICE_ACCOUNT_NAME="${SERVICE_ACCOUNT_NAME:-${APP_NAME}}"
        SERVICE_NAME="${SERVICE_NAME:-${APP_NAME}}"
        TARGET_CLUSTER="${TARGET_CLUSTER:-financial-ops-eks}"
        CONTAINER_PORT="${CONTAINER_PORT:-8000}"
        SERVICE_PORT="${SERVICE_PORT:-80}"
        REPLICAS="${REPLICAS:-1}"
        ARGOCD_APPLICATION_NAME="${ARGOCD_APPLICATION_NAME:-${K8S_NAMESPACE}}"
        IMAGE_URI="${IMAGE_URI:-${ECR_REGISTRY:-REPLACE_WITH_ECR_REGISTRY}/${ECR_REPOSITORY:-${APP_NAME}}:${IMAGE_TAG:-latest}}"
        KUBE_CONTEXT="manifest-updater-${OPS_EKS_CLUSTER_NAME}"
        WORKDIR="/tmp/internal-gitops"
        export \
          APP_NAME \
          ARGOCD_APPLICATION_NAME \
          CONTAINER_PORT \
          CREATE_MANIFESTS \
          ECR_REGISTRY \
          ECR_REPOSITORY \
          GITOPS_BRANCH \
          IMAGE_TAG \
          IMAGE_URI \
          K8S_NAMESPACE \
          MANIFEST_PATH \
          MANIFESTS_ONLY \
          REPLICAS \
          SERVICE_ACCOUNT_NAME \
          SERVICE_NAME \
          SERVICE_PORT \
          TARGET_CLUSTER \
          TARGET_CONTAINER

        git config --global user.name "App Deploy Bot"
        git config --global user.email "app-deploy@internal.ops.local"

        aws eks update-kubeconfig \
          --region "${AWS_REGION}" \
          --name "${OPS_EKS_CLUSTER_NAME}" \
          --alias "${KUBE_CONTEXT}"

        kubectl --context "${KUBE_CONTEXT}" \
          -n "${INTERNAL_GIT_NAMESPACE}" \
          port-forward "svc/${INTERNAL_GIT_SERVICE_NAME}" \
          "3000:${INTERNAL_GIT_HTTP_PORT}" \
          >/tmp/internal-git-port-forward.log 2>&1 &
        PORT_FORWARD_PID="$!"
        trap 'kill "${PORT_FORWARD_PID}" >/dev/null 2>&1 || true' EXIT

        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:3000/api/v1/version >/dev/null; then
            break
          fi
          if [ "${i}" -eq 60 ]; then
            cat /tmp/internal-git-port-forward.log || true
            echo "Timed out waiting for internal Git port-forward."
            exit 1
          fi
          sleep 2
        done

        rm -rf "${WORKDIR}"
        git clone \
          "http://${INTERNAL_GIT_USERNAME}:${INTERNAL_GIT_PASSWORD}@127.0.0.1:3000/${INTERNAL_GIT_ORG}/${INTERNAL_GIT_REPO}.git" \
          "${WORKDIR}"
        cd "${WORKDIR}"

        git checkout "${GITOPS_BRANCH}" || git checkout -b "${GITOPS_BRANCH}"
        git pull --rebase origin "${GITOPS_BRANCH}" || true

        cat >/tmp/bulk-update.py <<'PY'
        import json
        import os
        from pathlib import Path
        import yaml

        updates = json.loads(Path("/tmp/bulk-image-updates.json").read_text(encoding="utf-8"))
        ecr_registry = os.environ["ECR_REGISTRY"]
        changed_paths = set()

        def update_kustomize_image(doc, update):
          if not isinstance(doc, dict) or not isinstance(doc.get("images"), list):
            return False

          repository = update["repository"]
          target_container = update["target_container"]
          app_name = update.get("app_name", "")
          image_tag = update["tag"]
          new_name = f"{ecr_registry}/{repository}"
          placeholder_new_name = f"REPLACE_WITH_ECR_REGISTRY/{repository}"
          image_names = {
            value for value in [
              target_container,
              app_name,
              repository,
              new_name,
              placeholder_new_name,
            ] if value
          }

          matched = False
          changed = False
          for image in doc["images"]:
            if not isinstance(image, dict):
              continue
            current_name = image.get("name")
            current_new_name = image.get("newName")
            if (
              image_names
              and current_name not in image_names
              and current_new_name not in {new_name, placeholder_new_name}
            ):
              continue

            matched = True
            if image.get("newName") != new_name:
              image["newName"] = new_name
              changed = True
            if image.get("newTag") != image_tag:
              image["newTag"] = image_tag
              changed = True

          if not matched:
            doc["images"].append({
              "name": target_container,
              "newName": new_name,
              "newTag": image_tag,
            })
            changed = True

          return changed

        def update_container_images(node, update):
          changed = False
          target_container = update["target_container"]
          image_uri = update["uri"]
          if isinstance(node, dict):
            if "containers" in node and isinstance(node["containers"], list):
              for container in node["containers"]:
                if not isinstance(container, dict) or "image" not in container:
                  continue
                if not target_container or container.get("name") == target_container:
                  if container["image"] != image_uri:
                    container["image"] = image_uri
                    changed = True
            for value in node.values():
              changed = update_container_images(value, update) or changed
          elif isinstance(node, list):
            for item in node:
              changed = update_container_images(item, update) or changed
          return changed

        for update in updates:
          manifest_path = Path(update["manifest_path"])
          if not manifest_path.exists():
            raise SystemExit(f"Manifest file not found: {manifest_path}")

          docs = list(yaml.safe_load_all(manifest_path.read_text()))
          changed = False
          for doc in docs:
            changed = update_kustomize_image(doc, update) or changed
            changed = update_container_images(doc, update) or changed

          if changed:
            manifest_path.write_text(
              "---\n".join(yaml.safe_dump(doc, sort_keys=False) for doc in docs)
            )
            changed_paths.add(str(manifest_path))
            print(
              "Updated "
              f"{manifest_path}: {update['target_container']} -> {update['uri']}"
            )
          else:
            print(f"No image change was needed for {update['target_container']}.")

        for update in updates:
          manifest_path = Path(update["manifest_path"])
          expected_new_name = f"{ecr_registry}/{update['repository']}"
          expected_tag = update["tag"]
          target_container = update["target_container"]
          docs = list(yaml.safe_load_all(manifest_path.read_text()))
          for doc in docs:
            if not isinstance(doc, dict):
              continue
            for image in doc.get("images", []) or []:
              if not isinstance(image, dict):
                continue
              if image.get("name") != target_container:
                continue
              if image.get("newName") == expected_new_name and image.get("newTag") == expected_tag:
                print(f"Verified immutable image tag for {target_container}: {expected_tag}")
                break
              raise SystemExit(
                "Image tag verification failed for "
                f"{target_container}: expected {expected_new_name}:{expected_tag}, "
                f"got {image.get('newName')}:{image.get('newTag')}"
              )
            else:
              continue
            break
          else:
            raise SystemExit(f"Image entry not found in {manifest_path}: {target_container}")

        print(f"Bulk MAS image manifest update complete: {len(updates)} images, {len(changed_paths)} files changed.")
        PY

        if [ -n "${BULK_IMAGE_UPDATES_S3_URI:-}" ] || [ -n "${BULK_IMAGE_UPDATES_JSON:-}" ]; then
          if [ -n "${BULK_IMAGE_UPDATES_S3_URI:-}" ]; then
            aws s3 cp "${BULK_IMAGE_UPDATES_S3_URI}" /tmp/bulk-image-updates.json
          else
            printf '%s' "${BULK_IMAGE_UPDATES_JSON}" > /tmp/bulk-image-updates.json
          fi

          python3 /tmp/bulk-update.py

          git diff || true
          git add -A

          if git diff --cached --quiet; then
            echo "Internal Git manifest is already up to date."
            exit 0
          fi

          git commit -m "deploy: bulk MAS image tags"

          for attempt in 1 2 3 4 5; do
            if git push origin "${GITOPS_BRANCH}"; then
              echo "Pushed bulk immutable MAS image tags to internal Git."
              exit 0
            fi

            echo "Git push failed, rebasing on origin/${GITOPS_BRANCH} before retry ${attempt}/5."
            git fetch origin "${GITOPS_BRANCH}"
            if ! git rebase "origin/${GITOPS_BRANCH}"; then
              git rebase --abort || true
              echo "Unable to rebase bulk manifest update."
              exit 1
            fi
          done

          echo "Failed to push bulk manifest update after retries."
          exit 1
        fi

        python3 - <<'PY'
        import os
        from pathlib import Path
        import yaml

        create_manifests = os.environ.get("CREATE_MANIFESTS", "").lower() == "true"
        manifest_path = Path(os.environ["MANIFEST_PATH"])
        target_container = os.environ["TARGET_CONTAINER"]

        if not create_manifests:
          if not manifest_path.exists():
            raise SystemExit(f"Manifest file not found: {manifest_path}")
          raise SystemExit(0)

        app_name = os.environ["APP_NAME"]
        namespace = os.environ["K8S_NAMESPACE"]
        service_account_name = os.environ["SERVICE_ACCOUNT_NAME"]
        service_name = os.environ["SERVICE_NAME"]
        target_cluster = os.environ["TARGET_CLUSTER"]
        container_port = int(os.environ["CONTAINER_PORT"])
        service_port = int(os.environ["SERVICE_PORT"])
        replicas = int(os.environ["REPLICAS"])
        ecr_registry = os.environ.get("ECR_REGISTRY", "REPLACE_WITH_ECR_REGISTRY")
        ecr_repository = os.environ.get("ECR_REPOSITORY", f"financial/mas/{app_name}")
        image_tag = os.environ.get("IMAGE_TAG", "latest") or "latest"
        argocd_application_name = os.environ["ARGOCD_APPLICATION_NAME"]

        app_path = manifest_path.parent
        app_path.mkdir(parents=True, exist_ok=True)

        def write_yaml_if_missing(path, doc):
          if path.exists():
            return False
          path.write_text(yaml.safe_dump(doc, sort_keys=False), encoding="utf-8")
          return True

        def write_yaml_if_changed(path, doc):
          content = yaml.safe_dump(doc, sort_keys=False)
          if path.exists() and path.read_text(encoding="utf-8") == content:
            return False
          path.write_text(content, encoding="utf-8")
          return True

        def load_kustomization():
          if not manifest_path.exists():
            return {
              "apiVersion": "kustomize.config.k8s.io/v1beta1",
              "kind": "Kustomization",
              "resources": [],
              "images": [],
            }
          return yaml.safe_load(manifest_path.read_text(encoding="utf-8")) or {}

        def append_unique(items, value):
          if value not in items:
            items.append(value)
            return True
          return False

        kustomization = load_kustomization()
        resources = kustomization.setdefault("resources", [])
        images = kustomization.setdefault("images", [])
        has_image = any(
          isinstance(image, dict) and image.get("name") == target_container
          for image in images
        )
        changed = False

        namespace_file = "namespace.yaml"
        namespace_doc = {
          "apiVersion": "v1",
          "kind": "Namespace",
          "metadata": {"name": namespace},
        }
        changed |= write_yaml_if_missing(app_path / namespace_file, namespace_doc)
        changed |= append_unique(resources, namespace_file)

        if not has_image:
          serviceaccount_file = f"serviceaccount-{service_account_name}.yaml"
          deployment_file = f"deployment-{app_name}.yaml"
          service_file = f"service-{service_name}.yaml"

          serviceaccount_doc = {
            "apiVersion": "v1",
            "kind": "ServiceAccount",
            "metadata": {
              "name": service_account_name,
              "namespace": namespace,
            },
          }
          changed |= write_yaml_if_missing(app_path / serviceaccount_file, serviceaccount_doc)
          changed |= append_unique(resources, serviceaccount_file)

          labels = {
            "app.kubernetes.io/name": app_name,
            "app.kubernetes.io/part-of": namespace,
          }
          deployment_doc = {
            "apiVersion": "apps/v1",
            "kind": "Deployment",
            "metadata": {
              "name": app_name,
              "namespace": namespace,
              "labels": labels,
            },
            "spec": {
              "replicas": replicas,
              "selector": {"matchLabels": {"app.kubernetes.io/name": app_name}},
              "template": {
                "metadata": {"labels": labels},
                "spec": {
                  "serviceAccountName": service_account_name,
                  "containers": [{
                    "name": app_name,
                    "image": target_container,
                    "imagePullPolicy": "Always",
                    "ports": [{
                      "name": "http",
                      "containerPort": container_port,
                    }],
                    "readinessProbe": {
                      "httpGet": {"path": "/health", "port": "http"},
                      "initialDelaySeconds": 5,
                      "periodSeconds": 10,
                    },
                    "livenessProbe": {
                      "httpGet": {"path": "/health", "port": "http"},
                      "initialDelaySeconds": 15,
                      "periodSeconds": 20,
                    },
                    "resources": {
                      "requests": {"cpu": "100m", "memory": "128Mi"},
                      "limits": {"cpu": "500m", "memory": "512Mi"},
                    },
                  }],
                },
              },
            },
          }
          changed |= write_yaml_if_missing(app_path / deployment_file, deployment_doc)
          changed |= append_unique(resources, deployment_file)

          service_doc = {
            "apiVersion": "v1",
            "kind": "Service",
            "metadata": {
              "name": service_name,
              "namespace": namespace,
              "labels": labels,
            },
            "spec": {
              "type": "ClusterIP",
              "selector": {"app.kubernetes.io/name": app_name},
              "ports": [{
                "name": "http",
                "port": service_port,
                "targetPort": "http",
              }],
            },
          }
          changed |= write_yaml_if_missing(app_path / service_file, service_doc)
          changed |= append_unique(resources, service_file)

          images.append({
            "name": target_container,
            "newName": f"{ecr_registry}/{ecr_repository}",
            "newTag": image_tag,
          })
          changed = True

        manifest_path.write_text(
          yaml.safe_dump(kustomization, sort_keys=False),
          encoding="utf-8",
        )

        applications_dir = Path("applications")
        applications_dir.mkdir(exist_ok=True)
        mas_project_file = applications_dir / "mas-workloads-project.yaml"
        mas_project_doc = {
          "apiVersion": "argoproj.io/v1alpha1",
          "kind": "AppProject",
          "metadata": {
            "name": "mas-workloads-project",
            "namespace": "argocd",
          },
          "spec": {
            "description": "MAS application workloads",
            "sourceRepos": [
              "http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git",
            ],
            "destinations": [{
              "namespace": "*mas*",
              "server": "https://kubernetes.default.svc",
            }],
            "clusterResourceWhitelist": [{
              "group": "",
              "kind": "Namespace",
            }],
            "namespaceResourceWhitelist": [
              {"group": "apps", "kind": "Deployment"},
              {"group": "", "kind": "Service"},
              {"group": "", "kind": "ConfigMap"},
              {"group": "", "kind": "Secret"},
              {"group": "", "kind": "ServiceAccount"},
              {"group": "external-secrets.io", "kind": "ExternalSecret"},
              {"group": "rbac.authorization.k8s.io", "kind": "Role"},
              {"group": "rbac.authorization.k8s.io", "kind": "RoleBinding"},
            ],
          },
        }
        changed |= write_yaml_if_changed(mas_project_file, mas_project_doc)

        application_file = applications_dir / f"{argocd_application_name}.yaml"
        if target_cluster == "financial-ops-eks":
          destination = {
            "server": "https://kubernetes.default.svc",
            "namespace": namespace,
          }
        else:
          destination = {
            "name": target_cluster,
            "namespace": namespace,
          }

        application_doc = {
          "apiVersion": "argoproj.io/v1alpha1",
          "kind": "Application",
          "metadata": {
            "name": argocd_application_name,
            "namespace": "argocd",
          },
          "spec": {
            "project": "mas-workloads-project",
            "source": {
              "repoURL": "http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git",
              "targetRevision": os.environ.get("GITOPS_BRANCH", "main"),
              "path": str(app_path).replace("\\", "/"),
              "kustomize": {},
            },
            "destination": destination,
            "syncPolicy": {
              "automated": {
                "prune": True,
                "selfHeal": True,
              },
              "syncOptions": ["CreateNamespace=true"],
            },
          },
        }
        changed |= write_yaml_if_missing(application_file, application_doc)

        if changed:
          print(f"Created or updated generated manifests for {app_name}")
        else:
          print(f"Generated manifests already exist for {app_name}")
        PY

        python3 - <<'PY'
        import os
        from pathlib import Path
        import yaml

        manifest_path = Path(os.environ["MANIFEST_PATH"])
        manifests_only = os.environ.get("MANIFESTS_ONLY", "").lower() == "true"
        image_uri = os.environ["IMAGE_URI"]
        image_tag = os.environ.get("IMAGE_TAG", "")
        ecr_registry = os.environ.get("ECR_REGISTRY", "")
        ecr_repository = os.environ.get("ECR_REPOSITORY", "")
        target_container = os.environ.get("TARGET_CONTAINER", "")
        app_name = os.environ.get("APP_NAME", "")

        if manifests_only:
          print("Skipping image update because MANIFESTS_ONLY=true.")
          raise SystemExit(0)

        docs = list(yaml.safe_load_all(manifest_path.read_text()))
        changed = False

        def update_kustomize_image(doc):
          global changed
          if not isinstance(doc, dict) or not isinstance(doc.get("images"), list):
            return

          matched = False
          new_name = f"{ecr_registry}/{ecr_repository}" if ecr_registry and ecr_repository else None
          placeholder_new_name = (
            f"REPLACE_WITH_ECR_REGISTRY/{ecr_repository}"
            if ecr_repository
            else None
          )
          image_names = {
            value for value in [
              target_container,
              app_name,
              ecr_repository,
              new_name,
              placeholder_new_name,
            ] if value
          }

          for image in doc["images"]:
            if not isinstance(image, dict):
              continue
            current_name = image.get("name")
            current_new_name = image.get("newName")
            if (
              image_names
              and current_name not in image_names
              and current_new_name not in {new_name, placeholder_new_name}
            ):
              continue

            matched = True
            if new_name and image.get("newName") != new_name:
              image["newName"] = new_name
              changed = True
            if image_tag and image.get("newTag") != image_tag:
              image["newTag"] = image_tag
              changed = True

          if not matched and new_name and image_tag and target_container:
            doc["images"].append({
              "name": target_container,
              "newName": new_name,
              "newTag": image_tag,
            })
            changed = True

        def visit(node):
          global changed
          if isinstance(node, dict):
            if "containers" in node and isinstance(node["containers"], list):
              for container in node["containers"]:
                if not isinstance(container, dict) or "image" not in container:
                  continue
                if not target_container or container.get("name") == target_container:
                  if container["image"] != image_uri:
                    container["image"] = image_uri
                    changed = True
            for value in node.values():
              visit(value)
          elif isinstance(node, list):
            for item in node:
              visit(item)

        for doc in docs:
          update_kustomize_image(doc)
          visit(doc)

        if not changed:
          print("No image change was needed.")
        else:
          manifest_path.write_text(
            "---\n".join(yaml.safe_dump(doc, sort_keys=False) for doc in docs)
          )
          print(f"Updated {manifest_path} to {image_uri}")
        PY

        python3 - <<'PY'
        import os
        from pathlib import Path
        import yaml

        manifests_only = os.environ.get("MANIFESTS_ONLY", "").lower() == "true"
        if manifests_only:
          raise SystemExit(0)

        manifest_path = Path(os.environ["MANIFEST_PATH"])
        image_tag = os.environ.get("IMAGE_TAG", "")
        ecr_registry = os.environ.get("ECR_REGISTRY", "")
        ecr_repository = os.environ.get("ECR_REPOSITORY", "")
        target_container = os.environ.get("TARGET_CONTAINER", "")
        expected_new_name = f"{ecr_registry}/{ecr_repository}"

        docs = list(yaml.safe_load_all(manifest_path.read_text()))
        for doc in docs:
          if not isinstance(doc, dict):
            continue
          for image in doc.get("images", []) or []:
            if not isinstance(image, dict):
              continue
            if image.get("name") != target_container:
              continue
            actual_new_name = image.get("newName")
            actual_new_tag = image.get("newTag")
            if actual_new_name == expected_new_name and actual_new_tag == image_tag:
              print(f"Verified immutable image tag for {target_container}: {actual_new_tag}")
