version: 0.2

phases:
  build:
    commands:
      - |
        set -euo pipefail

        : "${AWS_REGION:?AWS_REGION is required}"
        : "${OPS_EKS_CLUSTER_NAME:?OPS_EKS_CLUSTER_NAME is required}"
        : "${SERVICE_EKS_CLUSTER_NAME:?SERVICE_EKS_CLUSTER_NAME is required}"

        OPS_CONTEXT="status-${OPS_EKS_CLUSTER_NAME}"
        SERVICE_CONTEXT="status-${SERVICE_EKS_CLUSTER_NAME}"

        section() {
          printf '\n===== %s =====\n' "$1"
        }

        run_check() {
          local title="$1"
          shift
          section "${title}"
          "$@" || true
        }

        aws eks update-kubeconfig \
          --region "${AWS_REGION}" \
          --name "${OPS_EKS_CLUSTER_NAME}" \
          --alias "${OPS_CONTEXT}"

        aws eks update-kubeconfig \
          --region "${AWS_REGION}" \
          --name "${SERVICE_EKS_CLUSTER_NAME}" \
          --alias "${SERVICE_CONTEXT}"

        run_check "Ops cluster nodes" \
          kubectl --context "${OPS_CONTEXT}" get nodes -o wide
        run_check "Service cluster nodes" \
          kubectl --context "${SERVICE_CONTEXT}" get nodes -o wide

        run_check "Ops core pods" \
          kubectl --context "${OPS_CONTEXT}" get pods -n kube-system -o wide
        run_check "Service core pods" \
          kubectl --context "${SERVICE_CONTEXT}" get pods -n kube-system -o wide

        run_check "Ops Istio pods" \
          kubectl --context "${OPS_CONTEXT}" get pods -n istio-system -o wide
        run_check "Service Istio pods" \
          kubectl --context "${SERVICE_CONTEXT}" get pods -n istio-system -o wide

        run_check "Internal Git pods and service" \
          kubectl --context "${OPS_CONTEXT}" -n git get deploy,svc,pods -o wide

        run_check "Argo CD pods and services" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get deploy,sts,svc,pods -o wide

        run_check "Prometheus pods and services" \
          kubectl --context "${OPS_CONTEXT}" -n monitoring get deploy,sts,svc,pods -o wide

        run_check "Argo CD applications" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get applications.argoproj.io -o wide

        run_check "Demo app workloads" \
          kubectl --context "${SERVICE_CONTEXT}" -n service-apps get deploy,svc,pods -o wide

        run_check "Argo CD demo-app details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application demo-app

        section "Rollout checks"
        for item in \
          "${OPS_CONTEXT}:argocd:deployment/argocd-server" \
          "${OPS_CONTEXT}:git:deployment/internal-git" \
          "${SERVICE_CONTEXT}:istio-system:deployment/istiod" \
          "${OPS_CONTEXT}:istio-system:deployment/istiod" \
          "${SERVICE_CONTEXT}:service-apps:deployment/postgres" \
          "${SERVICE_CONTEXT}:service-apps:deployment/backend" \
          "${SERVICE_CONTEXT}:service-apps:deployment/frontend"; do
          IFS=: read -r context namespace resource <<<"${item}"
          echo "--- ${context} ${namespace} ${resource}"
          kubectl --context "${context}" -n "${namespace}" rollout status "${resource}" --timeout=120s || true
        done

        section "Recent warning events"
        kubectl --context "${OPS_CONTEXT}" get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -80 || true
        kubectl --context "${SERVICE_CONTEXT}" get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -80 || true
