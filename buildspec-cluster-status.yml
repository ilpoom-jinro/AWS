version: 0.2

phases:
  build:
    commands:
      - |
        set -euo pipefail

        : "${AWS_REGION:?AWS_REGION is required}"
        : "${OPS_EKS_CLUSTER_NAME:?OPS_EKS_CLUSTER_NAME is required}"

        OPS_CONTEXT="status-${OPS_EKS_CLUSTER_NAME}"
        OBSERVABILITY_NAMESPACE="${OBSERVABILITY_NAMESPACE:-observability}"

        export OPS_CONTEXT
        export OBSERVABILITY_NAMESPACE

        section() {
          printf '\n===== %s =====\n' "$1"
        }

        run_check() {
          local title="$1"
          shift
          section "${title}"
          "$@" || true
        }

        aws eks update-kubeconfig \
          --region "${AWS_REGION}" \
          --name "${OPS_EKS_CLUSTER_NAME}" \
          --alias "${OPS_CONTEXT}"

        run_check "Ops EKS control plane version" \
          aws eks describe-cluster \
            --region "${AWS_REGION}" \
            --name "${OPS_EKS_CLUSTER_NAME}" \
            --query 'cluster.{name:name,version:version,platformVersion:platformVersion,status:status,endpoint:endpoint}' \
            --output table

        run_check "Ops Kubernetes API server version" \
          kubectl --context "${OPS_CONTEXT}" version -o yaml

        run_check "Ops cluster nodes" \
          kubectl --context "${OPS_CONTEXT}" get nodes -o wide

        run_check "Ops core pods" \
          kubectl --context "${OPS_CONTEXT}" get pods -n kube-system -o wide

        run_check "Internal Git pods and service" \
          kubectl --context "${OPS_CONTEXT}" -n git get deploy,svc,pods -o wide

        run_check "Argo CD pods and services" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get deploy,sts,svc,pods -o wide

        run_check "Argo CD applications" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get applications.argoproj.io -o wide

        run_check "Argo CD registered clusters" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get secret \
            -l argocd.argoproj.io/secret-type=cluster \
            -o custom-columns='SECRET:.metadata.name,CLUSTER_NAME:.data.name,SERVER:.data.server'

        run_check "Argo CD registered cluster names decoded" \
          bash -c '
            for secret in $(kubectl --context "${OPS_CONTEXT}" -n argocd get secret \
              -l argocd.argoproj.io/secret-type=cluster \
              -o jsonpath="{.items[*].metadata.name}"); do
              echo
              echo "Secret: $secret"
              echo -n "name: "
              kubectl --context "${OPS_CONTEXT}" -n argocd get secret "$secret" \
                -o jsonpath="{.data.name}" | base64 -d || true
              echo
              echo -n "server: "
              kubectl --context "${OPS_CONTEXT}" -n argocd get secret "$secret" \
                -o jsonpath="{.data.server}" | base64 -d || true
              echo
              echo "---"
            done
          '

        run_check "Argo CD platform-applications details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application platform-applications

        run_check "Argo CD repository secrets" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get secret \
            -l argocd.argoproj.io/secret-type=repository

        run_check "Argo CD repository URLs" \
          bash -c '
            for secret in $(kubectl --context "${OPS_CONTEXT}" -n argocd get secret \
              -l argocd.argoproj.io/secret-type=repository \
              -o jsonpath="{.items[*].metadata.name}"); do
              echo
              echo "Secret: $secret"
              kubectl --context "${OPS_CONTEXT}" -n argocd get secret "$secret" \
                -o jsonpath="{.data.url}" | base64 -d || true
              echo
              echo "---"
            done
          '

        run_check "Argo CD repository auth fields" \
          bash -c '
            SECRET=internal-gitops

            echo "Username:"
            kubectl --context "${OPS_CONTEXT}" -n argocd get secret "$SECRET" \
              -o jsonpath="{.data.username}" | base64 -d || true
            echo

            echo "Password/token length:"
            kubectl --context "${OPS_CONTEXT}" -n argocd get secret "$SECRET" \
              -o jsonpath="{.data.password}" | base64 -d | wc -c || true
          '

        run_check "Internal Gitea platform repo check - old path" \
          kubectl --context "${OPS_CONTEXT}" -n git exec deploy/internal-git -- \
            sh -c 'ls -al /data/git/repositories/gitadmin || true'

        run_check "Internal Gitea platform repo check - var lib path" \
          kubectl --context "${OPS_CONTEXT}" -n git exec deploy/internal-git -- \
            sh -c 'find /var/lib/gitea -name "platform.git" -o -name "*.git" 2>/dev/null | head -50'

        run_check "Gitea data path" \
          kubectl --context "${OPS_CONTEXT}" -n git exec deploy/internal-git -- \
            sh -c 'pwd; ls -al / || true; ls -al /data || true; ls -al /var/lib || true; ls -al /var/lib/gitea || true'

        run_check "Gitea app.ini" \
          kubectl --context "${OPS_CONTEXT}" -n git exec deploy/internal-git -- \
            sh -c 'find / -name app.ini 2>/dev/null'

        run_check "Service demo deployment images" \
          bash -c '
            aws eks update-kubeconfig --region "${AWS_REGION}" --name financial-service-eks --alias financial-service-eks
            kubectl --context financial-service-eks -n stock-demo get deploy stock-api stock-web \
              -o custom-columns=NAME:.metadata.name,IMAGE:.spec.template.spec.containers[*].image
          '

        run_check "All namespaces" \
          kubectl --context "${OPS_CONTEXT}" get ns

        run_check "Argo CD observability applications" \
          bash -c '
            kubectl --context "${OPS_CONTEXT}" -n argocd get applications.argoproj.io | grep observability || true
          '

        run_check "Observability service names and NLB hostnames" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get svc \
            -o custom-columns='NAME:.metadata.name,TYPE:.spec.type,PORTS:.spec.ports[*].port,NLB:.status.loadBalancer.ingress[*].hostname'

        run_check "Argo CD service-demo-app details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application service-demo-app

        run_check "Observability Argo CD applications by label" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get applications.argoproj.io \
            -l app.kubernetes.io/part-of=observability -o wide

        run_check "Observability Argo CD applications by name" \
          kubectl --context "${OPS_CONTEXT}" -n argocd get applications.argoproj.io \
            aws-load-balancer-controller \
            observability-loki \
            observability-thanos \
            observability-grafana \
            observability-alloy-ops \
            observability-alloy-service \
            observability-alertmanager \
            observability-indexer \
            -o wide

        run_check "Argo CD observability-loki details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application observability-loki

        run_check "Argo CD observability-thanos details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application observability-thanos

        run_check "Argo CD observability-grafana details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application observability-grafana

        run_check "Argo CD aws-load-balancer-controller details" \
          kubectl --context "${OPS_CONTEXT}" -n argocd describe application aws-load-balancer-controller

        run_check "AWS Load Balancer Controller pods" \
          kubectl --context "${OPS_CONTEXT}" get pods -A -o wide \
            -l app.kubernetes.io/name=aws-load-balancer-controller

        run_check "Observability namespace resources" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get all -o wide

        run_check "Observability PVC" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get pvc

        run_check "Observability services and NLB endpoints" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get svc -o wide

        run_check "Prometheus/Alloy pods" \
          bash -c '
            kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get pods -o wide | egrep "prometheus|alloy" || true
          '

        run_check "Thanos Receive pod status" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get pod observability-thanos-receive-0 -o wide

        run_check "Loki pod status" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get pod observability-loki-0 -o wide

        run_check "Expected Loki and Thanos Receive service DNS names" \
          bash -c '
            echo "Loki service hostname:"
            kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" \
              get svc observability-loki \
              -o jsonpath="{.status.loadBalancer.ingress[0].hostname}{\"\n\"}" || true

            echo "Thanos Receive service hostname:"
            kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" \
              get svc observability-thanos-receive \
              -o jsonpath="{.status.loadBalancer.ingress[0].hostname}{\"\n\"}" || true
          '

        run_check "Expected Loki service detail" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" describe svc observability-loki

        run_check "Expected Thanos Receive service detail" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" describe svc observability-thanos-receive

        run_check "Loki pod describe" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" describe pod observability-loki-0

        run_check "Thanos Receive recent logs" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" logs observability-thanos-receive-0 --tail=200

        run_check "Loki current logs" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" logs observability-loki-0 --tail=200

        run_check "Loki previous logs" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" logs observability-loki-0 --previous --tail=200

        run_check "Thanos Receive previous logs" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" logs observability-thanos-receive-0 --previous --tail=200

        run_check "Loki config secret" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get secret \
            -l app.kubernetes.io/name=loki

        run_check "Loki configmap" \
          bash -c '
            kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get cm | grep loki || true
          '

        run_check "Loki rendered config" \
          bash -c '
            POD=$(kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get pod \
              -l app.kubernetes.io/name=loki \
              -o jsonpath="{.items[0].metadata.name}" 2>/dev/null || true)

            if [ -z "$POD" ]; then
              echo "No Loki pod found"
              exit 0
            fi

            kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" exec "$POD" -- \
              cat /etc/loki/config/config.yaml || true
          '

        run_check "Loki StatefulSet" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get sts observability-loki -o yaml

        run_check "Observability endpoints" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get endpoints -o wide

        run_check "Observability warning events" \
          kubectl --context "${OPS_CONTEXT}" -n "${OBSERVABILITY_NAMESPACE}" get events --sort-by=.lastTimestamp

        section "Rollout checks"
        for item in \
          "${OPS_CONTEXT}:argocd:deployment/argocd-server" \
          "${OPS_CONTEXT}:git:deployment/internal-git" \
          "${OPS_CONTEXT}:istio-system:deployment/istiod"; do
          IFS=: read -r context namespace resource <<<"${item}"
          echo "--- ${context} ${namespace} ${resource}"
          kubectl --context "${context}" -n "${namespace}" rollout status "${resource}" --timeout=120s || true
        done

        section "Recent warning events"
        kubectl --context "${OPS_CONTEXT}" get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -80 || true
