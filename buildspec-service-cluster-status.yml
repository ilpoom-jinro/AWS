version: 0.2

phases:
  build:
    commands:
      - |
        set -euo pipefail

        : "${AWS_REGION:?AWS_REGION is required}"
        : "${SERVICE_EKS_CLUSTER_NAME:?SERVICE_EKS_CLUSTER_NAME is required}"

        SERVICE_CONTEXT="status-${SERVICE_EKS_CLUSTER_NAME}"

        section() {
          printf '\n===== %s =====\n' "$1"
        }

        run_check() {
          local title="$1"
          shift
          section "${title}"
          "$@" || true
        }

        aws eks update-kubeconfig \
          --region "${AWS_REGION}" \
          --name "${SERVICE_EKS_CLUSTER_NAME}" \
          --alias "${SERVICE_CONTEXT}"

        run_check "Service EKS control plane version" \
          aws eks describe-cluster \
            --region "${AWS_REGION}" \
            --name "${SERVICE_EKS_CLUSTER_NAME}" \
            --query 'cluster.{name:name,version:version,platformVersion:platformVersion,status:status,endpoint:endpoint}' \
            --output table

        run_check "Service Kubernetes API server version" \
          kubectl --context "${SERVICE_CONTEXT}" version -o yaml

        run_check "Service cluster nodes" \
          kubectl --context "${SERVICE_CONTEXT}" get nodes -o wide

        run_check "Service core pods" \
          kubectl --context "${SERVICE_CONTEXT}" get pods -n kube-system -o wide

        run_check "Service Istio pods" \
          kubectl --context "${SERVICE_CONTEXT}" get pods -n istio-system -o wide

        run_check "Demo app workloads" \
          kubectl --context "${SERVICE_CONTEXT}" -n stock-demo get deploy,svc,pods -o wide

        run_check "Backend deployment details" \
          kubectl --context "${SERVICE_CONTEXT}" -n stock-demo describe deployment/stock-api

        run_check "Backend pod details" \
          kubectl --context "${SERVICE_CONTEXT}" -n stock-demo describe pod -l app=stock-api

        run_check "Backend previous logs" \
          kubectl --context "${SERVICE_CONTEXT}" -n stock-demo logs -l app=stock-api --previous --tail=200

        run_check "Backend current logs" \
          kubectl --context "${SERVICE_CONTEXT}" -n stock-demo logs -l app=stock-api --tail=200

        run_check "Frontend LoadBalancer endpoint" \
          kubectl --context "${SERVICE_CONTEXT}" -n stock-demo get svc stock-web \
            -o jsonpath='{.status.loadBalancer.ingress[*].hostname}{"\n"}'

        run_check "Service observability namespace resources" \
          kubectl --context "${SERVICE_CONTEXT}" -n observability get all -o wide

        run_check "Service Alloy pods" \
          kubectl --context "${SERVICE_CONTEXT}" -n observability get pods -o wide -l app.kubernetes.io/name=alloy

        run_check "Service Alloy configmaps" \
          kubectl --context "${SERVICE_CONTEXT}" -n observability get configmap -o wide

        run_check "Service Alloy logs" \
          kubectl --context "${SERVICE_CONTEXT}" -n observability logs -l app.kubernetes.io/name=alloy --tail=200

        run_check "Service Alloy previous logs" \
          kubectl --context "${SERVICE_CONTEXT}" -n observability logs -l app.kubernetes.io/name=alloy --previous --tail=200

        run_check "Service observability warning events" \
          kubectl --context "${SERVICE_CONTEXT}" -n observability get events --sort-by=.lastTimestamp

        section "Rollout checks"
        for item in \
          "istio-system:deployment/istiod" \
          "stock-demo:deployment/stock-api" \
          "stock-demo:deployment/stock-web"; do
          IFS=: read -r namespace resource <<<"${item}"
          echo "--- ${namespace} ${resource}"
          kubectl --context "${SERVICE_CONTEXT}" -n "${namespace}" rollout status "${resource}" --timeout=120s || true
        done

        section "Recent warning events"
        kubectl --context "${SERVICE_CONTEXT}" get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -80 || true
