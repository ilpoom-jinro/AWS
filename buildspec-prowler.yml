version: 0.2
phases:
  build:
    commands:
      # 진단: prowler 실행 파일이 이미지 어디에 있는지, 어떻게 호출되는지 확인
      - echo "PATH=$PATH"
      - which prowler || echo "not in PATH"
      - find / -name "prowler" -type f 2>/dev/null || echo "no prowler file"
      - python3 -m prowler --version 2>/dev/null || echo "python module fail"
      - pipx list 2>/dev/null || echo "no pipx"
