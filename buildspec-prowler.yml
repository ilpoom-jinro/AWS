version: 0.2
phases:
  install:
    commands:
      # prowler 공식 이미지엔 awscli가 없음 → S3 업로드용으로 설치 (root 경고 억제)
      - pip install awscli --quiet --root-user-action=ignore || pip3 install awscli --quiet --root-user-action=ignore
  build:
    commands:
      # prowler는 이미지의 venv 안에 있고 PATH에 없음 → 절대경로 호출
      # OCSF 포함 3종을 로컬에 출력. -z: FAIL 있어도 exit 3 무시(빌드 성공 처리)
      - /home/prowler/.venv/bin/prowler aws --compliance kisa_isms_p_2023_korean_aws -f ap-northeast-2 -M csv json-ocsf html --output-directory /tmp/prowler-out -z
      # .ocsf.json → ${date}/ocsf/  : Athena prowler 테이블 스캔 대상 (siem-athena.tf storage.location.template)
      - aws s3 cp /tmp/prowler-out/ "s3://financial-prowler-findings-${ACCOUNT_ID}/$(date +%Y-%m-%d)/ocsf/" --recursive --exclude "*" --include "*.ocsf.json"
      # 나머지(csv/html/compliance/*.csv) → ${date}/reports/ : 감사 증적 보존, Athena 스캔 범위 밖
      - aws s3 cp /tmp/prowler-out/ "s3://financial-prowler-findings-${ACCOUNT_ID}/$(date +%Y-%m-%d)/reports/" --recursive --exclude "*.ocsf.json"
