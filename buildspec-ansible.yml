version: 0.2

phases:
  build:
    commands:
      - cd /workspace/ansible
      - |
        ansible-playbook -i inventory/hosts.yml -e @group_vars/all.yml playbooks/site.yml || {
          echo "Ansible failed. Collecting cluster diagnostics..."
          aws eks update-kubeconfig --region ap-northeast-2 --name financial-service-eks --alias financial-service-eks || true
          kubectl --context financial-service-eks get nodes -o wide || true
          kubectl --context financial-service-eks get pods -A -o wide || true
          kubectl --context financial-service-eks get events -A --sort-by=.lastTimestamp | tail -100 || true
          aws eks update-kubeconfig --region ap-northeast-2 --name financial-ops-eks --alias financial-ops-eks || true
          kubectl --context financial-ops-eks get nodes -o wide || true
          kubectl --context financial-ops-eks get pods -A -o wide || true
          kubectl --context financial-ops-eks get events -A --sort-by=.lastTimestamp | tail -100 || true
          kubectl --context financial-ops-eks get pods -n temporal-system -o wide || true
          kubectl --context financial-ops-eks get pods -n mas -o wide || true
          exit 1
        }
      - aws eks update-kubeconfig --region ap-northeast-2 --name financial-service-eks --alias financial-service-eks
      - kubectl --context financial-service-eks get pods -n service-apps -o wide || true
      - kubectl --context financial-service-eks get deploy,svc -n service-apps || true
      - aws eks update-kubeconfig --region ap-northeast-2 --name financial-ops-eks --alias financial-ops-eks
      - kubectl --context financial-ops-eks get pods -n monitoring -o wide || true
      - kubectl --context financial-ops-eks get pods -n temporal-system -o wide || true
      - kubectl --context financial-ops-eks get pods -n mas -o wide || true
      - kubectl --context financial-ops-eks get applications.argoproj.io -n argocd || true
