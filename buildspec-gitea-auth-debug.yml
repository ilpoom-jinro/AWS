version: 0.2

phases:
  build:
    commands:
      - |
        set -euo pipefail

        : "${AWS_REGION:?AWS_REGION is required}"
        : "${OPS_EKS_CLUSTER_NAME:?OPS_EKS_CLUSTER_NAME is required}"
        : "${INTERNAL_GIT_ADMIN_USERNAME:?INTERNAL_GIT_ADMIN_USERNAME is required}"
        : "${INTERNAL_GIT_ADMIN_PASSWORD:?INTERNAL_GIT_ADMIN_PASSWORD is required}"

        OPS_CONTEXT="gitea-auth-debug-${OPS_EKS_CLUSTER_NAME}"
        GIT_NAMESPACE="${GIT_NAMESPACE:-git}"
        GIT_DEPLOYMENT="${GIT_DEPLOYMENT:-internal-git}"
        GIT_SERVICE="${GIT_SERVICE:-internal-git-http}"
        GIT_SERVICE_PORT="${GIT_SERVICE_PORT:-3000}"
        LOCAL_PORT="${LOCAL_PORT:-13010}"

        section() {
          printf '\n===== %s =====\n' "$1"
        }

        run_check() {
          local title="$1"
          shift
          section "${title}"
          "$@" || true
        }

        aws eks update-kubeconfig \
          --region "${AWS_REGION}" \
          --name "${OPS_EKS_CLUSTER_NAME}" \
          --alias "${OPS_CONTEXT}"

        run_check "Internal Git workload status" \
          kubectl --context "${OPS_CONTEXT}" -n "${GIT_NAMESPACE}" get deploy,svc,pods -o wide

        run_check "Gitea app.ini location" \
          kubectl --context "${OPS_CONTEXT}" -n "${GIT_NAMESPACE}" exec deploy/"${GIT_DEPLOYMENT}" -- \
            sh -c 'find / -name app.ini 2>/dev/null'

        run_check "Gitea Basic Auth related config" \
          kubectl --context "${OPS_CONTEXT}" -n "${GIT_NAMESPACE}" exec deploy/"${GIT_DEPLOYMENT}" -- \
            sh -c 'grep -nE "^\[(api|service|security)\]|ENABLE_BASIC_AUTHENTICATION|REQUIRE_SIGNIN_VIEW|DISABLE_REGISTRATION|INSTALL_LOCK" /etc/gitea/app.ini || true'

        run_check "Gitea admin user list" \
          kubectl --context "${OPS_CONTEXT}" -n "${GIT_NAMESPACE}" exec deploy/"${GIT_DEPLOYMENT}" -- \
            gitea admin user list --config /etc/gitea/app.ini

        section "CodeBuild credential summary"
        echo "INTERNAL_GIT_ADMIN_USERNAME=${INTERNAL_GIT_ADMIN_USERNAME}"
        echo "INTERNAL_GIT_ADMIN_PASSWORD length=$(printf '%s' "${INTERNAL_GIT_ADMIN_PASSWORD}" | wc -c)"

        section "Start port-forward"
        rm -f /tmp/gitea-auth-debug-port-forward.log
        kubectl --context "${OPS_CONTEXT}" -n "${GIT_NAMESPACE}" \
          port-forward svc/"${GIT_SERVICE}" "${LOCAL_PORT}:${GIT_SERVICE_PORT}" \
          >/tmp/gitea-auth-debug-port-forward.log 2>&1 &
        PORT_FORWARD_PID="$!"
        trap 'kill "${PORT_FORWARD_PID}" >/dev/null 2>&1 || true' EXIT

        for i in $(seq 1 30); do
          if curl -fsS "http://127.0.0.1:${LOCAL_PORT}/api/v1/version" >/dev/null; then
            break
          fi
          sleep 1
        done

        run_check "Port-forward log" \
          cat /tmp/gitea-auth-debug-port-forward.log

        run_check "Gitea version API" \
          curl -i "http://127.0.0.1:${LOCAL_PORT}/api/v1/version"

        section "Gitea /api/v1/user Basic Auth status"
        USER_STATUS="$(
          curl -sS -o /tmp/gitea-user-response.json -w "%{http_code}" \
            -u "${INTERNAL_GIT_ADMIN_USERNAME}:${INTERNAL_GIT_ADMIN_PASSWORD}" \
            "http://127.0.0.1:${LOCAL_PORT}/api/v1/user" || true
        )"
        echo "status=${USER_STATUS}"
        sed -E 's/"(password|passwd|token|access_token|refresh_token)"[[:space:]]*:[[:space:]]*"[^"]*"/"\1":"<redacted>"/g' \
          /tmp/gitea-user-response.json || true

        section "Gitea /api/v1/user/repos Basic Auth status"
        REPOS_STATUS="$(
          curl -sS -o /tmp/gitea-user-repos-response.json -w "%{http_code}" \
            -u "${INTERNAL_GIT_ADMIN_USERNAME}:${INTERNAL_GIT_ADMIN_PASSWORD}" \
            "http://127.0.0.1:${LOCAL_PORT}/api/v1/user/repos" || true
        )"
        echo "status=${REPOS_STATUS}"
        sed -E 's/"(password|passwd|token|access_token|refresh_token)"[[:space:]]*:[[:space:]]*"[^"]*"/"\1":"<redacted>"/g' \
          /tmp/gitea-user-repos-response.json || true
