name: PR 후 자동 Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  TF_VAR_dev_mode: "true"   # 개발 완료 후 이 줄 삭제

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform-related changes
        id: changes
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed=$(git diff --name-only FETCH_HEAD HEAD)
          echo "${changed}"
          if echo "${changed}" | grep -qE '\.tf$|\.terraform\.lock\.hcl$|^ansible/|^gitops/|^buildspec-ansible\.yml$|^buildspec-gitops-bootstrap\.yml$|^tools/|^\.github/workflows/terraform-operations\.yml$'; then
            echo "tf=true" >> "${GITHUB_OUTPUT}"
          else
            echo "tf=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip — no Terraform changes
        if: steps.changes.outputs.tf == 'false'
        run: echo "No Terraform-related files changed. Skipping plan."

      - name: Configure AWS credentials
        if: steps.changes.outputs.tf == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.changes.outputs.tf == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.changes.outputs.tf == 'true'
        run: terraform init -reconfigure

      - name: Remove legacy CodeCommit state
        if: steps.changes.outputs.tf == 'true'
        shell: bash
        run: |
          mapfile -t codecommit_state < <(terraform state list | grep 'aws_codecommit' || true)
          if [ "${#codecommit_state[@]}" -gt 0 ]; then
            terraform state rm "${codecommit_state[@]}"
          fi

      - name: Terraform Format Check
        if: steps.changes.outputs.tf == 'true'
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: steps.changes.outputs.tf == 'true'
        run: terraform validate -no-color

      - name: Terraform Plan
        if: steps.changes.outputs.tf == 'true'
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -out=tfplan
          exitcode=$?
          echo "exitcode=${exitcode}" >> "${GITHUB_OUTPUT}"

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Terraform plan failed. Check the Terraform Plan step logs for the error details."
            exit 1
          fi

          exit 0

      - name: Upload Terraform Plan
        if: steps.changes.outputs.tf == 'true' && (steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2')
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: tfplan
          retention-days: 3

      - name: Comment plan result on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const marker = '<!-- terraform-plan -->';
            const hasTerraformChanges = '${{ steps.changes.outputs.tf }}' === 'true';
            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const status = !hasTerraformChanges
              ? 'Skipped - no Terraform changes'
              : exitCode === '0'
              ? 'No changes'
              : exitCode === '2'
                ? 'Changes pending'
                : 'Failed';
            const body = `${marker}
            ## Terraform Plan

            **Status:** ${status}
            **Commit:** \`${context.sha}\`

            The full plan artifact is attached to this workflow run.`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
