name: PR 후 자동 Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_gcp_cloudsql_private_ip: ${{ vars.GCP_CLOUDSQL_PRIVATE_IP || '' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  TF_VAR_dev_mode: "true"   # 개발 완료 후 이 줄 삭제

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform-related changes
        id: changes
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed="$(git diff --name-only FETCH_HEAD HEAD)"
          echo "${changed}"
          if echo "${changed}" | grep -qE '\.tf$|\.tpl$|\.terraform\.lock\.hcl$|^kms/|^ansible/|^gitops/|^buildspec-ansible\.yml$|^buildspec-gitops-bootstrap\.yml$|^buildspec-debug\.yml$|^tools/|^\.github/workflows/terraform-operations\.yml$|^\.github/workflows/PR-terraform-plan\.yml$'; then
            echo "tf=true" >> "${GITHUB_OUTPUT}"
          else
            echo "tf=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip when no Terraform changes
        if: steps.changes.outputs.tf == 'false'
        run: echo "No Terraform-related files changed. Skipping plan."

      - name: Configure AWS credentials
        if: steps.changes.outputs.tf == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.changes.outputs.tf == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.changes.outputs.tf == 'true'
        run: terraform init -reconfigure

      - name: Terraform Format Check
        if: steps.changes.outputs.tf == 'true'
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: steps.changes.outputs.tf == 'true'
        run: terraform validate -no-color

      - name: KMS Plan
        if: steps.changes.outputs.tf == 'true'
        shell: bash
        working-directory: kms
        run: |
          terraform init -reconfigure
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode
          exitcode=$?
          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::KMS terraform plan failed."
            exit 1
          fi
          exit 0

      - name: Terraform Plan
        if: steps.changes.outputs.tf == 'true'
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -out=tfplan
          exitcode=$?
          echo "exitcode=${exitcode}" >> "${GITHUB_OUTPUT}"

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Terraform plan failed. Check the Terraform Plan step logs for the error details."
            exit 1
          fi

          exit 0

      - name: Upload Terraform Plan
        if: steps.changes.outputs.tf == 'true' && (steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2')
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: tfplan
          retention-days: 3

      - name: Comment plan result on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const marker = '<!-- terraform-plan -->';
            const hasTerraformChanges = '${{ steps.changes.outputs.tf }}' === 'true';
            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const status = !hasTerraformChanges
              ? 'Skipped - no Terraform changes'
              : exitCode === '0'
              ? 'No changes'
              : exitCode === '2'
                ? 'Changes pending'
                : 'Failed';
            const body = `${marker}
            ## Terraform Plan

            **Status:** ${status}
            **Commit:** \`${context.sha}\`

            The full plan artifact is attached to this workflow run.`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    # AWS 접근 없음 — id-token 불필요. 공급망 표면·토큰 노출 최소화
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform IaC 파일 변경 감지
        id: changes
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          changed="$(git diff --name-only FETCH_HEAD HEAD)"
          echo "${changed}"
          if echo "${changed}" | grep -qE '\.tf$|\.tpl$|\.terraform\.lock\.hcl$|^\.github/workflows/PR-terraform-plan\.yml$'; then
            echo "tf=true" >> "${GITHUB_OUTPUT}"
          else
            echo "tf=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Terraform 파일 변경 없음 — 스캔 건너뜀
        if: steps.changes.outputs.tf == 'false'
        run: echo "Terraform 관련 파일 변경 없음. IaC 스캔 건너뜀."

      # CVE-2026-33634 공급망 공격 대응 — mutable 경로 install.sh 대신 GitHub release tarball 핀+검증
      - name: Trivy 설치 (v0.71.1, SHA256 검증)
        if: steps.changes.outputs.tf == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TRIVY_VERSION="0.71.1"
          TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          BASE_URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"

          curl -sSfL "${BASE_URL}/${TARBALL}" -o "${TARBALL}"
          curl -sSfL "${BASE_URL}/trivy_${TRIVY_VERSION}_checksums.txt" -o checksums.txt

          # checksums.txt에서 해당 tarball 라인 추출 — 못 찾으면 명시적으로 중단
          expected_line="$(grep "  ${TARBALL}\$" checksums.txt)" || {
            echo "::error::checksums.txt에서 ${TARBALL} 항목을 찾지 못함 — 무결성 검증 불가, 설치 중단"
            exit 1
          }
          echo "${expected_line}" | sha256sum -c -

          # repo 루트에 trivy/ 디렉토리가 있으므로 임시 디렉토리에 추출 후 이동
          tmpdir="$(mktemp -d)"
          tar -xzf "${TARBALL}" -C "${tmpdir}" trivy
          sudo mv "${tmpdir}/trivy" /usr/local/bin/trivy
          rm -rf "${tmpdir}"
          trivy --version

      - name: Trivy IaC 보안 스캔 (HIGH/CRITICAL 차단)
        if: steps.changes.outputs.tf == 'true'
        shell: bash
        run: |
          # rego check 번들 원격 다운로드 생략 — trivy 바이너리 내장 번들 사용
          # (trivy 버전 핀과 룰셋 버전 일치 + 외부 레지스트리 호출 제거, CVE-2026-33634 취지)
          trivy config \
            --misconfig-scanners terraform \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --tf-exclude-downloaded-modules \
            --skip-dirs ".terraform,**/.terraform" \
            --ignorefile .trivyignore \
            --skip-check-update \
            .
