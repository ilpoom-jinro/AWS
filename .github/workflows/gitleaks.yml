name: GitLeaks Secret Scan

on:
  pull_request:

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks v8.30.1
        env:
          GL_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          TARBALL="gitleaks_${GL_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}"
          curl -sSfL "${BASE_URL}/${TARBALL}" -o "${TARBALL}"
          curl -sSfL "${BASE_URL}/gitleaks_${GL_VERSION}_checksums.txt" -o gitleaks_checksums.txt
          # checksums에서 해당 tarball 라인 추출 — 못 찾으면 명시적 중단
          gl_expected="$(grep "  ${TARBALL}\$" gitleaks_checksums.txt)" || {
            echo "::error::gitleaks_checksums.txt에서 ${TARBALL} 항목을 찾지 못함 — 무결성 검증 불가, 설치 중단"
            exit 1
          }
          echo "${gl_expected}" | sha256sum -c -
          # repo 루트에 gitleaks 이름 디렉토리 없으면 직접 추출
          tar -xzf "${TARBALL}" -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1