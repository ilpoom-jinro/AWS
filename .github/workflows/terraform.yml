name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - "ansible/**"
      - "buildspec-ansible.yml"
      - "tools/**"
      - ".github/workflows/terraform.yml"
      - ".github/workflows/mirror-codecommit.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan -no-color -input=false -detailed-exitcode -out=tfplan
          exitcode=$?
          echo "exitcode=${exitcode}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: tfplan
          retention-days: 3

      - name: Comment plan result on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const marker = '<!-- terraform-plan -->';
            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const status = exitCode === '0'
              ? 'No changes'
              : exitCode === '2'
                ? 'Changes pending'
                : 'Failed';
            const body = `${marker}
            ## Terraform Plan

            **Status:** ${status}
            **Commit:** \`${context.sha}\`

            The full plan artifact is attached to this workflow run.`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.apply == true
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Outputs
        run: terraform output
