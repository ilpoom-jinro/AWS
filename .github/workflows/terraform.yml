name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.11.0"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform 설치
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format 검사
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        id: validate                     
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -target=module.iam
        continue-on-error: false

      - name: PR 코멘트 게시
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const marker = '<!-- terraform-plan -->';
            const output = `${marker}
            ## Terraform Plan 결과
            **Validate:** ${{ steps.validate.outcome }}
            **Plan:** ${{ steps.plan.outcome }}

            <details><summary>상세 보기</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>

            *실행자: @${{ github.actor }} / 커밋: ${{ github.sha }}*`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS OIDC 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform 설치
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve -target=module.iam