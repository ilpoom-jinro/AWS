name: Build ECR Images

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - "gitops/**"
      - "ecr.tf"
      - "variables.tf"
      - "buildspec-ansible.yml"
      - "tools/ansible-codebuild/**"
      - ".github/workflows/ecr-images.yml"
  workflow_dispatch:
    inputs:
      build_ansible_codebuild:
        description: "Build and push the Ansible CodeBuild runtime image"
        required: true
        default: true
        type: boolean
      mirror_internal_git:
        description: "Mirror the internal Git image into ECR"
        required: true
        default: false
        type: boolean
      mirror_argocd:
        description: "Mirror the Argo CD image into ECR"
        required: true
        default: false
        type: boolean
      mirror_argocd_redis:
        description: "Mirror the Argo CD Redis image into ECR"
        required: true
        default: false
        type: boolean
      mirror_istio:
        description: "Mirror Istio ambient mesh images into ECR"
        required: true
        default: false
        type: boolean
      mirror_kyverno:
        description: "Mirror Kyverno images into ECR"
        required: true
        default: false
        type: boolean
      mirror_finops_runtime:
        description: "Mirror FinOps runtime images such as Temporal and Postgres into ECR"
        required: true
        default: false
        type: boolean
      mirror_external_secrets:
        description: "Mirror External Secrets Operator image into ECR"
        required: true
        default: false
        type: boolean
      mirror_temporal:
        description: "Mirror Temporal server and UI images into ECR"
        required: true
        default: false
        type: boolean
      mirror_velero:
        description: "Mirror Velero and snapshot-controller images into ECR"
        required: true
        default: false
        type: boolean
      mirror_tetragon:
        description: "Mirror Tetragon images into ECR"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION_DEV || secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  TF_VAR_dev_mode: "true"
  TF_MOVED_RESOURCE_TARGETS: >-
    -target=module.iam.aws_iam_group_policy_attachment.platform_deny_destructive
    -target=module.iam.aws_iam_group_policy_attachment.sre_deny_destructive
  ANSIBLE_CODEBUILD_REPOSITORY: financial/ansible-codebuild
  INTERNAL_GIT_REPOSITORY: financial/internal-git
  INTERNAL_GIT_SOURCE_IMAGE: gitea/gitea:1.22-rootless
  ARGOCD_REPOSITORY: financial/argocd
  ARGOCD_SOURCE_IMAGE: quay.io/argoproj/argocd:latest
  ARGOCD_REDIS_REPOSITORY: financial/argocd-redis
  ARGOCD_REDIS_SOURCE_IMAGE: docker.io/library/redis:7.4.2-alpine
  ISTIO_VERSION: "1.30.0"
  ISTIO_REPOSITORY_PREFIX: financial/istio
  AWS_LOAD_BALANCER_CONTROLLER_REPOSITORY: financial/monitoring/aws-load-balancer-controller
  OBSERVABILITY_INDEXER_REPOSITORY: financial/monitoring/observability-indexer
  KYVERNO_VERSION: "v1.13.2"  # Note: Helm chart 3.3.4 appVersion. Keep in sync with helm chart version in Packer AMI (/opt/helm-charts/kyverno)
  KYVERNO_REPOSITORY_PREFIX: financial/kyverno
  KYVERNO_SOURCE_REGISTRY: reg.kyverno.io/kyverno
  KUBECTL_VERSION: "v1.30.2"  # Note: keep in sync with cleanupJobs/webhooksCleanup/policyReportsCleanup image.tag in kyverno/helm/values.yaml
  KUBECTL_REPOSITORY: financial/kyverno/kubectl
  TETRAGON_VERSION: "v1.7.0"  # Note: keep in sync with TETRAGON_CHART_VERSION in tools/ansible-codebuild/Dockerfile
  HUBBLE_EXPORT_STDOUT_VERSION: "v1.1.1"
  TETRAGON_SOURCE_REGISTRY: quay.io/cilium
  TETRAGON_REPOSITORY: financial/tetragon
  TETRAGON_OPERATOR_REPOSITORY: financial/tetragon-operator
  HUBBLE_EXPORT_STDOUT_REPOSITORY: financial/hubble-export-stdout
  EXTERNAL_SECRETS_VERSION: "v0.10.7"
  EXTERNAL_SECRETS_REPOSITORY: external-secrets/external-secrets
  EXTERNAL_SECRETS_SOURCE_IMAGE: ghcr.io/external-secrets/external-secrets
  FINOPS_TEMPORAL_REPOSITORY: financial/mas/finops/temporal
  FINOPS_TEMPORAL_SOURCE_IMAGE: docker.io/temporalio/admin-tools:latest
  FINOPS_POSTGRES_REPOSITORY: financial/mas/finops/postgres
  FINOPS_POSTGRES_SOURCE_IMAGE: docker.io/library/postgres:16-alpine
  TEMPORAL_VERSION: "1.31.0"
  TEMPORAL_UI_VERSION: "2.49.1"
  TEMPORAL_SERVER_REPOSITORY: financial/mas/temporal/server
  TEMPORAL_UI_REPOSITORY:     financial/mas/temporal/ui
  VELERO_VERSION: "v1.15.0"  # Note: keep in sync with helmChart/velero/values.yaml image.tag
  VELERO_REPOSITORY: velero/velero
  VELERO_SOURCE_IMAGE: docker.io/velero/velero
  VELERO_PLUGIN_AWS_VERSION: "v1.11.0"  # Note: keep in sync with helmChart/velero/values.yaml initContainers image
  VELERO_PLUGIN_AWS_REPOSITORY: velero/velero-plugin-for-aws
  VELERO_PLUGIN_AWS_SOURCE_IMAGE: docker.io/velero/velero-plugin-for-aws
  SNAPSHOT_CONTROLLER_VERSION: "v8.6.0"  # Note: keep in sync with helmChart/snapshot-controller/values.yaml image.tag
  SNAPSHOT_CONTROLLER_REPOSITORY: sig-storage/snapshot-controller
  SNAPSHOT_CONTROLLER_SOURCE_IMAGE: registry.k8s.io/sig-storage/snapshot-controller

jobs:
  images:
    name: Build and Push ECR Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed image inputs
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "ansible=false" >> "${GITHUB_OUTPUT}"
            echo "workflow=false" >> "${GITHUB_OUTPUT}"
            echo "ecr=false" >> "${GITHUB_OUTPUT}"
            echo "istio=false" >> "${GITHUB_OUTPUT}"
            echo "kyverno=false" >> "${GITHUB_OUTPUT}"
            echo "kubectl=false" >> "${GITHUB_OUTPUT}"
            echo "tetragon=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "${before}" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            before="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${before}" "${{ github.sha }}")"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(ansible/|gitops/|buildspec-ansible.yml|tools/ansible-codebuild/)'; then
            echo "ansible=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ansible=false" >> "${GITHUB_OUTPUT}"
          fi

          if printf '%s\n' "${changed_files}" | grep -Eq '^\.github/workflows/ecr-images.yml$'; then
            echo "workflow=true" >> "${GITHUB_OUTPUT}"
          else
            echo "workflow=false" >> "${GITHUB_OUTPUT}"
          fi

          if printf '%s\n' "${changed_files}" | grep -Eq '^(ecr.tf|variables.tf|outputs.tf|versions.tf|provider.tf|main.tf|backend.tf|iam/|vpc/)'; then
            echo "ecr=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ecr=false" >> "${GITHUB_OUTPUT}"
          fi

          if git diff "${before}" "${{ github.sha }}" -- .github/workflows/ecr-images.yml | grep -Eq '^\+\s+ISTIO_VERSION:'; then
            echo "istio=true" >> "${GITHUB_OUTPUT}"
          else
            echo "istio=false" >> "${GITHUB_OUTPUT}"
          fi

          if git diff "${before}" "${{ github.sha }}" -- .github/workflows/ecr-images.yml | grep -Eq '^\+\s+KYVERNO_VERSION:'; then
            echo "kyverno=true" >> "${GITHUB_OUTPUT}"
          else
            echo "kyverno=false" >> "${GITHUB_OUTPUT}"
          fi

          if git diff "${before}" "${{ github.sha }}" -- .github/workflows/ecr-images.yml | grep -Eq '^\+\s+KUBECTL_VERSION:'; then
            echo "kubectl=true" >> "${GITHUB_OUTPUT}"
          else
            echo "kubectl=false" >> "${GITHUB_OUTPUT}"
          fi

          if git diff "${before}" "${{ github.sha }}" -- .github/workflows/ecr-images.yml | grep -Eq '^\+\s+(TEMPORAL_VERSION|TEMPORAL_UI_VERSION):'; then
            echo "temporal=true" >> "${GITHUB_OUTPUT}"
          else
            echo "temporal=false" >> "${GITHUB_OUTPUT}"
          fi

          if git diff "${before}" "${{ github.sha }}" -- .github/workflows/ecr-images.yml | grep -Eq '^\+\s+(TETRAGON_VERSION|HUBBLE_EXPORT_STDOUT_VERSION):'; then
            echo "tetragon=true" >> "${GITHUB_OUTPUT}"
          else
            echo "tetragon=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Apply ECR repositories
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.ecr == 'true' ||
          steps.changes.outputs.workflow == 'true'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_ecr_repository.ansible_codebuild
          -target=aws_ecr_lifecycle_policy.ansible_codebuild
          -target=aws_ecr_repository.internal_git
          -target=aws_ecr_lifecycle_policy.internal_git
          -target=aws_ecr_repository.argocd
          -target=aws_ecr_lifecycle_policy.argocd
          -target=aws_ecr_repository.argocd_redis
          -target=aws_ecr_lifecycle_policy.argocd_redis
          -target=aws_ecr_repository.istio_pilot
          -target=aws_ecr_lifecycle_policy.istio_pilot
          -target=aws_ecr_repository.istio_proxyv2
          -target=aws_ecr_lifecycle_policy.istio_proxyv2
          -target=aws_ecr_repository.istio_install_cni
          -target=aws_ecr_lifecycle_policy.istio_install_cni
          -target=aws_ecr_repository.istio_ztunnel
          -target=aws_ecr_lifecycle_policy.istio_ztunnel
          -target=aws_ecr_repository.aws_load_balancer_controller_monitoring
          -target=aws_ecr_lifecycle_policy.aws_load_balancer_controller_monitoring
          -target=aws_ecr_repository.monitoring_tempo
          -target=aws_ecr_lifecycle_policy.monitoring_tempo
          -target=aws_ecr_repository.monitoring_grafana
          -target=aws_ecr_lifecycle_policy.monitoring_grafana
          -target=aws_ecr_repository.monitoring_loki
          -target=aws_ecr_lifecycle_policy.monitoring_loki
          -target=aws_ecr_repository.monitoring_thanos
          -target=aws_ecr_lifecycle_policy.monitoring_thanos
          -target=aws_ecr_repository.monitoring_alertmanager
          -target=aws_ecr_lifecycle_policy.monitoring_alertmanager
          -target=aws_ecr_repository.monitoring_alloy
          -target=aws_ecr_lifecycle_policy.monitoring_alloy
          -target=aws_ecr_repository.observability_indexer
          -target=aws_ecr_lifecycle_policy.observability_indexer
          -target=aws_ecr_repository.kyverno
          -target=aws_ecr_lifecycle_policy.kyverno
          -target=aws_ecr_repository.kyvernopre
          -target=aws_ecr_lifecycle_policy.kyvernopre
          -target=aws_ecr_repository.kyverno_background_controller
          -target=aws_ecr_lifecycle_policy.kyverno_background_controller
          -target=aws_ecr_repository.kyverno_cleanup_controller
          -target=aws_ecr_lifecycle_policy.kyverno_cleanup_controller
          -target=aws_ecr_repository.kyverno_reports_controller
          -target=aws_ecr_lifecycle_policy.kyverno_reports_controller
          -target=aws_ecr_repository.kyverno_cli
          -target=aws_ecr_lifecycle_policy.kyverno_cli
          -target=aws_ecr_repository.kyverno_kubectl
          -target=aws_ecr_lifecycle_policy.kyverno_kubectl
          -target=aws_ecr_repository.finops_temporal
          -target=aws_ecr_lifecycle_policy.finops_temporal
          -target=aws_ecr_repository.finops_postgres
          -target=aws_ecr_lifecycle_policy.finops_postgres
          -target=aws_ecr_repository.external_secrets
          -target=aws_ecr_lifecycle_policy.external_secrets
          -target=aws_ecr_repository.metrics_server
          -target=aws_ecr_lifecycle_policy.metrics_server
          -target=aws_ecr_repository.temporal_server
          -target=aws_ecr_lifecycle_policy.temporal_server
          -target=aws_ecr_repository.temporal_ui
          -target=aws_ecr_lifecycle_policy.temporal_ui
          -target=aws_ecr_repository.monitoring_kube_state_metrics
          -target=aws_ecr_lifecycle_policy.monitoring_kube_state_metrics
          -target=aws_ecr_repository.velero
          -target=aws_ecr_lifecycle_policy.velero
          -target=aws_ecr_repository.velero_plugin_aws
          -target=aws_ecr_lifecycle_policy.velero_plugin_aws
          -target=aws_ecr_repository.snapshot_controller
          -target=aws_ecr_lifecycle_policy.snapshot_controller
          -target=aws_ecr_repository.pii_scan
          -target=aws_ecr_lifecycle_policy.pii_scan
          -target=aws_ecr_repository.tetragon
          -target=aws_ecr_lifecycle_policy.tetragon
          -target=aws_ecr_repository.tetragon_operator
          -target=aws_ecr_lifecycle_policy.tetragon_operator
          -target=aws_ecr_repository.hubble_export_stdout
          -target=aws_ecr_lifecycle_policy.hubble_export_stdout
          $TF_MOVED_RESOURCE_TARGETS

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check ECR repositories
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.ecr == 'true' ||
          steps.changes.outputs.workflow == 'true'
        run: |
          aws ecr describe-repositories --repository-names "${ANSIBLE_CODEBUILD_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${INTERNAL_GIT_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${ARGOCD_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${ARGOCD_REDIS_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/pilot"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/proxyv2"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/install-cni"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/ztunnel"
          aws ecr describe-repositories --repository-names "${AWS_LOAD_BALANCER_CONTROLLER_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${OBSERVABILITY_INDEXER_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${KYVERNO_REPOSITORY_PREFIX}/kyverno"
          aws ecr describe-repositories --repository-names "${KYVERNO_REPOSITORY_PREFIX}/kyvernopre"
          aws ecr describe-repositories --repository-names "${KYVERNO_REPOSITORY_PREFIX}/background-controller"
          aws ecr describe-repositories --repository-names "${KYVERNO_REPOSITORY_PREFIX}/cleanup-controller"
          aws ecr describe-repositories --repository-names "${KYVERNO_REPOSITORY_PREFIX}/reports-controller"
          aws ecr describe-repositories --repository-names "${KYVERNO_REPOSITORY_PREFIX}/kyverno-cli"
          aws ecr describe-repositories --repository-names "${KUBECTL_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${FINOPS_TEMPORAL_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${FINOPS_POSTGRES_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${TEMPORAL_SERVER_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${TEMPORAL_UI_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${TETRAGON_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${TETRAGON_OPERATOR_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${HUBBLE_EXPORT_STDOUT_REPOSITORY}"

      - name: Build and push Ansible CodeBuild image
        if: >
          (github.event_name == 'push' && steps.changes.outputs.ansible == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.build_ansible_codebuild == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ANSIBLE_CODEBUILD_REPOSITORY}"

          docker build \
            -f tools/ansible-codebuild/Dockerfile \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror Argo CD image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_argocd == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="${REGISTRY}/${ARGOCD_REPOSITORY}"

          docker pull "${ARGOCD_SOURCE_IMAGE}"
          docker tag "${ARGOCD_SOURCE_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror Argo CD Redis image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_argocd_redis == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="${REGISTRY}/${ARGOCD_REDIS_REPOSITORY}"

          docker pull "${ARGOCD_REDIS_SOURCE_IMAGE}"
          docker tag "${ARGOCD_REDIS_SOURCE_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror Istio ambient images to ECR
        if: >
          (github.event_name == 'push' && steps.changes.outputs.istio == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.mirror_istio == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          for image in pilot proxyv2 install-cni ztunnel; do
            for tag in "${ISTIO_VERSION}" "${ISTIO_VERSION}-distroless"; do
              source_image="docker.io/istio/${image}:${tag}"
              target_image="${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:${tag}"

              docker pull "${source_image}"
              docker tag "${source_image}" "${target_image}"
              docker push "${target_image}"
            done

            docker tag "docker.io/istio/${image}:${ISTIO_VERSION}" "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:latest"
            docker push "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:latest"
          done

      - name: Mirror Kyverno images to ECR
        if: >
          (github.event_name == 'push' && steps.changes.outputs.kyverno == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.mirror_kyverno == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          for component in kyverno kyvernopre background-controller cleanup-controller reports-controller kyverno-cli; do
            source_image="${KYVERNO_SOURCE_REGISTRY}/${component}:${KYVERNO_VERSION}"
            target_image="${REGISTRY}/${KYVERNO_REPOSITORY_PREFIX}/${component}:${KYVERNO_VERSION}"

            docker pull "${source_image}"
            docker tag "${source_image}" "${target_image}"
            docker tag "${source_image}" "${REGISTRY}/${KYVERNO_REPOSITORY_PREFIX}/${component}:latest"
            docker push "${target_image}"
            docker push "${REGISTRY}/${KYVERNO_REPOSITORY_PREFIX}/${component}:latest"
          done

      - name: Mirror Kyverno kubectl image to ECR
        if: >
          (github.event_name == 'push' && steps.changes.outputs.kubectl == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.mirror_kyverno == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          source_image="registry.k8s.io/kubectl:${KUBECTL_VERSION}"
          target_image="${REGISTRY}/${KUBECTL_REPOSITORY}:${KUBECTL_VERSION}"

          docker pull "${source_image}"
          docker tag "${source_image}" "${target_image}"
          docker push "${target_image}"

      - name: Mirror Tetragon images to ECR
        if: >
          (github.event_name == 'push' && steps.changes.outputs.tetragon == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.mirror_tetragon == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          # tetragon + tetragon-operator: 공용 태그 TETRAGON_VERSION
          docker pull "${TETRAGON_SOURCE_REGISTRY}/tetragon:${TETRAGON_VERSION}"
          docker tag "${TETRAGON_SOURCE_REGISTRY}/tetragon:${TETRAGON_VERSION}" "${REGISTRY}/${TETRAGON_REPOSITORY}:${TETRAGON_VERSION}"
          docker tag "${TETRAGON_SOURCE_REGISTRY}/tetragon:${TETRAGON_VERSION}" "${REGISTRY}/${TETRAGON_REPOSITORY}:latest"
          docker push "${REGISTRY}/${TETRAGON_REPOSITORY}:${TETRAGON_VERSION}"
          docker push "${REGISTRY}/${TETRAGON_REPOSITORY}:latest"

          docker pull "${TETRAGON_SOURCE_REGISTRY}/tetragon-operator:${TETRAGON_VERSION}"
          docker tag "${TETRAGON_SOURCE_REGISTRY}/tetragon-operator:${TETRAGON_VERSION}" "${REGISTRY}/${TETRAGON_OPERATOR_REPOSITORY}:${TETRAGON_VERSION}"
          docker tag "${TETRAGON_SOURCE_REGISTRY}/tetragon-operator:${TETRAGON_VERSION}" "${REGISTRY}/${TETRAGON_OPERATOR_REPOSITORY}:latest"
          docker push "${REGISTRY}/${TETRAGON_OPERATOR_REPOSITORY}:${TETRAGON_VERSION}"
          docker push "${REGISTRY}/${TETRAGON_OPERATOR_REPOSITORY}:latest"

          # hubble-export-stdout: 별도 태그 HUBBLE_EXPORT_STDOUT_VERSION
          docker pull "${TETRAGON_SOURCE_REGISTRY}/hubble-export-stdout:${HUBBLE_EXPORT_STDOUT_VERSION}"
          docker tag "${TETRAGON_SOURCE_REGISTRY}/hubble-export-stdout:${HUBBLE_EXPORT_STDOUT_VERSION}" "${REGISTRY}/${HUBBLE_EXPORT_STDOUT_REPOSITORY}:${HUBBLE_EXPORT_STDOUT_VERSION}"
          docker tag "${TETRAGON_SOURCE_REGISTRY}/hubble-export-stdout:${HUBBLE_EXPORT_STDOUT_VERSION}" "${REGISTRY}/${HUBBLE_EXPORT_STDOUT_REPOSITORY}:latest"
          docker push "${REGISTRY}/${HUBBLE_EXPORT_STDOUT_REPOSITORY}:${HUBBLE_EXPORT_STDOUT_VERSION}"
          docker push "${REGISTRY}/${HUBBLE_EXPORT_STDOUT_REPOSITORY}:latest"

      - name: Mirror FinOps runtime images to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_finops_runtime == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          temporal_target="${REGISTRY}/${FINOPS_TEMPORAL_REPOSITORY}:latest"
          postgres_target="${REGISTRY}/${FINOPS_POSTGRES_REPOSITORY}:16-alpine"

          docker pull "${FINOPS_TEMPORAL_SOURCE_IMAGE}"
          docker tag "${FINOPS_TEMPORAL_SOURCE_IMAGE}" "${temporal_target}"
          docker push "${temporal_target}"

          docker pull "${FINOPS_POSTGRES_SOURCE_IMAGE}"
          docker tag "${FINOPS_POSTGRES_SOURCE_IMAGE}" "${postgres_target}"
          docker tag "${FINOPS_POSTGRES_SOURCE_IMAGE}" "${REGISTRY}/${FINOPS_POSTGRES_REPOSITORY}:latest"
          docker push "${postgres_target}"
          docker push "${REGISTRY}/${FINOPS_POSTGRES_REPOSITORY}:latest"

      - name: Mirror Temporal Server and UI images to ECR
        if: >
          (github.event_name == 'push' && steps.changes.outputs.temporal == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.mirror_temporal == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          # Server
          server_source="docker.io/temporalio/server:${TEMPORAL_VERSION}"
          server_target="${REGISTRY}/${TEMPORAL_SERVER_REPOSITORY}:${TEMPORAL_VERSION}"
          docker pull "${server_source}"
          docker tag "${server_source}" "${server_target}"
          docker push "${server_target}"

          # UI
          ui_source="docker.io/temporalio/ui:${TEMPORAL_UI_VERSION}"
          ui_target="${REGISTRY}/${TEMPORAL_UI_REPOSITORY}:${TEMPORAL_UI_VERSION}"
          docker pull "${ui_source}"
          docker tag "${ui_source}" "${ui_target}"
          docker push "${ui_target}"

          # Admin-tools 
          admin_source="docker.io/temporalio/admin-tools:${TEMPORAL_VERSION}"
          admin_target="${REGISTRY}/${FINOPS_TEMPORAL_REPOSITORY}:${TEMPORAL_VERSION}"
          docker pull "${admin_source}"
          docker tag "${admin_source}" "${admin_target}"
          docker push "${admin_target}"

      - name: Mirror External Secrets Operator image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_external_secrets == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          source_image="${EXTERNAL_SECRETS_SOURCE_IMAGE}:${EXTERNAL_SECRETS_VERSION}"
          target_image="${REGISTRY}/${EXTERNAL_SECRETS_REPOSITORY}:${EXTERNAL_SECRETS_VERSION}"

          docker pull "${source_image}"
          docker tag "${source_image}" "${target_image}"
          docker push "${target_image}"

      - name: Mirror Velero and snapshot-controller images to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_velero == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker pull "${VELERO_SOURCE_IMAGE}:${VELERO_VERSION}"
          docker tag "${VELERO_SOURCE_IMAGE}:${VELERO_VERSION}" "${REGISTRY}/${VELERO_REPOSITORY}:${VELERO_VERSION}"
          docker tag "${VELERO_SOURCE_IMAGE}:${VELERO_VERSION}" "${REGISTRY}/${VELERO_REPOSITORY}:latest"
          docker push "${REGISTRY}/${VELERO_REPOSITORY}:${VELERO_VERSION}"
          docker push "${REGISTRY}/${VELERO_REPOSITORY}:latest"

          docker pull "${VELERO_PLUGIN_AWS_SOURCE_IMAGE}:${VELERO_PLUGIN_AWS_VERSION}"
          docker tag "${VELERO_PLUGIN_AWS_SOURCE_IMAGE}:${VELERO_PLUGIN_AWS_VERSION}" "${REGISTRY}/${VELERO_PLUGIN_AWS_REPOSITORY}:${VELERO_PLUGIN_AWS_VERSION}"
          docker tag "${VELERO_PLUGIN_AWS_SOURCE_IMAGE}:${VELERO_PLUGIN_AWS_VERSION}" "${REGISTRY}/${VELERO_PLUGIN_AWS_REPOSITORY}:latest"
          docker push "${REGISTRY}/${VELERO_PLUGIN_AWS_REPOSITORY}:${VELERO_PLUGIN_AWS_VERSION}"
          docker push "${REGISTRY}/${VELERO_PLUGIN_AWS_REPOSITORY}:latest"

          docker pull "${SNAPSHOT_CONTROLLER_SOURCE_IMAGE}:${SNAPSHOT_CONTROLLER_VERSION}"
          docker tag "${SNAPSHOT_CONTROLLER_SOURCE_IMAGE}:${SNAPSHOT_CONTROLLER_VERSION}" "${REGISTRY}/${SNAPSHOT_CONTROLLER_REPOSITORY}:${SNAPSHOT_CONTROLLER_VERSION}"
          docker tag "${SNAPSHOT_CONTROLLER_SOURCE_IMAGE}:${SNAPSHOT_CONTROLLER_VERSION}" "${REGISTRY}/${SNAPSHOT_CONTROLLER_REPOSITORY}:latest"
          docker push "${REGISTRY}/${SNAPSHOT_CONTROLLER_REPOSITORY}:${SNAPSHOT_CONTROLLER_VERSION}"
          docker push "${REGISTRY}/${SNAPSHOT_CONTROLLER_REPOSITORY}:latest"

      - name: Mirror internal Git image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_internal_git == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${INTERNAL_GIT_REPOSITORY}"

          docker pull "${INTERNAL_GIT_SOURCE_IMAGE}"
          docker tag "${INTERNAL_GIT_SOURCE_IMAGE}" "${IMAGE_URI}:${IMAGE_TAG}"
          docker tag "${INTERNAL_GIT_SOURCE_IMAGE}" "${IMAGE_URI}:latest"

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"
