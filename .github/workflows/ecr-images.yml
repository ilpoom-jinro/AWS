name: Build ECR Images

on:
  push:
    branches:
      - main
      - feature/eks
    paths:
      - "ansible/**"
      - "gitops/**"
      - "buildspec-ansible.yml"
      - "tools/ansible-codebuild/**"
      - ".github/workflows/ecr-images.yml"
  workflow_dispatch:
    inputs:
      build_ansible_codebuild:
        description: "Build and push the Ansible CodeBuild runtime image"
        required: true
        default: true
        type: boolean
      mirror_internal_git:
        description: "Mirror the internal Git image into ECR"
        required: true
        default: false
        type: boolean
      mirror_argocd:
        description: "Mirror the Argo CD image into ECR"
        required: true
        default: false
        type: boolean
      mirror_argocd_redis:
        description: "Mirror the Argo CD Redis image into ECR"
        required: true
        default: false
        type: boolean
      mirror_istio:
        description: "Mirror Istio ambient mesh images into ECR"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION_DEV || secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  TF_VAR_dev_mode: "true"
  TF_MOVED_RESOURCE_TARGETS: >-
    -target=module.iam.aws_iam_group_policy_attachment.platform_deny_destructive
    -target=module.iam.aws_iam_group_policy_attachment.sre_deny_destructive
  ANSIBLE_CODEBUILD_REPOSITORY: financial/ansible-codebuild
  INTERNAL_GIT_REPOSITORY: financial/internal-git
  INTERNAL_GIT_SOURCE_IMAGE: gitea/gitea:1.22-rootless
  ARGOCD_REPOSITORY: financial/argocd
  ARGOCD_SOURCE_IMAGE: quay.io/argoproj/argocd:latest
  ARGOCD_REDIS_REPOSITORY: financial/argocd-redis
  ARGOCD_REDIS_SOURCE_IMAGE: docker.io/library/redis:7.4.2-alpine
  ISTIO_VERSION: "1.30.0"
  ISTIO_REPOSITORY_PREFIX: financial/istio
  AWS_LOAD_BALANCER_CONTROLLER_REPOSITORY: financial/system/aws-load-balancer-controller

jobs:
  images:
    name: Build and Push ECR Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed image inputs
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "ansible=false" >> "${GITHUB_OUTPUT}"
            echo "workflow=false" >> "${GITHUB_OUTPUT}"
            echo "ecr=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "${before}" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            before="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed_files="$(git diff --name-only "${before}" "${{ github.sha }}")"
          printf '%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(ansible/|gitops/|buildspec-ansible.yml|tools/ansible-codebuild/)'; then
            echo "ansible=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ansible=false" >> "${GITHUB_OUTPUT}"
          fi

          if printf '%s\n' "${changed_files}" | grep -Eq '^\.github/workflows/ecr-images.yml$'; then
            echo "workflow=true" >> "${GITHUB_OUTPUT}"
          else
            echo "workflow=false" >> "${GITHUB_OUTPUT}"
          fi

          if printf '%s\n' "${changed_files}" | grep -Eq '^(ecr.tf|variables.tf|outputs.tf|versions.tf|provider.tf|main.tf|backend.tf|iam/|vpc/)'; then
            echo "ecr=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ecr=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Remove legacy CodeCommit state
        shell: bash
        run: |
          mapfile -t codecommit_state < <(terraform state list | grep 'aws_codecommit' || true)
          if [ "${#codecommit_state[@]}" -gt 0 ]; then
            terraform state rm "${codecommit_state[@]}"
          fi

      - name: Apply ECR repositories
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.ecr == 'true' ||
          steps.changes.outputs.workflow == 'true'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_ecr_repository.ansible_codebuild
          -target=aws_ecr_lifecycle_policy.ansible_codebuild
          -target=aws_ecr_repository.internal_git
          -target=aws_ecr_lifecycle_policy.internal_git
          -target=aws_ecr_repository.argocd
          -target=aws_ecr_lifecycle_policy.argocd
          -target=aws_ecr_repository.argocd_redis
          -target=aws_ecr_lifecycle_policy.argocd_redis
          -target=aws_ecr_repository.istio_pilot
          -target=aws_ecr_lifecycle_policy.istio_pilot
          -target=aws_ecr_repository.istio_proxyv2
          -target=aws_ecr_lifecycle_policy.istio_proxyv2
          -target=aws_ecr_repository.istio_install_cni
          -target=aws_ecr_lifecycle_policy.istio_install_cni
          -target=aws_ecr_repository.istio_ztunnel
          -target=aws_ecr_lifecycle_policy.istio_ztunnel
          -target=aws_ecr_repository.aws_load_balancer_controller
          -target=aws_ecr_lifecycle_policy.aws_load_balancer_controller
          $TF_MOVED_RESOURCE_TARGETS

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check ECR repositories
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.ecr == 'true' ||
          steps.changes.outputs.workflow == 'true'
        run: |
          aws ecr describe-repositories --repository-names "${ANSIBLE_CODEBUILD_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${INTERNAL_GIT_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${ARGOCD_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${ARGOCD_REDIS_REPOSITORY}"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/pilot"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/proxyv2"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/install-cni"
          aws ecr describe-repositories --repository-names "${ISTIO_REPOSITORY_PREFIX}/ztunnel"
          aws ecr describe-repositories --repository-names "${AWS_LOAD_BALANCER_CONTROLLER_REPOSITORY}"

      - name: Build and push Ansible CodeBuild image
        if: >
          (github.event_name == 'push' && steps.changes.outputs.ansible == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.build_ansible_codebuild == true)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ANSIBLE_CODEBUILD_REPOSITORY}"

          docker build \
            -f tools/ansible-codebuild/Dockerfile \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror Argo CD image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_argocd == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="${REGISTRY}/${ARGOCD_REPOSITORY}"

          docker pull "${ARGOCD_SOURCE_IMAGE}"
          docker tag "${ARGOCD_SOURCE_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror Argo CD Redis image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_argocd_redis == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="${REGISTRY}/${ARGOCD_REDIS_REPOSITORY}"

          docker pull "${ARGOCD_REDIS_SOURCE_IMAGE}"
          docker tag "${ARGOCD_REDIS_SOURCE_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror Istio ambient images to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_istio == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          for image in pilot proxyv2 install-cni ztunnel; do
            for tag in "${ISTIO_VERSION}" "${ISTIO_VERSION}-distroless"; do
              source_image="docker.io/istio/${image}:${tag}"
              target_image="${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:${tag}"

              docker pull "${source_image}"
              docker tag "${source_image}" "${target_image}"
              docker push "${target_image}"
            done

            docker tag "docker.io/istio/${image}:${ISTIO_VERSION}" "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:latest"
            docker push "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:latest"
          done

      - name: Mirror internal Git image to ECR
        if: github.event_name == 'workflow_dispatch' && inputs.mirror_internal_git == true
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${INTERNAL_GIT_REPOSITORY}"

          docker pull "${INTERNAL_GIT_SOURCE_IMAGE}"
          docker tag "${INTERNAL_GIT_SOURCE_IMAGE}" "${IMAGE_URI}:${IMAGE_TAG}"
          docker tag "${INTERNAL_GIT_SOURCE_IMAGE}" "${IMAGE_URI}:latest"

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"
