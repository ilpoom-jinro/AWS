name: Terraform plan / apply / destroy / reapply / codebuild on main branch
run-name: Terraform operations - ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: |
          Select operation.
          plan      = check Terraform changes only
          apply     = create/update infrastructure and run Ansible CodeBuild
          destroy   = destroy infrastructure
          reapply   = run plain terraform apply for changed infrastructure
          codebuild = run Ansible platform CodeBuild only
          gitops    = run GitOps repository bootstrap CodeBuild only
          codebuild-update = create/update only the debug CodeBuild project
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
          - reapply
          - codebuild
          - gitops
          - codebuild-update
      confirm_destroy:
        description: |
          Set true only when action is destroy.
          Leave false for plan/apply/reapply/codebuild/gitops/codebuild-update.
        required: true
        default: false
        type: boolean
      ops_vpc_command:
        description: "Default command stored on financial-debug. You can override it in the AWS CodeBuild console."
        required: false
        default: "kubectl --context ${OPS_CONTEXT} -n git get deploy,svc,pods -o wide"
        type: string
      run_after_update:
        description: "Start the selected CodeBuild project(s) after the targeted Terraform apply."
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-operations-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_gcp_service_ip: ${{ vars.GCP_SERVICE_IP || '' }}
  TF_VAR_gcp_cloudsql_private_ip: ${{ vars.GCP_CLOUDSQL_PRIVATE_IP || '' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  TF_MOVED_RESOURCE_TARGETS: >-
    -target=module.iam.aws_iam_group_policy_attachment.platform_deny_destructive
    -target=module.iam.aws_iam_group_policy_attachment.sre_deny_destructive
    -target=module.vpc2.aws_eks_pod_identity_association.mas_orchestrator_secops
    -target=module.vpc2.aws_eks_pod_identity_association.secops_orchestrator
  TF_VAR_dev_mode: "true"
  TF_VAR_ops_vpc_command: ${{ inputs.ops_vpc_command || 'kubectl --context ${OPS_CONTEXT} -n git get deploy,svc,pods -o wide' }}
  TF_VAR_enable_flowlog_s3_archive: "true"
  TF_VAR_enable_pii_scan: "false"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.action == 'plan'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: KMS Plan
        shell: bash
        working-directory: kms
        run: |
          terraform init -reconfigure
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode
          exitcode=$?
          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::KMS terraform plan failed."
            exit 1
          fi
          exit 0

      - name: Terraform Plan
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -out=tfplan
          exitcode=$?

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Terraform plan failed. Check the Terraform Plan step logs for the error details."
            exit 1
          fi

          if [ "${exitcode}" -eq 2 ]; then
            terraform show -no-color tfplan
          fi

          exit 0

  infrastructure:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      contains(fromJSON('["apply","destroy","reapply"]'), inputs.action) &&
      (inputs.action != 'destroy' || inputs.confirm_destroy == true)
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Reconcile existing Secrets Manager rotations
        if: contains(fromJSON('["apply","reapply"]'), inputs.action)
        shell: bash
        run: |
          set -euo pipefail

          import_rotation_if_needed() {
            local resource_address="$1"
            local secret_name="$2"

            local managed_resources
            managed_resources="$(terraform state list)"
            if grep -Fxq "${resource_address}" <<< "${managed_resources}"; then
              echo "Terraform already manages ${resource_address}."
              return
            fi

            local metadata
            if ! metadata="$(aws secretsmanager describe-secret \
              --secret-id "${secret_name}" \
              --query '[ARN,RotationEnabled]' \
              --output text 2>/dev/null)"; then
              echo "Secret ${secret_name} does not exist yet; Terraform will create its rotation."
              return
            fi

            local secret_arn rotation_enabled
            read -r secret_arn rotation_enabled <<< "${metadata}"
            if [ "${rotation_enabled}" != "True" ]; then
              echo "Rotation is not enabled for ${secret_name}; Terraform will configure it."
              return
            fi

            echo "Importing existing rotation for ${secret_name} into ${resource_address}."
            terraform import -input=false "${resource_address}" "${secret_arn}"
          }

          import_rotation_if_needed \
            aws_secretsmanager_secret_rotation.service_rds \
            financial-service-rds-password
          import_rotation_if_needed \
            aws_secretsmanager_secret_rotation.ops_rds \
            financial-ops-rds-password

      - name: Apply IAM module
        if: contains(fromJSON('["apply","reapply"]'), inputs.action)
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=module.iam
          $TF_MOVED_RESOURCE_TARGETS

      - name: Wait for IAM permissions to propagate
        if: contains(fromJSON('["apply","reapply"]'), inputs.action)
        run: sleep 30

      - name: Refresh AWS credentials after permission update
        if: contains(fromJSON('["apply","reapply"]'), inputs.action)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply KMS module
        if: contains(fromJSON('["apply","reapply"]'), inputs.action)
        working-directory: kms
        run: |
          terraform init -reconfigure
          terraform apply -auto-approve -input=false -lock-timeout=5m

      - name: Apply security module
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=module.security
          $TF_MOVED_RESOURCE_TARGETS

      - name: Destroy CodeBuild project
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=aws_codebuild_project.ansible_bootstrap
          -target=aws_codebuild_project.gitops_bootstrap
          -target=aws_codebuild_project.cluster_status
          -target=aws_codebuild_project.gitea_auth_debug
          -target=aws_codebuild_project.debug
          -target=aws_codebuild_project.service_cluster_status
          -target=aws_codebuild_project.manifest_updater

      - name: Destroy CodeBuild permissions, EKS access, and security group
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=aws_eks_access_policy_association.manifest_updater_ops_admin
          -target=aws_eks_access_entry.manifest_updater_ops
          -target=aws_eks_access_policy_association.ansible_codebuild_ops_admin
          -target=aws_eks_access_entry.ansible_codebuild_ops
          -target=aws_eks_access_policy_association.ansible_codebuild_service_admin
          -target=aws_eks_access_entry.ansible_codebuild_service
          -target=aws_security_group_rule.service_cluster_status_to_service_eks_api
          -target=aws_security_group.service_cluster_status_codebuild
          -target=aws_security_group.manifest_updater_codebuild
          -target=aws_security_group.ansible_codebuild
          -target=aws_iam_role_policy.manifest_updater_codebuild
          -target=aws_iam_role.manifest_updater_codebuild
          -target=aws_iam_role_policy.ansible_codebuild
          -target=aws_iam_role.ansible_codebuild

      - name: Destroy VPC peering
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false -lock-timeout=5m -target=module.vpc_peering

      # EKS 클러스터가 살아있는 동안 LB만 지우면 aws-load-balancer-controller가
      # Ingress/Service 를 보고 수 초 내 LB 를 재생성 → 이후 서브넷/IGW destroy 가
      # 고아 LB ENI 에 막힌다. 그래서 LB 를 지우기 전에 LB 를 "소유"한 k8s 오브젝트
      # (Ingress, type=LoadBalancer Service)를 먼저 삭제한다. 살아있는 컨트롤러가
      # finalizer 를 통해 LB 를 스스로 정리하고 재생성도 하지 않는다. 컨트롤러가
      # 멈춰 finalizer 가 안 풀리는 경우 대비해 강제 finalizer 제거 폴백을 둔다.
      - name: Delete Kubernetes LB-owning resources before load balancer cleanup
        if: inputs.action == 'destroy'
        continue-on-error: true
        shell: bash
        run: |
          set +e

          drain_lb_owners() {
            local cluster="$1"
            echo "=== ${cluster}: LB 소유 오브젝트(Ingress/LoadBalancer Service) 정리 시작 ==="

            if ! aws eks update-kubeconfig --name "${cluster}" --region "${AWS_REGION}"; then
              echo "::warning::${cluster} kubeconfig 갱신 실패 — 이미 삭제됐거나 접근 불가. 스킵."
              return
            fi

            # 1) 모든 Ingress 삭제 → ALB 컨트롤러가 ALB 를 정리하고 finalizer 해제
            kubectl delete ingress --all --all-namespaces --timeout=120s || true

            # 2) type=LoadBalancer Service 삭제 → NLB/CLB 컨트롤러가 정리
            #    (ClusterIP/NodePort 는 LB 를 만들지 않으므로 건드리지 않는다)
            local lb_svcs
            lb_svcs=$(kubectl get svc --all-namespaces \
              -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' 2>/dev/null)
            for entry in ${lb_svcs}; do
              ns="${entry%%/*}"; name="${entry##*/}"
              echo "  삭제: svc ${ns}/${name}"
              kubectl delete svc "${name}" -n "${ns}" --timeout=120s || true
            done

            # 3) 폴백: finalizer 가 안 풀려 아직 남은 오브젝트는 finalizer 강제 제거
            #    (컨트롤러가 이미 죽었으면 재생성 주체가 없으므로 강제 제거해도 안전)
            for entry in ${lb_svcs}; do
              ns="${entry%%/*}"; name="${entry##*/}"
              if kubectl get svc "${name}" -n "${ns}" >/dev/null 2>&1; then
                echo "  finalizer 강제 제거: svc ${ns}/${name}"
                kubectl patch svc "${name}" -n "${ns}" --type=merge -p '{"metadata":{"finalizers":[]}}' || true
              fi
            done
            for entry in $(kubectl get ingress --all-namespaces \
              -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}' 2>/dev/null); do
              ns="${entry%%/*}"; name="${entry##*/}"
              echo "  finalizer 강제 제거: ingress ${ns}/${name}"
              kubectl patch ingress "${name}" -n "${ns}" --type=merge -p '{"metadata":{"finalizers":[]}}' || true
            done

            echo "=== ${cluster}: LB 소유 오브젝트 정리 완료 ==="
          }

          drain_lb_owners financial-ops-eks
          drain_lb_owners financial-service-eks

      - name: Delete load balancers outside Terraform state
        if: inputs.action == 'destroy'
        shell: bash
        run: |
          set -euo pipefail

          # terraform state에 해당 VPC 리소스가 없더라도, 이전 부분 apply나
          # 실패한 destroy가 남긴 LB/NLB는 AWS에 존재할 수 있다. State 유무로
          # 정리 대상을 건너뛰면 고아 ENI가 subnet/IGW/SG 삭제를 막는다.
          expected_vpc_names=(
            financial-vpc1-service
            financial-vpc2-ops
            financial-vpc3-teleport
            financial-vpc4-headscale
          )
          vpc_ids=()
          for vpc_name in "${expected_vpc_names[@]}"; do
            mapfile -t matched_vpcs < <(
              aws ec2 describe-vpcs \
                --filters "Name=tag:Name,Values=${vpc_name}" \
                --query 'Vpcs[].VpcId' \
                --output text | tr '\t' '\n' | sed '/^$/d'
            )

            if [ "${#matched_vpcs[@]}" -eq 0 ]; then
              echo "VPC ${vpc_name} does not exist; skipping."
              continue
            fi

            if [ "${#matched_vpcs[@]}" -ne 1 ]; then
              echo "::error::Expected exactly one VPC named ${vpc_name}, found ${#matched_vpcs[@]}."
              exit 1
            fi

            echo "Resolved ${vpc_name} to ${matched_vpcs[0]}."
            vpc_ids+=("${matched_vpcs[0]}")
          done

          if [ "${#vpc_ids[@]}" -eq 0 ]; then
            echo "No managed VPCs found for load balancer cleanup."
            exit 0
          fi

          for vpc_id in "${vpc_ids[@]}"; do
            echo "Cleaning load balancers in ${vpc_id}."

            mapfile -t classic_lbs < <(
              aws elb describe-load-balancers \
                --query "LoadBalancerDescriptions[?VPCId=='${vpc_id}'].LoadBalancerName" \
                --output text | tr '\t' '\n' | sed '/^$/d'
            )
            for lb in "${classic_lbs[@]}"; do
              echo "Deleting Classic ELB ${lb} in ${vpc_id}."
              aws elb delete-load-balancer --load-balancer-name "${lb}"
            done

            mapfile -t lbv2_arns < <(
              aws elbv2 describe-load-balancers \
                --query "LoadBalancers[?VpcId=='${vpc_id}'].LoadBalancerArn" \
                --output text | tr '\t' '\n' | sed '/^$/d'
            )
            for arn in "${lbv2_arns[@]}"; do
              echo "Deleting ALB/NLB ${arn} in ${vpc_id}."
              aws elbv2 delete-load-balancer --load-balancer-arn "${arn}"
            done
          done

          echo "Waiting for load balancer ENIs to disappear."
          for attempt in {1..60}; do
            lb_eni_count=0
            for vpc_id in "${vpc_ids[@]}"; do
              count="$(aws ec2 describe-network-interfaces \
                --filters Name=vpc-id,Values="${vpc_id}" \
                --query "length(NetworkInterfaces[?starts_with(Description, 'ELB')])" \
                --output text)"
              lb_eni_count=$((lb_eni_count + count))
            done

            if [ "${lb_eni_count}" -eq 0 ]; then
              echo "No load balancer ENIs remain in managed VPCs."
              break
            fi

            echo "Still waiting for ${lb_eni_count} load balancer ENI(s) to disappear."
            sleep 10
          done

          if [ "${lb_eni_count}" -ne 0 ]; then
            echo "::error::Load balancer ENIs still exist after waiting for cleanup."
            for vpc_id in "${vpc_ids[@]}"; do
              aws ec2 describe-network-interfaces \
                --filters Name=vpc-id,Values="${vpc_id}" \
                --query "NetworkInterfaces[?starts_with(Description, 'ELB')].{Id:NetworkInterfaceId,Description:Description,Status:Status,Type:InterfaceType,Owner:Attachment.InstanceOwnerId}" \
                --output table || true
            done
            exit 1
          fi

          for vpc_id in "${vpc_ids[@]}"; do
            mapfile -t k8s_elb_sgs < <(
              aws ec2 describe-security-groups \
                --filters Name=vpc-id,Values="${vpc_id}" Name=group-name,Values="k8s-*" \
                --query 'SecurityGroups[].GroupId' \
                --output text | tr '\t' '\n' | sed '/^$/d'
            )
            for sg_id in "${k8s_elb_sgs[@]}"; do
              echo "Deleting Kubernetes-managed security group ${sg_id} in ${vpc_id}."
              aws ec2 delete-security-group --group-id "${sg_id}" || true
            done
          done

      # PVC 선삭제: 고아 EBS 방지
      # EKS destroy 전에 PVC를 지우지 않으면 EBS 볼륨이 available 상태로 잔존한다.
      # 클러스터 접근 불가(이미 삭제됨 등) 시에도 destroy가 중단되지 않도록 continue-on-error.
      - name: Report remaining VPC dependencies before Terraform destroy
        if: inputs.action == 'destroy'
        shell: bash
        run: |
          set -euo pipefail

          # LB 정리 단계와 같은 기준으로 AWS의 실제 VPC를 조회한다. Terraform
          # state가 일부만 남은 상황에서도 삭제를 막는 ENI/SG를 진단해야 한다.
          expected_vpc_names=(
            financial-vpc1-service
            financial-vpc2-ops
            financial-vpc3-teleport
            financial-vpc4-headscale
          )
          vpc_ids=()
          for vpc_name in "${expected_vpc_names[@]}"; do
            mapfile -t matched_vpcs < <(
              aws ec2 describe-vpcs \
                --filters "Name=tag:Name,Values=${vpc_name}" \
                --query 'Vpcs[].VpcId' \
                --output text | tr '\t' '\n' | sed '/^$/d'
            )

            if [ "${#matched_vpcs[@]}" -eq 1 ]; then
              vpc_ids+=("${matched_vpcs[0]}")
            elif [ "${#matched_vpcs[@]}" -gt 1 ]; then
              echo "::error::Expected exactly one VPC named ${vpc_name}, found ${#matched_vpcs[@]}."
              exit 1
            fi
          done

          if [ "${#vpc_ids[@]}" -eq 0 ]; then
            echo "No managed VPCs remain."
            exit 0
          fi

          for vpc_id in "${vpc_ids[@]}"; do
            echo "===== Remaining dependencies in ${vpc_id} ====="

            echo "--- Load balancers ---"
            aws elbv2 describe-load-balancers \
              --query "LoadBalancers[?VpcId=='${vpc_id}'].{Name:LoadBalancerName,Arn:LoadBalancerArn,State:State.Code}" \
              --output table || true
            aws elb describe-load-balancers \
              --query "LoadBalancerDescriptions[?VPCId=='${vpc_id}'].{Name:LoadBalancerName,DNS:DNSName}" \
              --output table || true

            echo "--- Network interfaces ---"
            aws ec2 describe-network-interfaces \
              --filters Name=vpc-id,Values="${vpc_id}" \
              --query "NetworkInterfaces[].{Id:NetworkInterfaceId,Status:Status,Subnet:SubnetId,Description:Description,Requester:RequesterId,PublicIp:Association.PublicIp}" \
              --output table || true

            echo "--- Non-default security groups ---"
            aws ec2 describe-security-groups \
              --filters Name=vpc-id,Values="${vpc_id}" \
              --query "SecurityGroups[?GroupName!='default'].{Id:GroupId,Name:GroupName,Description:Description}" \
              --output table || true

            echo "--- VPC endpoints ---"
            aws ec2 describe-vpc-endpoints \
              --filters Name=vpc-id,Values="${vpc_id}" \
              --query "VpcEndpoints[].{Id:VpcEndpointId,State:State,Service:ServiceName}" \
              --output table || true
          done

      - name: Delete PVCs before EKS destroy
        if: inputs.action == 'destroy'
        continue-on-error: true
        shell: bash
        run: |
          set +e

          delete_pvcs() {
            local cluster="$1"
            echo "=== ${cluster}: PVC 정리 시작 ==="

            if ! aws eks update-kubeconfig --name "${cluster}" --region "${AWS_REGION}"; then
              echo "::warning::${cluster} kubeconfig 갱신 실패 — 이미 삭제됐거나 접근 불가. 스킵."
              return
            fi

            namespaces=$(kubectl get ns -o jsonpath='{.items[*].metadata.name}' 2>/dev/null) || true
            for ns in $namespaces; do
              kubectl delete pvc --all -n "${ns}" --timeout=120s || true
            done

            echo "=== ${cluster}: PVC 정리 완료 ==="
          }

          delete_pvcs financial-ops-eks
          delete_pvcs financial-service-eks

          # StatefulSet PVC 삭제 지연 대응: 고정 sleep → available EBS 0 폴링
          # git 2개 + observability 4개 = 6개 PVC의 EBS가 해제될 때까지 대기.
          # 폴링만 수행(삭제 없음) — 다른 available 볼륨 오삭제 방지.
          echo "=== available EBS 폴링 시작 (financial-*-eks-dynamic-pvc-*, 최대 180s) ==="
          MAX_POLLS=18
          for i in $(seq 1 ${MAX_POLLS}); do
            COUNT=$(aws ec2 describe-volumes \
              --filters "Name=status,Values=available" \
                        "Name=tag:Name,Values=financial-*-eks-dynamic-pvc-*" \
              --region ap-northeast-2 \
              --query "length(Volumes)" \
              --output text 2>/dev/null) || COUNT="-1"

            echo "[${i}/${MAX_POLLS}] available EBS count: ${COUNT}"

            if [ "${COUNT}" = "0" ]; then
              echo "=== available EBS 0 확인 — 폴링 완료 ==="
              break
            fi

            if [ "${i}" -eq "${MAX_POLLS}" ]; then
              echo "::warning::180s 내 available EBS가 0이 되지 않음 (마지막 count: ${COUNT}). destroy 계속 진행."
              break
            fi

            sleep 10
          done

      # EKS/NLB 삭제는 1시간 이상 걸릴 수 있다. 초기 OIDC 자격증명(기본 1시간)이
      # 만료되면 Terraform이 S3 state lock을 해제하지 못하므로, 마지막 destroy
      # 직전에 새 자격증명을 발급한다.
      - name: Refresh AWS credentials before VPC destroy
        if: inputs.action == 'destroy'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      # WorkGroup만 삭제하면 결과 S3 버킷, Glue 카탈로그, SIEM 쿼리 역할이 남으므로
      # 관련 Terraform 리소스를 명시한다. CloudTrail·SNS·Prowler 등
      # 나머지 module.security 보안 기반 리소스는 의도적으로 보존한다.
      - name: Destroy SIEM Athena resources
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=module.security.aws_athena_workgroup.siem
          -target=module.security.aws_glue_catalog_table.cloudtrail
          -target=module.security.aws_glue_catalog_table.alb
          -target=module.security.aws_glue_catalog_table.prowler
          -target=module.security.aws_glue_catalog_database.siem
          -target=module.security.aws_iam_role_policy.siem_athena_query
          -target=module.security.aws_iam_role.siem_athena_query
          -target=module.security.aws_s3_bucket_lifecycle_configuration.siem_athena_results
          -target=module.security.aws_s3_bucket_server_side_encryption_configuration.siem_athena_results
          -target=module.security.aws_s3_bucket_public_access_block.siem_athena_results
          -target=module.security.aws_s3_bucket.siem_athena_results

      # slack-broker.tf 리소스 정리. 생성 역순: 커스텀 도메인(route53_record →
      # base_path_mapping → domain_name)을 가장 먼저 제거한 뒤, wafv2_web_acl_association
      # (API GW stage를 참조), API Gateway → Lambda → SQS 순으로 제거한다.
      # data.archive_file은 데이터 소스라 destroy 대상이 아니므로 타겟하지 않는다.
      - name: Destroy Slack broker
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=aws_route53_record.slack_broker
          -target=aws_api_gateway_base_path_mapping.slack_broker
          -target=aws_api_gateway_domain_name.slack_broker
          -target=aws_wafv2_web_acl_association.slack_broker_api
          -target=aws_api_gateway_stage.slack_broker
          -target=aws_api_gateway_deployment.slack_broker
          -target=aws_lambda_permission.apigw_invoke_slack_inbound
          -target=aws_api_gateway_integration.slack_callback_lambda
          -target=aws_api_gateway_method.slack_callback_post
          -target=aws_api_gateway_resource.slack_callback
          -target=aws_api_gateway_rest_api.slack_broker
          -target=aws_lambda_event_source_mapping.slack_outbound
          -target=aws_lambda_function.slack_outbound
          -target=aws_lambda_function.slack_inbound
          -target=aws_iam_role_policy.slack_outbound_lambda
          -target=aws_iam_role_policy_attachment.slack_outbound_lambda_basic
          -target=aws_iam_role.slack_outbound_lambda
          -target=aws_iam_role_policy.slack_inbound_lambda
          -target=aws_iam_role_policy_attachment.slack_inbound_lambda_basic
          -target=aws_iam_role.slack_inbound_lambda
          -target=aws_sqs_queue.slack_hitl_inbound
          -target=aws_sqs_queue.slack_hitl_inbound_dlq
          -target=aws_sqs_queue.slack_hitl_outbound
          -target=aws_sqs_queue.slack_hitl_outbound_dlq

      - name: Destroy VPCs and EKS
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=module.vpc4
          -target=module.vpc3
          -target=module.vpc2
          -target=module.vpc1

      - name: Apply VPCs and EKS
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=module.vpc1
          -target=module.vpc2
          -target=module.vpc3
          -target=module.vpc4
          $TF_MOVED_RESOURCE_TARGETS

      - name: Apply flow logs
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_iam_role.flowlogs
          -target=aws_iam_role_policy.flowlogs
          -target=aws_cloudwatch_log_group.flowlogs
          -target=aws_flow_log.this
          -target=aws_cloudwatch_log_metric_filter.reject_count
          -target=aws_cloudwatch_log_metric_filter.db_port_probe_vpc1
          -target=aws_sns_topic.security_alerts
          -target=aws_cloudwatch_metric_alarm.db_port_probe_vpc1
          -target=aws_cloudwatch_metric_alarm.reject_burst_vpc1
          -target=aws_s3_bucket.flowlogs_archive
          -target=aws_s3_bucket_versioning.flowlogs_archive
          -target=aws_s3_bucket_ownership_controls.flowlogs_archive
          -target=aws_s3_bucket_public_access_block.flowlogs_archive
          -target=aws_s3_bucket_server_side_encryption_configuration.flowlogs_archive
          -target=aws_s3_bucket_object_lock_configuration.flowlogs_archive
          -target=aws_s3_bucket_lifecycle_configuration.flowlogs_archive
          -target=aws_s3_bucket_policy.flowlogs_archive
          -target=aws_flow_log.s3_archive
          $TF_MOVED_RESOURCE_TARGETS

      - name: Apply secrets
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=random_password.service_rds
          -target=random_password.ops_rds
          -target=aws_secretsmanager_secret.service_rds_password
          -target=aws_secretsmanager_secret_version.service_rds_password
          -target=aws_secretsmanager_secret_rotation.service_rds
          -target=aws_secretsmanager_secret.ops_rds_password
          -target=aws_secretsmanager_secret_version.ops_rds_password
          -target=aws_secretsmanager_secret_rotation.ops_rds
          -target=random_password.temporal_user
          -target=aws_secretsmanager_secret.temporal_rds
          -target=aws_secretsmanager_secret_version.temporal_rds
          -target=aws_secretsmanager_secret.slack_hitl_tokens
          $TF_MOVED_RESOURCE_TARGETS

      - name: Apply VPC peering
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false -lock-timeout=5m -target=module.vpc_peering $TF_MOVED_RESOURCE_TARGETS

      - name: Apply CodeBuild permissions, security group, and project
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_security_group.ansible_codebuild
          -target=aws_iam_role.ansible_codebuild
          -target=aws_iam_role_policy.ansible_codebuild
          -target=aws_eks_access_entry.ansible_codebuild_ops
          -target=aws_eks_access_policy_association.ansible_codebuild_ops_admin
          -target=aws_eks_access_entry.ansible_codebuild_service
          -target=aws_eks_access_policy_association.ansible_codebuild_service_admin
          -target=aws_codebuild_project.ansible_bootstrap
          -target=aws_codebuild_project.gitops_bootstrap
          -target=aws_codebuild_project.cluster_status
          -target=aws_codebuild_project.gitea_auth_debug
          -target=aws_codebuild_project.debug
          -target=aws_security_group.service_cluster_status_codebuild
          -target=aws_security_group_rule.service_cluster_status_to_service_eks_api
          -target=aws_codebuild_project.service_cluster_status
          -target=aws_security_group.manifest_updater_codebuild
          -target=aws_iam_role.manifest_updater_codebuild
          -target=aws_iam_role_policy.manifest_updater_codebuild
          -target=aws_eks_access_entry.manifest_updater_ops
          -target=aws_eks_access_policy_association.manifest_updater_ops_admin
          -target=aws_codebuild_project.manifest_updater
          $TF_MOVED_RESOURCE_TARGETS

      # 루트 레벨 waf.tf 리소스. 타겟 apply 구조라 명시하지 않으면 누락되어
      # WAF web ACL/SSM 파라미터가 생성되지 않는다(시드가 어노테이션 주입할 ARN을
      # SSM에서 읽으므로 시드 스텝보다 반드시 먼저 apply되어야 함).
      - name: Apply WAF
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_wafv2_web_acl.service_alb
          -target=aws_cloudwatch_log_group.waf
          -target=aws_wafv2_web_acl_logging_configuration.service_alb
          -target=aws_ssm_parameter.service_alb_waf_acl_arn
          $TF_MOVED_RESOURCE_TARGETS

      # 루트 레벨 secops-trigger.tf 리소스. 타겟 apply 구조라 명시하지 않으면 누락됨
      # (waf.tf/route53와 동일 갭). SNS 토픽은 module.security/flowlogs가 선행 apply되어
      # 이미 존재하므로 구독/큐만 타겟하면 됨. SQS VPC 엔드포인트는 module.vpc2 스텝에서 적용.
      - name: Apply SecOps trigger
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_sqs_queue.secops_trigger_dlq
          -target=aws_sqs_queue.secops_trigger
          -target=aws_sqs_queue_policy.secops_trigger
          -target=aws_sns_topic_subscription.secops_trigger
          $TF_MOVED_RESOURCE_TARGETS

      # 루트 레벨 slack-broker.tf 리소스. 타겟 apply 구조라 명시하지 않으면 누락됨
      # (waf.tf/secops-trigger.tf와 동일 갭). financial-slack-hitl-tokens 시크릿(secrets.tf)은
      # "Apply secrets" 스텝에서 이미 존재하므로 여기서는 브로커 리소스만 타겟한다.
      # wafv2_web_acl_association은 API Gateway stage + 기존 Web ACL(Apply WAF 스텝)이
      # 있어야 하므로 API Gateway 리소스들 뒤에 둔다.
      - name: Apply Slack broker
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_sqs_queue.slack_hitl_outbound_dlq
          -target=aws_sqs_queue.slack_hitl_outbound
          -target=aws_sqs_queue.slack_hitl_inbound_dlq
          -target=aws_sqs_queue.slack_hitl_inbound
          -target=data.archive_file.slack_inbound
          -target=data.archive_file.slack_outbound
          -target=aws_iam_role.slack_inbound_lambda
          -target=aws_iam_role_policy_attachment.slack_inbound_lambda_basic
          -target=aws_iam_role_policy.slack_inbound_lambda
          -target=aws_iam_role.slack_outbound_lambda
          -target=aws_iam_role_policy_attachment.slack_outbound_lambda_basic
          -target=aws_iam_role_policy.slack_outbound_lambda
          -target=aws_lambda_function.slack_inbound
          -target=aws_lambda_function.slack_outbound
          -target=aws_lambda_event_source_mapping.slack_outbound
          -target=aws_api_gateway_rest_api.slack_broker
          -target=aws_api_gateway_resource.slack_callback
          -target=aws_api_gateway_method.slack_callback_post
          -target=aws_api_gateway_integration.slack_callback_lambda
          -target=aws_lambda_permission.apigw_invoke_slack_inbound
          -target=aws_api_gateway_deployment.slack_broker
          -target=aws_api_gateway_stage.slack_broker
          -target=aws_api_gateway_domain_name.slack_broker
          -target=aws_api_gateway_base_path_mapping.slack_broker
          -target=aws_route53_record.slack_broker
          -target=aws_wafv2_web_acl_association.slack_broker_api
          $TF_MOVED_RESOURCE_TARGETS

      # 루트 레벨 secops-iam-responder.tf 리소스. 타겟 apply 구조라 명시하지 않으면 누락됨
      # (waf.tf/secops-trigger.tf/slack-broker.tf와 동일 갭). 실제로 이 갭 때문에 부분 적용이
      # 발생했었다: module.vpc2(Apply VPCs and EKS 스텝)의 secops_orchestrator_lambda_invoke
      # 정책이 aws_lambda_function.secops_iam_responder.arn을 참조해서 -target=module.vpc2가
      # Lambda 함수 + 그 역할(aws_iam_role.secops_iam_responder_lambda)까지는 의존성으로 자동
      # 포함시켜 만들어졌지만, aws_iam_role_policy/aws_iam_role_policy_attachment는 module.vpc2로
      # 흘러가는 출력이 없어 자동 포함 대상이 아니었다 — role은 생겼는데 정책만 안 붙는 상태로 남음.
      - name: Apply SecOps IAM Responder
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=data.archive_file.secops_iam_responder
          -target=aws_iam_role.secops_iam_responder_lambda
          -target=aws_iam_role_policy_attachment.secops_iam_responder_lambda_basic
          -target=aws_iam_role_policy.secops_iam_responder_lambda_iam_response
          -target=aws_iam_role_policy.secops_iam_responder_lambda_state_check
          -target=aws_lambda_function.secops_iam_responder
          $TF_MOVED_RESOURCE_TARGETS

      - name: Re-apply changed infrastructure
        if: inputs.action == 'reapply'
        run: terraform apply -auto-approve -input=false -lock-timeout=5m

      - name: Final Terraform Plan
        if: inputs.action == 'apply' || inputs.action == 'reapply'
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -out=final.tfplan
          exitcode=$?

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Final terraform plan failed."
            exit 1
          fi

          if [ "${exitcode}" -eq 2 ]; then
            terraform show -no-color final.tfplan
            echo "::error::Final terraform plan still has pending changes. Inspect the plan before running CodeBuild."
            exit 1
          fi

          echo "Final terraform plan has no changes."

      - name: Run bootstrap CodeBuild projects after apply or reapply
        if: inputs.action == 'apply' || inputs.action == 'reapply'
        shell: bash
        run: |
          run_codebuild_and_wait() {
            local project_name="$1"
            local build_id

            build_id="$(aws codebuild start-build --project-name "${project_name}" --query 'build.id' --output text)"
            echo "Started CodeBuild (${project_name}): ${build_id}"

            print_build_diagnostics() {
              echo "::group::CodeBuild phases (${project_name})"
              aws codebuild batch-get-builds \
                --ids "${build_id}" \
                --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus,contexts:contexts}' \
                --output json || true
              echo "::endgroup::"

              log_group="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.groupName' --output text || true)"
              log_stream="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.streamName' --output text || true)"
              deep_link="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.deepLink' --output text || true)"

              echo "CloudWatch log link (${project_name}): ${deep_link}"

              if [ -n "${log_group}" ] && [ "${log_group}" != "None" ] && [ -n "${log_stream}" ] && [ "${log_stream}" != "None" ]; then
                echo "::group::CodeBuild CloudWatch logs (${project_name})"
                aws logs get-log-events \
                  --log-group-name "${log_group}" \
                  --log-stream-name "${log_stream}" \
                  --limit 200 \
                  --query 'events[].message' \
                  --output text || true
                echo "::endgroup::"
              fi
            }

            while true; do
              status="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].buildStatus' --output text)"
              echo "CodeBuild status (${project_name}): ${status}"

              case "${status}" in
                SUCCEEDED)
                  return 0
                  ;;
                FAILED|FAULT|STOPPED|TIMED_OUT)
                  echo "::error::CodeBuild ${project_name} finished with status ${status}."
                  print_build_diagnostics
                  return 1
                  ;;
              esac

              sleep 30
            done
          }

          run_codebuild_and_wait financial-ansible-bootstrap
          run_codebuild_and_wait financial-gitops-bootstrap

      # stock-web ALB는 LB 컨트롤러가 동적으로 생성/재생성하므로 DNS suffix가 바뀐다.
      # route53 alias(data.aws_lb 태그 조회 기반)를 현재 ALB로 재동기화한다.
      # 루트 레벨 리소스라 타겟 apply 구조에서 누락되어 stale-alias가 반복됐다.
      # 시드 이후(ALB 존재 시점)에 실행하며, ALB가 아직 없으면 스킵해 레코드를 지우지 않는다.
      - name: Apply Route53 records to current stock-web ALB
        if: inputs.action == 'apply' || inputs.action == 'reapply'
        shell: bash
        run: |
          alb_count="$(aws elbv2 describe-load-balancers \
            --query "length(LoadBalancers[?contains(LoadBalancerName, 'stockdem-stockweb')])" \
            --output text 2>/dev/null || echo 0)"
          if [ "${alb_count}" = "0" ]; then
            echo "stock-web ALB not found yet; skipping Route53 sync."
            exit 0
          fi
          terraform apply -auto-approve -input=false -lock-timeout=5m -refresh=true \
            -target=aws_route53_health_check.aws_primary \
            -target=aws_route53_health_check.gcp_secondary \
            -target=aws_route53_record.aws_health \
            -target=aws_route53_record.root_primary \
            -target=aws_route53_record.root_secondary \
            -target=aws_route53_record.aws_direct \
            -target=aws_route53_record.gcp_direct

  codebuild-update:
    name: Update selected Ops VPC CodeBuild
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.action == 'codebuild-update'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Targeted Terraform Plan
        shell: bash
        run: |
          set +e
          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -detailed-exitcode \
            -out=codebuild-update.tfplan \
            -target=aws_security_group.ansible_codebuild \
            -target=aws_iam_role.ansible_codebuild \
            -target=aws_iam_role_policy.ansible_codebuild \
            -target=aws_eks_access_entry.ansible_codebuild_ops \
            -target=aws_eks_access_policy_association.ansible_codebuild_ops_admin \
            -target=aws_codebuild_project.gitea_auth_debug \
            -target=aws_codebuild_project.debug \
            $TF_MOVED_RESOURCE_TARGETS
          exitcode=$?

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Targeted CodeBuild terraform plan failed."
            exit 1
          fi

          if [ "${exitcode}" -eq 2 ]; then
            terraform show -no-color codebuild-update.tfplan
          else
            echo "Targeted CodeBuild plan has no changes."
          fi

      - name: Targeted Terraform Apply
        run: terraform apply -auto-approve -input=false -lock-timeout=5m codebuild-update.tfplan

      - name: Start updated CodeBuild project(s)
        if: inputs.run_after_update == true
        shell: bash
        run: |
          set -euo pipefail

          project_name="financial-debug"
          build_id="$(aws codebuild start-build --project-name "${project_name}" --query 'build.id' --output text)"
          echo "Started CodeBuild (${project_name}): ${build_id}"

  codebuild:
    name: Run selected CodeBuild
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && contains(fromJSON('["codebuild","gitops"]'), inputs.action)
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start build and wait
        shell: bash
        run: |
          project_name="financial-ansible-bootstrap"
          if [ "${{ inputs.action }}" = "gitops" ]; then
            project_name="financial-gitops-bootstrap"
          fi

          build_id="$(aws codebuild start-build --project-name "${project_name}" --query 'build.id' --output text)"
          echo "Started CodeBuild (${project_name}): ${build_id}"

          print_build_diagnostics() {
            echo "::group::CodeBuild phases (${project_name})"
            aws codebuild batch-get-builds \
              --ids "${build_id}" \
              --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus,contexts:contexts}' \
              --output json || true
            echo "::endgroup::"

            log_group="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.groupName' --output text || true)"
            log_stream="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.streamName' --output text || true)"
            deep_link="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.deepLink' --output text || true)"

            echo "CloudWatch log link (${project_name}): ${deep_link}"

            if [ -n "${log_group}" ] && [ "${log_group}" != "None" ] && [ -n "${log_stream}" ] && [ "${log_stream}" != "None" ]; then
              echo "::group::CodeBuild CloudWatch logs (${project_name})"
              aws logs get-log-events \
                --log-group-name "${log_group}" \
                --log-stream-name "${log_stream}" \
                --limit 200 \
                --query 'events[].message' \
                --output text || true
              echo "::endgroup::"
            fi
          }

          while true; do
            status="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].buildStatus' --output text)"
            echo "CodeBuild status (${project_name}): ${status}"

            case "${status}" in
              SUCCEEDED)
                exit 0
                ;;
              FAILED|FAULT|STOPPED|TIMED_OUT)
                echo "::error::CodeBuild ${project_name} finished with status ${status}."
                print_build_diagnostics
                exit 1
                ;;
            esac

            sleep 30
          done
