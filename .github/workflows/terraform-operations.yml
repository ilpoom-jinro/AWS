name: Terraform plan / apply / destroy / reapply / codebuild on main branch
run-name: Terraform 운영 작업 - ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: |
          실행 작업 선택
          plan      = 검사만 실행       
          apply     = 인프라 생성
          destroy   = 생성된 인프라 삭제
          reapply   = 변경된 인프라만 반영
          ecr       = ECR repository만 반영
          peering12 = Service VPC와 Ops VPC peering만 반영
          codebuild = Ansible CodeBuild 실행
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
          - reapply
          - ecr
          - peering12
          - codebuild
      confirm_destroy:
        description: |
          destroy 실행 시에만 true로 체크하세요.
          plan/apply/reapply/codebuild에서는 체크하지 않아도 됩니다.
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-operations-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  ANSIBLE_CODEBUILD_REPOSITORY: financial/ansible-codebuild
  INTERNAL_GIT_REPOSITORY: financial/internal-git
  INTERNAL_GIT_SOURCE_IMAGE: gitea/gitea:1.22-rootless
  ARGOCD_REPOSITORY: financial/argocd
  ARGOCD_SOURCE_IMAGE: quay.io/argoproj/argocd:latest
  ARGOCD_REDIS_REPOSITORY: financial/argocd-redis
  ARGOCD_REDIS_SOURCE_IMAGE: docker.io/library/redis:7.4.2-alpine
  PROMETHEUS_REPOSITORY: financial/prometheus
  PROMETHEUS_SOURCE_IMAGE: quay.io/prometheus/prometheus:v3.7.3
  ISTIO_VERSION: "1.30.0"
  ISTIO_REPOSITORY_PREFIX: financial/istio
  TF_MOVED_RESOURCE_TARGETS: >-
    -target=module.iam.aws_iam_group_policy_attachment.platform_deny_destructive
    -target=module.iam.aws_iam_group_policy_attachment.sre_deny_destructive
  TF_VAR_dev_mode: "true"   # 개발 완료 후 이 줄 삭제
  
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.action == 'plan'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Remove legacy CodeCommit state
        shell: bash
        run: |
          mapfile -t codecommit_state < <(terraform state list | grep 'aws_codecommit' || true)
          if [ "${#codecommit_state[@]}" -gt 0 ]; then
            terraform state rm "${codecommit_state[@]}"
          fi

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -out=tfplan
          exitcode=$?

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Terraform plan failed. Check the Terraform Plan step logs for the error details."
            exit 1
          fi

          if [ "${exitcode}" -eq 2 ]; then
            terraform show -no-color tfplan
          fi

          exit 0

  infrastructure:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      contains(fromJSON('["apply","destroy","reapply","ecr","peering12"]'), inputs.action) &&
      (inputs.action != 'destroy' || inputs.confirm_destroy == true)
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Remove legacy CodeCommit state
        shell: bash
        run: |
          mapfile -t codecommit_state < <(terraform state list | grep 'aws_codecommit' || true)
          if [ "${#codecommit_state[@]}" -gt 0 ]; then
            terraform state rm "${codecommit_state[@]}"
          fi

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Apply GitHub Actions role permissions
        if: contains(fromJSON('["apply","reapply","ecr","peering12"]'), inputs.action)
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=module.iam.aws_iam_role_policy.github_actions_terraform
          -target=module.iam.aws_iam_role_policy.github_actions_dev_terraform
          $TF_MOVED_RESOURCE_TARGETS

      - name: Wait for IAM permissions to propagate
        if: contains(fromJSON('["apply","reapply","ecr","peering12"]'), inputs.action)
        run: sleep 30

      - name: Refresh AWS credentials after permission update
        if: contains(fromJSON('["apply","reapply","ecr","peering12"]'), inputs.action)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy CodeBuild project
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false -lock-timeout=5m -target=aws_codebuild_project.ansible_bootstrap

      - name: Destroy CodeBuild permissions, EKS access, and security group
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=aws_eks_access_policy_association.ansible_codebuild_ops_admin
          -target=aws_eks_access_entry.ansible_codebuild_ops
          -target=aws_eks_access_policy_association.ansible_codebuild_service_admin
          -target=aws_eks_access_entry.ansible_codebuild_service
          -target=aws_security_group.ansible_codebuild
          -target=aws_iam_role_policy.ansible_codebuild
          -target=aws_iam_role.ansible_codebuild

      - name: Destroy VPC peering
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false -lock-timeout=5m -target=module.vpc_peering

      - name: Destroy VPCs and EKS
        if: inputs.action == 'destroy'
        run: >
          terraform destroy -auto-approve -input=false -lock-timeout=5m
          -target=module.vpc4
          -target=module.vpc3
          -target=module.vpc2
          -target=module.vpc1

      - name: Apply VPCs and EKS
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=module.vpc1
          -target=module.vpc2
          -target=module.vpc3
          -target=module.vpc4
          $TF_MOVED_RESOURCE_TARGETS

      - name: Apply VPC peering
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false -lock-timeout=5m -target=module.vpc_peering $TF_MOVED_RESOURCE_TARGETS

      - name: Apply Service-Ops VPC peering
        if: inputs.action == 'peering12'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=module.vpc_peering.aws_vpc_peering_connection.vpc1_vpc2
          -target=module.vpc_peering.aws_route.vpc1_to_vpc2_public
          -target=module.vpc_peering.aws_route.vpc1_to_vpc2_private
          -target=module.vpc_peering.aws_route.vpc1_to_vpc2_db
          -target=module.vpc_peering.aws_route.vpc2_to_vpc1_private
          -target=module.vpc_peering.aws_route.vpc2_to_vpc1_db
          $TF_MOVED_RESOURCE_TARGETS

      - name: Apply ECR repositories
        if: inputs.action == 'apply' || inputs.action == 'ecr'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_ecr_repository.ansible_codebuild
          -target=aws_ecr_lifecycle_policy.ansible_codebuild
          -target=aws_ecr_repository.internal_git
          -target=aws_ecr_lifecycle_policy.internal_git
          -target=aws_ecr_repository.argocd
          -target=aws_ecr_lifecycle_policy.argocd
          -target=aws_ecr_repository.argocd_redis
          -target=aws_ecr_lifecycle_policy.argocd_redis
          -target=aws_ecr_repository.prometheus
          -target=aws_ecr_lifecycle_policy.prometheus
          -target=aws_ecr_repository.istio_pilot
          -target=aws_ecr_lifecycle_policy.istio_pilot
          -target=aws_ecr_repository.istio_proxyv2
          -target=aws_ecr_lifecycle_policy.istio_proxyv2
          -target=aws_ecr_repository.istio_install_cni
          -target=aws_ecr_lifecycle_policy.istio_install_cni
          -target=aws_ecr_repository.istio_ztunnel
          -target=aws_ecr_lifecycle_policy.istio_ztunnel
          $TF_MOVED_RESOURCE_TARGETS

      - name: Apply CodeBuild permissions, security group, and project
        if: inputs.action == 'apply'
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_security_group.ansible_codebuild
          -target=aws_iam_role.ansible_codebuild
          -target=aws_iam_role_policy.ansible_codebuild
          -target=aws_eks_access_entry.ansible_codebuild_ops
          -target=aws_eks_access_policy_association.ansible_codebuild_ops_admin
          -target=aws_eks_access_entry.ansible_codebuild_service
          -target=aws_eks_access_policy_association.ansible_codebuild_service_admin
          -target=aws_codebuild_project.ansible_bootstrap
          -target=aws_security_group.manifest_updater_codebuild
          -target=aws_iam_role.manifest_updater_codebuild
          -target=aws_iam_role_policy.manifest_updater_codebuild
          -target=aws_eks_access_entry.manifest_updater_ops
          -target=aws_eks_access_policy_association.manifest_updater_ops_admin
          -target=aws_codebuild_project.manifest_updater
          $TF_MOVED_RESOURCE_TARGETS

      - name: Login to Amazon ECR
        if: inputs.action == 'apply'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Ansible CodeBuild runtime image
        if: inputs.action == 'apply'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ANSIBLE_CODEBUILD_REPOSITORY}"

          docker build \
            -f tools/ansible-codebuild/Dockerfile \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            .

          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

      - name: Mirror platform images to ECR
        if: inputs.action == 'apply'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          mirror_image() {
            source_image="$1"
            target_image="$2"

            docker pull "${source_image}"
            docker tag "${source_image}" "${target_image}"
            docker push "${target_image}"
          }

          mirror_image "${INTERNAL_GIT_SOURCE_IMAGE}" "${REGISTRY}/${INTERNAL_GIT_REPOSITORY}:latest"
          mirror_image "${ARGOCD_SOURCE_IMAGE}" "${REGISTRY}/${ARGOCD_REPOSITORY}:latest"
          mirror_image "${ARGOCD_REDIS_SOURCE_IMAGE}" "${REGISTRY}/${ARGOCD_REDIS_REPOSITORY}:latest"
          mirror_image "${PROMETHEUS_SOURCE_IMAGE}" "${REGISTRY}/${PROMETHEUS_REPOSITORY}:v3.7.3"

          for image in pilot proxyv2 install-cni ztunnel; do
            for tag in "${ISTIO_VERSION}" "${ISTIO_VERSION}-distroless"; do
              mirror_image \
                "docker.io/istio/${image}:${tag}" \
                "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:${tag}"
            done

            docker tag "docker.io/istio/${image}:${ISTIO_VERSION}" "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:latest"
            docker push "${REGISTRY}/${ISTIO_REPOSITORY_PREFIX}/${image}:latest"
          done

      - name: Re-apply changed infrastructure
        if: inputs.action == 'reapply'
        run: terraform apply -auto-approve -input=false -lock-timeout=5m

      - name: Final Terraform Plan
        if: inputs.action == 'apply' || inputs.action == 'reapply'
        shell: bash
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -out=final.tfplan
          exitcode=$?

          if [ "${exitcode}" -eq 1 ]; then
            echo "::error::Final terraform plan failed."
            exit 1
          fi

          if [ "${exitcode}" -eq 2 ]; then
            terraform show -no-color final.tfplan
            echo "::error::Final terraform plan still has pending changes. Inspect the plan before running CodeBuild."
            exit 1
          fi

          echo "Final terraform plan has no changes."

      - name: Run Ansible CodeBuild after apply
        if: inputs.action == 'apply'
        shell: bash
        run: |
          build_id="$(aws codebuild start-build --project-name financial-ansible-bootstrap --query 'build.id' --output text)"
          echo "Started CodeBuild: ${build_id}"

          print_build_diagnostics() {
            echo "::group::CodeBuild phases"
            aws codebuild batch-get-builds \
              --ids "${build_id}" \
              --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus,contexts:contexts}' \
              --output json || true
            echo "::endgroup::"

            log_group="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.groupName' --output text || true)"
            log_stream="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.streamName' --output text || true)"
            deep_link="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.deepLink' --output text || true)"

            echo "CloudWatch log link: ${deep_link}"

            if [ -n "${log_group}" ] && [ "${log_group}" != "None" ] && [ -n "${log_stream}" ] && [ "${log_stream}" != "None" ]; then
              echo "::group::CodeBuild CloudWatch logs"
              aws logs get-log-events \
                --log-group-name "${log_group}" \
                --log-stream-name "${log_stream}" \
                --limit 200 \
                --query 'events[].message' \
                --output text || true
              echo "::endgroup::"
            fi
          }

          while true; do
            status="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].buildStatus' --output text)"
            echo "CodeBuild status: ${status}"

            case "${status}" in
              SUCCEEDED)
                exit 0
                ;;
              FAILED|FAULT|STOPPED|TIMED_OUT)
                echo "::error::CodeBuild finished with status ${status}."
                print_build_diagnostics
                exit 1
                ;;
            esac

            sleep 30
          done

  codebuild:
    name: Run Ansible CodeBuild
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && inputs.action == 'codebuild'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start build and wait
        shell: bash
        run: |
          build_id="$(aws codebuild start-build --project-name financial-ansible-bootstrap --query 'build.id' --output text)"
          echo "Started CodeBuild: ${build_id}"

          print_build_diagnostics() {
            echo "::group::CodeBuild phases"
            aws codebuild batch-get-builds \
              --ids "${build_id}" \
              --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus,contexts:contexts}' \
              --output json || true
            echo "::endgroup::"

            log_group="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.groupName' --output text || true)"
            log_stream="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.streamName' --output text || true)"
            deep_link="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.deepLink' --output text || true)"

            echo "CloudWatch log link: ${deep_link}"

            if [ -n "${log_group}" ] && [ "${log_group}" != "None" ] && [ -n "${log_stream}" ] && [ "${log_stream}" != "None" ]; then
              echo "::group::CodeBuild CloudWatch logs"
              aws logs get-log-events \
                --log-group-name "${log_group}" \
                --log-stream-name "${log_stream}" \
                --limit 200 \
                --query 'events[].message' \
                --output text || true
              echo "::endgroup::"
            fi
          }

          while true; do
            status="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].buildStatus' --output text)"
            echo "CodeBuild status: ${status}"

            case "${status}" in
              SUCCEEDED)
                exit 0
                ;;
              FAILED|FAULT|STOPPED|TIMED_OUT)
                echo "::error::CodeBuild finished with status ${status}."
                print_build_diagnostics
                exit 1
                ;;
            esac

            sleep 30
          done
