name: AIOps Slack HITL test
run-name: AIOps Slack HITL test - ${{ inputs.action }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: Test action for the dedicated AIOps remediation workload.
        required: true
        default: inject
        type: choice
        options:
          - inject
          - status
          - cleanup
      restart:
        description: Inject the restart remediation scenario. Select exactly one scenario for inject.
        required: false
        default: false
        type: boolean
      scale_out:
        description: Inject the HPA scale-out remediation scenario. Select exactly one scenario for inject.
        required: false
        default: false
        type: boolean
      rollback:
        description: Inject the rollout rollback remediation scenario. Select exactly one scenario for inject.
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: aiops-hitl-test
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
  CODEBUILD_PROJECT: financial-debug
  TEST_NAMESPACE: aiops-mas
  TEST_DEPLOYMENT: aiops-hitl-crashloop

jobs:
  run-test-command:
    name: ${{ inputs.action }} AIOps HITL test workload
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 15

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          retry-max-attempts: 3
          action-timeout-s: 120

      - name: Select fixed test command
        id: command
        shell: bash
        env:
          ACTION: ${{ inputs.action }}
          RESTART: ${{ inputs.restart }}
          SCALE_OUT: ${{ inputs.scale_out }}
          ROLLBACK: ${{ inputs.rollback }}
          TEST_NAMESPACE: ${{ env.TEST_NAMESPACE }}
          TEST_DEPLOYMENT: ${{ env.TEST_DEPLOYMENT }}
        run: |
          set -euo pipefail

          selected=()
          [[ "${RESTART}" == "true" ]] && selected+=("restart")
          [[ "${SCALE_OUT}" == "true" ]] && selected+=("scale_out")
          [[ "${ROLLBACK}" == "true" ]] && selected+=("rollback")

          case "${ACTION}" in
            inject)
              if [[ "${#selected[@]}" -ne 1 ]]; then
                echo "For inject, select exactly one of restart, scale_out, or rollback." >&2
                exit 1
              fi
              scenario="${selected[0]}"
              command="kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" set env deployment/\"${TEST_DEPLOYMENT}\" AIOPS_TEST_MODE=healthy AIOPS_TEST_STRATEGY=; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" scale deployment/\"${TEST_DEPLOYMENT}\" --replicas=1; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" rollout status deployment/\"${TEST_DEPLOYMENT}\" --timeout=120s"
              if [[ "${scenario}" == "scale_out" ]]; then
                command="${command}; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get hpa \"${TEST_DEPLOYMENT}\"-hpa >/dev/null 2>&1 || kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" autoscale deployment/\"${TEST_DEPLOYMENT}\" --min=1 --max=1 --cpu-percent=80"
              fi
              command="${command}; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" set env deployment/\"${TEST_DEPLOYMENT}\" AIOPS_TEST_MODE=failure AIOPS_TEST_STRATEGY=${scenario}; sleep 90; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get deployment/\"${TEST_DEPLOYMENT}\"; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get pods -l app=\"${TEST_DEPLOYMENT}\" -o wide"
              ;;
            status)
              command="kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get deployment/\"${TEST_DEPLOYMENT}\"; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get pods -l app=\"${TEST_DEPLOYMENT}\" -o wide; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get hpa \"${TEST_DEPLOYMENT}\"-hpa --ignore-not-found; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get role/aiops-hitl-test-remediation rolebinding/aiops-hitl-test-remediation"
              ;;
            cleanup)
              command="kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" delete hpa \"${TEST_DEPLOYMENT}\"-hpa --ignore-not-found; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" set env deployment/\"${TEST_DEPLOYMENT}\" AIOPS_TEST_MODE=healthy AIOPS_TEST_STRATEGY=; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" scale deployment/\"${TEST_DEPLOYMENT}\" --replicas=0; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" delete pod -l app=\"${TEST_DEPLOYMENT}\" --ignore-not-found; kubectl --context \"\${OPS_CONTEXT}\" -n \"${TEST_NAMESPACE}\" get deployment/\"${TEST_DEPLOYMENT}\""
              ;;
            *)
              echo "Unsupported action: ${ACTION}" >&2
              exit 1
              ;;
          esac

          printf 'command=%s\n' "${command}" >> "${GITHUB_OUTPUT}"

      - name: Run test command in Ops VPC CodeBuild
        id: build
        shell: bash
        env:
          OPS_VPC_COMMAND: ${{ steps.command.outputs.command }}
        run: |
          set -euo pipefail

          jq -n --arg command "${OPS_VPC_COMMAND}" \
            '[{name: "OPS_VPC_COMMAND", value: $command, type: "PLAINTEXT"}]' \
            > ops-vpc-command-override.json

          build_id="$(
            aws codebuild start-build \
              --project-name "${CODEBUILD_PROJECT}" \
              --environment-variables-override file://ops-vpc-command-override.json \
              --query 'build.id' \
              --output text
          )"
          echo "build_id=${build_id}" >> "${GITHUB_OUTPUT}"
          echo "Started ${CODEBUILD_PROJECT}: ${build_id}"

      - name: Wait for CodeBuild
        shell: bash
        env:
          BUILD_ID: ${{ steps.build.outputs.build_id }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 70); do
            status="$(aws codebuild batch-get-builds --ids "${BUILD_ID}" --query 'builds[0].buildStatus' --output text)"
            echo "${attempt}/70: ${status}"
            case "${status}" in
              SUCCEEDED)
                aws codebuild batch-get-builds --ids "${BUILD_ID}" \
                  --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus}' \
                  --output table
                exit 0
                ;;
              FAILED|FAULT|STOPPED|TIMED_OUT)
                aws codebuild batch-get-builds --ids "${BUILD_ID}" \
                  --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus,contexts:contexts}' \
                  --output json
                exit 1
                ;;
            esac
            sleep 6
          done

          echo "CodeBuild wait timed out: ${BUILD_ID}" >&2
          exit 1
