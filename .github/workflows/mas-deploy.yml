name: Deploy MAS Agents

on:
  push:
    branches:
      - main
      - feature/MAS
    paths:
      - "mas/**"
      - "ansible/group_vars/all.yml"
      - "ansible/playbooks/gitops-mas.yml"
      - "ansible/templates/mas-runtime.yml.j2"
      - "buildspec-mas-gitops-sync.yml"
      - "buildspec-mas-analyze.yml"
      - ".github/workflows/mas-deploy.yml"
      - ".github/workflows/mas-analyze.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: mas-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION_DEV || secrets.AWS_REGION || 'ap-northeast-2' }}
  MAS_BASE_REPOSITORY: financial/mas-base

jobs:
  deploy:
    name: Build and Deploy MAS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compile MAS Python sources
        run: python -m compileall mas/shared mas/pods

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push MAS agent images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ensure_ecr_repository() {
            local repository="$1"

            if aws ecr describe-repositories --repository-names "${repository}" >/dev/null 2>&1; then
              return 0
            fi

            aws ecr create-repository \
              --repository-name "${repository}" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE >/dev/null
          }

          read_agent_repository() {
            local agent_yml="$1"
            awk -F: '/^image_repository:/ { gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2; exit }' "${agent_yml}"
          }

          ensure_ecr_repository "${MAS_BASE_REPOSITORY}"
          BASE_IMAGE_URI="${REGISTRY}/${MAS_BASE_REPOSITORY}"
          image_overrides_file="mas-image-overrides.json"
          printf '{' > "${image_overrides_file}"
          image_override_count=0

          changed_files="$(mktemp)"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            build_all=true
            git ls-files mas > "${changed_files}"
          else
            before="${{ github.event.before }}"

            if [ -z "${before}" ] || [ "${before}" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-list --max-parents=0 HEAD)"
            fi

            git diff --name-only "${before}" "${GITHUB_SHA}" > "${changed_files}"

            if grep -qE '^(mas/base/|mas/shared/|mas/requirements.txt|\.github/workflows/mas-deploy.yml)' "${changed_files}"; then
              build_all=true
            else
              build_all=false
            fi
          fi

          if [ "${build_all}" = "true" ]; then
            echo "Building MAS base image because this run affects shared/base code or was manually triggered."
            docker build \
              -f mas/base/Dockerfile \
              -t "${BASE_IMAGE_URI}:${IMAGE_TAG}" \
              -t "${BASE_IMAGE_URI}:latest" \
              mas

            docker push "${BASE_IMAGE_URI}:${IMAGE_TAG}"
            docker push "${BASE_IMAGE_URI}:latest"
          else
            echo "Skipping MAS base image build; no shared/base changes detected."
          fi

          for agent_dir in mas/pods/*; do
            [ -d "${agent_dir}" ] || continue
            [ -f "${agent_dir}/Dockerfile" ] || continue
            [ -f "${agent_dir}/agent.yml" ] || continue

            agent="$(basename "${agent_dir}")"

            if [ "${build_all}" != "true" ] && ! grep -qE "^mas/pods/${agent}/" "${changed_files}"; then
              echo "Skipping unchanged MAS pod: ${agent}"
              continue
            fi

            repository="$(read_agent_repository "${agent_dir}/agent.yml")"

            if [ -z "${repository}" ]; then
              repository="financial/mas-${agent}"
            fi

            ensure_ecr_repository "${repository}"
            image_uri="${REGISTRY}/${repository}"
            base_image="${BASE_IMAGE_URI}:latest"

            if [ "${build_all}" = "true" ]; then
              base_image="${BASE_IMAGE_URI}:${IMAGE_TAG}"
            fi

            docker build \
              --build-arg "MAS_BASE_IMAGE=${base_image}" \
              -f "${agent_dir}/Dockerfile" \
              -t "${image_uri}:${IMAGE_TAG}" \
              -t "${image_uri}:latest" \
              mas

            docker push "${image_uri}:${IMAGE_TAG}"
            docker push "${image_uri}:latest"

            if [ "${image_override_count}" -gt 0 ]; then
              printf ',' >> "${image_overrides_file}"
            fi
            printf '"%s":"%s"' "${repository}" "${image_uri}:${IMAGE_TAG}" >> "${image_overrides_file}"
            image_override_count=$((image_override_count + 1))
          done

          printf '}' >> "${image_overrides_file}"
          echo "Built MAS image overrides:"
          cat "${image_overrides_file}"

      - name: Sync MAS GitOps manifests
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          overrides = json.loads(Path("mas-image-overrides.json").read_text())
          env_overrides = [
              {
                  "name": "MAS_IMAGE_OVERRIDES",
                  "value": json.dumps(overrides, separators=(",", ":")),
                  "type": "PLAINTEXT",
              }
          ]
          Path("mas-codebuild-env.json").write_text(json.dumps(env_overrides), encoding="utf-8")
          PY

          run_codebuild_and_wait() {
            local project_name="$1"
            shift
            local build_id

            build_id="$(aws codebuild start-build --project-name "${project_name}" "$@" --query 'build.id' --output text)"
            echo "Started CodeBuild (${project_name}): ${build_id}"

            print_build_diagnostics() {
              echo "::group::CodeBuild phases (${project_name})"
              aws codebuild batch-get-builds \
                --ids "${build_id}" \
                --query 'builds[0].phases[].{phase:phaseType,status:phaseStatus,contexts:contexts}' \
                --output json || true
              echo "::endgroup::"

              log_group="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.groupName' --output text || true)"
              log_stream="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.streamName' --output text || true)"
              deep_link="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].logs.deepLink' --output text || true)"

              echo "CloudWatch log link (${project_name}): ${deep_link}"

              if [ -n "${log_group}" ] && [ "${log_group}" != "None" ] && [ -n "${log_stream}" ] && [ "${log_stream}" != "None" ]; then
                echo "::group::CodeBuild CloudWatch logs (${project_name})"
                aws logs get-log-events \
                  --log-group-name "${log_group}" \
                  --log-stream-name "${log_stream}" \
                  --limit 200 \
                  --query 'events[].message' \
                  --output text || true
                echo "::endgroup::"
              fi
            }

            while true; do
              status="$(aws codebuild batch-get-builds --ids "${build_id}" --query 'builds[0].buildStatus' --output text)"
              echo "CodeBuild status (${project_name}): ${status}"

              case "${status}" in
                SUCCEEDED)
                  return 0
                  ;;
                FAILED|FAULT|STOPPED|TIMED_OUT)
                  echo "::error::CodeBuild ${project_name} finished with status ${status}."
                  print_build_diagnostics
                  return 1
                  ;;
              esac

              sleep 30
            done
          }

          run_codebuild_and_wait financial-mas-gitops-sync \
            --environment-variables-override file://mas-codebuild-env.json
