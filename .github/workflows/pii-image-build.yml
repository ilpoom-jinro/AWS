name: Build PII Scan Image

on:
  push:
    branches:
      - main
    paths:
      - "tools/pii-scan/**"
      - ".github/workflows/pii-image-build.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ secrets.AWS_REGION_DEV || secrets.AWS_REGION || 'ap-northeast-2' }}
  # Terraform required vars — 실제 값은 시크릿에서, 없으면 더미로 plan/apply 통과
  TF_VAR_gcp_fixed_ip: ${{ secrets.GCP_FIXED_IP || '1.1.1.1/32' }}
  TF_VAR_oci_headscale_ip: ${{ secrets.OCI_HEADSCALE_IP || '2.2.2.2/32' }}
  TF_VAR_oci_headscale_ip_plain: ${{ secrets.OCI_HEADSCALE_IP_PLAIN || '2.2.2.2' }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY || 'dummy' }}
  TF_VAR_dev_mode: "true"
  PII_SCAN_REPOSITORY: financial/security/pii-scan

jobs:
  build-and-push:
    name: Build and Push PII Scan Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Apply ECR repository
        run: >
          terraform apply -auto-approve -input=false -lock-timeout=5m
          -target=aws_ecr_repository.pii_scan
          -target=aws_ecr_lifecycle_policy.pii_scan

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Build and push PII scan image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${PII_SCAN_REPOSITORY}"

          docker build \
            -f tools/pii-scan/Dockerfile \
            -t "${IMAGE_URI}:${IMAGE_TAG}" \
            -t "${IMAGE_URI}:latest" \
            tools/pii-scan

          PUSH_OUT=$(docker push "${IMAGE_URI}:${IMAGE_TAG}")
          docker push "${IMAGE_URI}:latest"
          DIGEST=$(echo "${PUSH_OUT}" | grep "digest:" | awk '{print $3}')
          cosign sign --yes --key awskms:///alias/key-cosign "${IMAGE_URI}@${DIGEST}"
