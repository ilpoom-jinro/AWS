apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
spec:
  project: ops-infra-project
  source:
    repoURL: http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git
    targetRevision: main
    # gitops/platform/argocd-config/ → Gitea 경로 argocd-config/
    path: argocd-config
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false    # ConfigMap·AppProject 실수 삭제 방지
      selfHeal: true  # 클러스터 내 수동 수정 → Git 상태로 자동 복원
