# gitops/platform/applications/metrics-server.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: 3.12.2
    helm:
      releaseName: metrics-server
      values: |
        args:
          - --kubelet-insecure-tls   # EKS 자체 서명 kubelet 인증서 대응
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
  destination:
    name: financial-service-eks   # service 클러스터에 배포
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true