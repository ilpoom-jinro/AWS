apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    # PSS enforce=baseline: hostNetwork·privileged 등 기본 위험 설정 즉시 차단
    # audit/warn=restricted: restricted 위반 시 감사 로그·경고만 기록 (Enforce 전환 전 영향 파악용)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
