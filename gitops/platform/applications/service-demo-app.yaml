apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://internal-git-http.git.svc.cluster.local:3000/gitops/platform.git
    targetRevision: main
    path: financial-service-eks
    directory:
      recurse: true
  destination:
    name: financial-service-eks
    namespace: stock-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
