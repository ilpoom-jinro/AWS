# audit_logs 테이블 init ArgoCD Application
# sync-wave: -1 → aiops-mas / secops-mas (wave: 0)보다 먼저 sync
# project: ops-infra-project (temporal-prereqs와 동일 — DB 인프라 초기화)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: audit-db-init
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: ops-infra-project
  source:
    repoURL: http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git
    targetRevision: main
    path: financial-ops-eks/audit-db-init
  destination:
    server: https://kubernetes.default.svc
    namespace: audit-db-init
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
