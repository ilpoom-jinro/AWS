apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-mas
  namespace: argocd
spec:
  project: mas-workloads-project
  source:
    repoURL: http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git
    targetRevision: main
    path: financial-ops-eks/aiops-mas
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops-mas
  # AIOps Slack HITL E2E 테스트는 CodeBuild가 전용 Deployment의 replicas와
  # 테스트용 환경변수만 동적으로 제어한다. 이미지/명령/RBAC 등 나머지 스펙은
  # 계속 GitOps로 관리한다.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      namespace: aiops-mas
      name: aiops-hitl-crashloop
      jsonPointers:
        - /spec/replicas
      jqPathExpressions:
        - '.spec.template.spec.containers[] | select(.name == "crashloop").env[] | select(.name == "AIOPS_TEST_MODE").value'
        - '.spec.template.spec.containers[] | select(.name == "crashloop").env[] | select(.name == "AIOPS_TEST_STRATEGY").value'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
