apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies-service
  namespace: argocd
spec:
  project: ops-infra-project
  source:
    repoURL: http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git
    targetRevision: main
    path: kyverno
    kustomize: {}
  destination:
    name: financial-service-eks
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
