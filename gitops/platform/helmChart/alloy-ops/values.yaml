image:
  registry: REPLACE_WITH_ECR_REGISTRY
  repository: financial/monitoring/alloy
  tag: latest
  pullPolicy: Always

alloy:
  # Cilium enforce 전(#79): Grafana Labs 익명 사용 통계 전송(GCP:443)이 enforce 시
  # DROP됨. 관측 스택 외부 egress는 감사상 제거 대상이라 정책으로 여는 대신 끈다.
  # (chart values.yaml:88 alloy.enableReporting → false 시 템플릿이 alloy run에
  # --disable-reporting 플래그를 자동으로 붙임, templates/containers/_agent.yaml:12-14)
  enableReporting: false

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  configMap:
    create: true
    content: |
      logging {
        level = "info"
      }

      discovery.kubernetes "local_pods" {
        role = "pod"

        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("HOSTNAME")
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.ops_loki.receiver]
      }

      loki.write "ops_loki" {
        endpoint {
          url = "http://observability-loki.observability.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      discovery.relabel "annotated_pod_metrics" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_ip", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          separator     = ";"
          target_label  = "__address__"
          regex         = "(.+);(.+)"
          replacement   = "$1:$2"
        }
      }

      prometheus.scrape "annotated_pods" {
        targets         = discovery.relabel.annotated_pod_metrics.output
        scrape_interval = "60s"
        forward_to      = [prometheus.relabel.ops_metric_filter.receiver]
      }

      prometheus.scrape "kubelet" {
        targets = [{
          "__address__"     = "kubernetes.default.svc.cluster.local:443",
          "__metrics_path__" = "/api/v1/nodes/" + sys.env("HOSTNAME") + "/proxy/metrics",
        }]
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

        tls_config {
          ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        }

        scrape_interval = "60s"
        forward_to      = [prometheus.relabel.ops_metric_filter.receiver]
      }

      prometheus.scrape "cadvisor" {
        targets = [{
          "__address__"     = "kubernetes.default.svc.cluster.local:443",
          "__metrics_path__" = "/api/v1/nodes/" + sys.env("HOSTNAME") + "/proxy/metrics/cadvisor",
        }]
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

        tls_config {
          ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        }

        scrape_interval = "60s"
        forward_to      = [prometheus.relabel.ops_metric_filter.receiver]
      }

      // ── kube-state-metrics (ops 클러스터) ─────────────────────────────
      // aiops-mas, finops-mas 등 ops 워크로드의 파드 상태 메트릭 수집.
      // AIOps 알림 규칙(kube_pod_container_status_* 등)의 ops 클러스터 데이터 소스.
      discovery.kubernetes "kube_state_metrics" {
        role = "pod"
        selectors {
          role  = "pod"
          label = "app.kubernetes.io/name=kube-state-metrics"
        }
      }

      discovery.relabel "kube_state_metrics" {
        targets = discovery.kubernetes.kube_state_metrics.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          regex         = "(.+)"
          replacement   = "$1:8080"
          target_label  = "__address__"
        }
      }

      prometheus.scrape "kube_state_metrics" {
        targets         = discovery.relabel.kube_state_metrics.output
        scrape_interval = "60s"
        // KSM 메트릭은 container 라벨이 메트릭에 포함되므로 필터 없이 직접 전송
        forward_to      = [prometheus.remote_write.ops_thanos.receiver]
      }

      prometheus.relabel "ops_metric_filter" {
        forward_to = [prometheus.remote_write.ops_thanos.receiver]

        rule {
          source_labels = ["__name__"]
          regex         = "go_.*|process_.*|promhttp_.*"
          action        = "drop"
        }

        rule {
          source_labels = ["__name__"]
          regex         = "container_fs_.*|container_network_.*|container_tasks_state|container_threads.*|container_sockets.*"
          action        = "drop"
        }

        rule {
          source_labels = ["container"]
          regex         = "^$|POD"
          action        = "drop"
        }
      }

      prometheus.remote_write "ops_thanos" {
        external_labels = {
          cluster = "financial-ops-eks",
          vpc     = "ops",
        }

        endpoint {
          url = "http://observability-thanos-receive.observability.svc.cluster.local:19291/api/v1/receive"
        }
      }

      otelcol.receiver.otlp "ops_traces" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }

        http {
          endpoint = "0.0.0.0:4318"
        }

        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "observability-tempo.observability.svc.cluster.local:4317"

          tls {
            insecure = true
          }
        }
      }

      // TODO: S3 Vectors ingestion should be handled by a separate AI indexing pipeline.

service:
  enabled: true
  type: ClusterIP

configReloader:
  enabled: false

controller:
  type: daemonset
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule

rbac:
  clusterRules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/pods", "nodes/metrics", "nodes/proxy"]
      verbs: ["get", "list", "watch"]
    - nonResourceURLs: ["/metrics"]
      verbs: ["get"]
