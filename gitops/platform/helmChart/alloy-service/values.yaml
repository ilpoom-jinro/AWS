image:
  # Mirrored Alloy image in the private ECR registry.
  registry: REPLACE_WITH_ECR_REGISTRY
  repository: financial/monitoring/alloy
  tag: latest
  pullPolicy: Always

alloy:
  configMap:
    create: true
    content: |
      logging {
        level = "info"
      }

      // Each DaemonSet pod discovers only the pods running on its own node.
      // This prevents duplicate logs and duplicate metric samples.
      discovery.kubernetes "local_pods" {
        role = "pod"

        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("HOSTNAME")
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.monitoring_loki.receiver]
      }

      loki.write "monitoring_loki" {
        endpoint {
          // Replaced in the internal Gitea deployment copy by gitops-platform-sync.yml.
          url = "http://loki-internal-nlb.example.local:3100/loki/api/v1/push"
        }
      }

      // Scrape application metrics only from pods that explicitly opt in with:
      // prometheus.io/scrape: "true"
      // prometheus.io/port: "<metrics-port>"
      discovery.relabel "annotated_pod_metrics" {
        targets = discovery.kubernetes.local_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_ip", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          separator     = ";"
          target_label  = "__address__"
          regex         = "(.+);(.+)"
          replacement   = "$1:$2"
        }
      }

      prometheus.scrape "annotated_pods" {
        targets         = discovery.relabel.annotated_pod_metrics.output
        scrape_interval = "60s"
        forward_to      = [prometheus.relabel.service_metric_filter.receiver]
      }

      // Kubelet exposes node health and cAdvisor exposes pod/container usage.
      prometheus.scrape "kubelet" {
        targets = [{
          "__address__"     = "kubernetes.default.svc.cluster.local:443",
          "__metrics_path__" = "/api/v1/nodes/" + sys.env("HOSTNAME") + "/proxy/metrics",
        }]
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

        tls_config {
          ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        }

        scrape_interval = "60s"
        forward_to      = [prometheus.relabel.service_metric_filter.receiver]
      }

      prometheus.scrape "cadvisor" {
        targets = [{
          "__address__"     = "kubernetes.default.svc.cluster.local:443",
          "__metrics_path__" = "/api/v1/nodes/" + sys.env("HOSTNAME") + "/proxy/metrics/cadvisor",
        }]
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

        tls_config {
          ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        }

        scrape_interval = "60s"
        forward_to      = [prometheus.relabel.service_metric_filter.receiver]
      }

      prometheus.relabel "service_metric_filter" {
        forward_to = [prometheus.remote_write.monitoring_thanos.receiver]

        rule {
          source_labels = ["__name__"]
          regex         = "go_.*|process_.*|promhttp_.*"
          action        = "drop"
        }

        rule {
          source_labels = ["__name__"]
          regex         = "container_fs_.*|container_network_.*|container_tasks_state|container_threads.*|container_sockets.*"
          action        = "drop"
        }

        rule {
          source_labels = ["container"]
          regex         = "^$|POD"
          action        = "drop"
        }
      }

      prometheus.remote_write "monitoring_thanos" {
        external_labels = {
          cluster = "financial-service-eks",
          vpc     = "service",
        }

        endpoint {
          // Replaced in the internal Gitea deployment copy by gitops-platform-sync.yml.
          url = "http://thanos-receive-internal-nlb.example.local:19291/api/v1/receive"
        }
      }
      otelcol.receiver.otlp "service_traces" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }

        http {
          endpoint = "0.0.0.0:4318"
        }

        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-internal-nlb.example.local:4317"
          tls {
            insecure = true
          }
        }
      }

      // TODO: S3 Vectors ingestion should be handled by a separate AI indexing pipeline.

configReloader:
  enabled: false

controller:
  type: daemonset

rbac:
  clusterRules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/pods", "nodes/metrics", "nodes/proxy"]
      verbs: ["get", "list", "watch"]
    - nonResourceURLs: ["/metrics"]
      verbs: ["get"]
