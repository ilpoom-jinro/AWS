installCRDs: true
replicaCount: 1

serviceAccount:
  create: true
  # Terraform Pod Identity Association must use this exact ServiceAccount name.
  name: external-secrets

image:
  # Terraform creates this private ECR repository. Mirror external-secrets/external-secrets from public.ecr.aws.
  repository: REPLACE_WITH_ECR_REGISTRY/external-secrets/external-secrets
  tag: v0.10.7
  pullPolicy: IfNotPresent

webhook:
  create: true
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/external-secrets/external-secrets
    tag: v0.10.7
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: external-secrets-webhook

certController:
  create: true
  image:
    repository: REPLACE_WITH_ECR_REGISTRY/external-secrets/external-secrets
    tag: v0.10.7
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: external-secrets-cert-controller
