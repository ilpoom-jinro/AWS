image:
  # The Alertmanager chart expects the full ECR path in repository.
  repository: REPLACE_WITH_ECR_REGISTRY/financial/monitoring/alertmanager
  tag: latest
  pullPolicy: Always

nodeSelector:
  role: monitoring

tolerations:
  - key: dedicated
    operator: Equal
    value: monitoring
    effect: NoSchedule

# Alertmanager 설정 — aiops_anomaly 라벨이 붙은 알림을 AIOps webhook으로 라우팅.
# webhook 수신처: aiops-orchestrator (aiops-mas 네임스페이스, trigger.py)
config:
  route:
    receiver: "default"
    group_by: ["cluster", "namespace", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 3h
    routes:
      # aiops_anomaly 라벨이 있는 알림만 AIOps 워크플로로 보낸다.
      - matchers:
          - aiops_anomaly=~".+"
        receiver: "aiops-webhook"
        # 같은 (cluster, namespace)로 묶어 폭주를 방지 (detector가 스캔하므로 충분)
        group_by: ["cluster", "namespace"]
        continue: false
  receivers:
    - name: "default"
      # aiops 외 알림의 기본 수신처 (추후 Slack/SNS 등 연결 예정)
    - name: "aiops-webhook"
      webhook_configs:
        - url: "http://aiops-orchestrator.aiops-mas.svc.cluster.local/webhook/alertmanager"
          send_resolved: false
