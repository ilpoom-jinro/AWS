image:
  # The Alertmanager chart expects the full ECR path in repository.
  repository: 218549830271.dkr.ecr.ap-northeast-2.amazonaws.com/financial/monitoring/alertmanager
  tag: latest

nodeSelector:
  role: monitoring

tolerations:
  - key: dedicated
    operator: Equal
    value: monitoring
    effect: NoSchedule

