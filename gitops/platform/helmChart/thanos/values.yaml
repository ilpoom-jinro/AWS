global:
  security:
    # The official Bitnami chart cannot verify images mirrored into our ECR.
    allowInsecureImages: true

image:
  # Mirrored Thanos image in the private ECR registry.
  registry: REPLACE_WITH_ECR_REGISTRY
  repository: financial/monitoring/thanos
  tag: latest
  pullPolicy: Always

query:
  enabled: true
  replicaCount: 1
  nodeSelector:
    role: monitoring
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule

receive:
  enabled: true
  replicaCount: 1
  nodeSelector:
    role: monitoring
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internal
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-security-groups: REPLACE_WITH_OPS_THANOS_RECEIVE_NLB_SG_ID
      service.beta.kubernetes.io/aws-load-balancer-manage-backend-security-group-rules: "true"
      
bucketweb:
  enabled: false

compactor:
  enabled: false

storegateway:
  enabled: false

# S3 object storage вҖ” Thanos Ruler objstoreмҡ© нҷңм„ұнҷ” (Pod IdentityлЎң м ‘к·ј).
# лІ„нӮ·/IAMмқҖ vpc/ops/thanos-ruler-s3.tfм—җм„ң мғқм„ұ. credentialмқҖ Pod Identityк°Җ
# мЈјмһ…н•ҳлҜҖлЎң configм—җ access keyлҘј л„Јм§Җ м•ҠлҠ”лӢӨ.
# лІ„нӮ·лӘ…мқҖ кі„м • ID м ‘лҜёмӮ¬ нҸ¬н•Ё вҶ’ gitops-platform-syncк°Җ м№ҳнҷҳн•ҳкұ°лӮҳ мӢӨм ң к°’мңјлЎң лҢҖмІҙ н•„мҡ”.
objstoreConfig: |-
  type: S3
  config:
    bucket: jinro-observability-thanos-REPLACE_WITH_ACCOUNT_ID
    endpoint: s3.ap-northeast-2.amazonaws.com
    region: ap-northeast-2

# мЈјмқҳ: мқҙ м°ЁнҠёлҠ” мөңмғҒмң„ serviceAccount к°’мқ„ мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ”лӢӨ(м»ҙнҸ¬л„ҢнҠёлі„ SA).
# Pod IdentityлҠ” ruler/receive к°Ғк°Ғмқҳ мӢӨм ң SAлӘ…м—җ м—°кІ°н•ңлӢӨ (thanos-ruler-s3.tf м°ёмЎ°):
#   ruler   вҶ’ observability-thanos-ruler
#   receive вҶ’ observability-thanos-receive

# в”Җв”Җ Thanos Ruler (м•ҢлҰј к·ңм№ҷ нҸүк°Җ вҶ’ Alertmanager л°ңмҶЎ) в”Җв”Җ
ruler:
  enabled: true
  replicaCount: 1
  nodeSelector:
    role: monitoring
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule
  # нҸүк°Җн•ң м•ҢлҰјмқ„ ліҙлӮј Alertmanager мЈјмҶҢ
  alertmanagers:
    - http://observability-alertmanager.observability.svc.cluster.local:9093
  # м•ҢлҰј лқјлІЁм—җ clusterлҘј к°•м ңлЎң л¶ҷм—¬, мҡ°лҰ¬ webhook нҠёлҰ¬кұ°к°Җ нҢҢмӢұ к°ҖлҠҘн•ҳкІҢ н•ңлӢӨ.
  # (к·ңм№ҷ мһҗмІҙм—җлҸ„ namespace labelмқҙ мһҲм–ҙм•ј н•Ё вҖ” alert-rules ConfigMapм—җм„ң м •мқҳ)
  extraFlags:
    - --label=ruler_cluster="financial-ops-eks"
  # мҡ°лҰ¬ anomaly_type м•ҢлҰј к·ңм№ҷ (лӢӨмқҢ лӢЁкі„м—җм„ң ConfigMapмңјлЎң мЈјмһ…)
  existingConfigmap: aiops-alert-rules
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# в”Җв”Җ AIOps м•ҢлҰј к·ңм№ҷ ConfigMap (Rulerк°Җ existingConfigmapмңјлЎң м°ёмЎ°) в”Җв”Җ
extraDeploy:
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: aiops-alert-rules
      namespace: observability
      labels:
        app: aiops
    data:
      aiops-rules.yml: |
        groups:
          - name: aiops-pod-anomalies
            rules:
              # в”Җв”Җ crashloop_backoff в”Җв”Җ
              - alert: AIOpsCrashLoopBackOff
                expr: |
                  max by (cluster, namespace, pod) (
                    kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
                  )
                for: 2m
                labels:
                  severity: warning
                  aiops_anomaly: crashloop_backoff
                annotations:
                  summary: "CrashLoopBackOff к°җм§Җ ({{ $labels.namespace }}/{{ $labels.pod }})"
              # в”Җв”Җ oom_killed в”Җв”Җ
              - alert: AIOpsOOMKilled
                expr: |
                  max by (cluster, namespace, pod) (
                    kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
                  )
                for: 1m
                labels:
                  severity: warning
                  aiops_anomaly: oom_killed
                annotations:
                  summary: "OOMKilled к°җм§Җ ({{ $labels.namespace }}/{{ $labels.pod }})"
              # в”Җв”Җ image_pull_backoff в”Җв”Җ
              - alert: AIOpsImagePullBackOff
                expr: |
                  max by (cluster, namespace, pod) (
                    kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"} == 1
                  )
                for: 2m
                labels:
                  severity: warning
                  aiops_anomaly: image_pull_backoff
                annotations:
                  summary: "ImagePullBackOff к°җм§Җ ({{ $labels.namespace }}/{{ $labels.pod }})"
              # в”Җв”Җ pending_timeout в”Җв”Җ
              - alert: AIOpsPendingTimeout
                expr: |
                  max by (cluster, namespace, pod) (
                    kube_pod_status_phase{phase="Pending"} == 1
                  )
                for: 5m
                labels:
                  severity: warning
                  aiops_anomaly: pending_timeout
                annotations:
                  summary: "Pod Pending 5л¶„ мҙҲкіј ({{ $labels.namespace }}/{{ $labels.pod }})"
              # в”Җв”Җ evicted в”Җв”Җ
              - alert: AIOpsEvicted
                expr: |
                  max by (cluster, namespace, pod) (
                    kube_pod_status_reason{reason="Evicted"} == 1
                  )
                for: 1m
                labels:
                  severity: warning
                  aiops_anomaly: evicted
                annotations:
                  summary: "Pod Evicted к°җм§Җ ({{ $labels.namespace }}/{{ $labels.pod }})"
              # в”Җв”Җ high_latency (Istio P95 > 1000ms, config.HIGH_LATENCY_P95_MSмҷҖ мқјм№ҳ) в”Җв”Җ
              - alert: AIOpsHighLatency
                expr: |
                  histogram_quantile(0.95,
                    sum by (cluster, namespace, destination_workload, le) (
                      rate(istio_request_duration_milliseconds_bucket[5m])
                    )
                  ) > 1000
                for: 3m
                labels:
                  severity: warning
                  aiops_anomaly: high_latency
                annotations:
                  summary: "P95 м§Җм—° 1s мҙҲкіј ({{ $labels.namespace }}/{{ $labels.destination_workload }})"
