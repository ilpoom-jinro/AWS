adminUser: admin
adminPassword: CHANGE_ME

service:
  type: ClusterIP

nodeSelector:
  role: monitoring

tolerations:
  - key: dedicated
    operator: Equal
    value: monitoring
    effect: NoSchedule

serviceAccount:
  create: true
  name: grafana

image:
  # Mirrored Grafana image in the private ECR registry.
  registry: REPLACE_WITH_ECR_REGISTRY
  repository: financial/monitoring/grafana
  tag: latest
  pullPolicy: Always

# Disable the optional Helm test pod so the offline cluster does not need the
# public docker.io/bats/bats image.
testFramework:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Thanos
        type: prometheus
        access: proxy
        url: http://observability-thanos-query.observability.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://observability-loki.observability.svc.cluster.local:3100
      - name: CloudWatch
        type: cloudwatch
        access: proxy
        jsonData:
          authType: default
          defaultRegion: ap-northeast-2
