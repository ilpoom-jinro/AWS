# AWS Load Balancer Controller runs in the Ops EKS cluster and creates the
# internal NLBs requested by the Loki and Thanos Kubernetes Services.
clusterName: financial-ops-eks
region: ap-northeast-2

# Replaced in the internal Gitea deployment copy by gitops-platform-sync.yml.
# Keeping a placeholder in GitHub makes destroy -> apply repeatable.
vpcId: REPLACE_WITH_OPS_VPC_ID

replicaCount: 2

image:
  # Terraform creates this private ECR repository. The monitoring image mirror
  # workflow copies public.ecr.aws/eks/aws-load-balancer-controller:v3.3.0.
  repository: REPLACE_WITH_ECR_REGISTRY/financial/monitoring/aws-load-balancer-controller
  tag: v3.3.0
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  # Terraform Pod Identity Association must use this exact ServiceAccount name.
  name: aws-load-balancer-controller

# IngressClassParams — ops 클러스터의 모든 ALB에 Access Logs 강제 적용 (#13)
# IngressClass(alb)를 ingressClassName으로 지정한 Ingress가 생성될 때 자동 반영됨.
# 어노테이션보다 우선순위 높음(ingress 단위로 끌 수 없음 → 보안 측면 의도된 강제).
ingressClassParams:
  create: true
  spec:
    loadBalancerAttributes:
      - key: access_logs.s3.enabled
        value: "true"
      - key: access_logs.s3.bucket
        value: financial-alb-access-logs-797715838244
      - key: access_logs.s3.prefix
        value: alb
