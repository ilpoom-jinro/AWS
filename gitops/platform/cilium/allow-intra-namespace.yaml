# 시스템 네임스페이스 intra-namespace allow 정책 모음
#
# {{.PodNamespace}} Go 템플릿은 CiliumClusterwideNetworkPolicy v1.16.5에서 미지원.
# Kyverno 전용 문법임. Cilium에서 "같은 네임스페이스" 허용은 네임스페이스별 명시가 필요.
# 앱 네임스페이스(stock-demo, finops-mas)는 각자 allow 파일에서 처리.
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-intra-kube-system
spec:
  description: "kube-system 내부 파드 간 통신 허용 (cilium-agent, coredns, hubble-relay 등)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: kube-system
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-intra-argocd
spec:
  description: "argocd 내부 파드 간 통신 허용 (server, repo-server, controller, redis, dex)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: argocd
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
---
# ArgoCD repo-server → internal git server(git 네임스페이스) 크로스네임스페이스 허용
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-argocd-to-git
spec:
  # audit 로그 확인: 목적지 git 파드가 Cilium에 world(ID:16777224)로 인식돼
  # 기존 toEndpoints(namespace=git)가 매칭 안 됨 → enforce 시 트래픽 끊김.
  # git은 ambient 아님(ztunnel 무관). toEndpoints는 정상 파드 인식 시 대비 유지,
  # toCIDR을 추가해 world 인식 케이스를 커버.
  description: "argocd repo-server → git 네임스페이스 internal-git-http:3000 egress 허용"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: argocd
      app.kubernetes.io/name: argocd-repo-server
  egress:
    # 기존 유지: 파드로 인식될 때
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: git
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # 추가: git 파드가 world로 인식되는 경우 대비 (파드 대역 CIDR)
    # 10.20.12.0/24 = git 파드가 뜨는 노드 서브넷 대역
    - toCIDR:
        - 10.20.12.0/24   # git 파드(internal-git) IP 대역
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
# gitea(internal-git) ingress: argocd-repo-server로부터 3000 수신
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-git-from-argocd
spec:
  description: "gitea:3000 ingress 허용 (argocd-repo-server에서 수신)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: git
      app.kubernetes.io/name: internal-git
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
            app.kubernetes.io/name: argocd-repo-server
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
