apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-observability-nlb-tempo
spec:
  description: "NLB SNAT 경유 Tempo 수집 ingress 허용 (alloy-ops → NLB ENI → Tempo)"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
      app.kubernetes.io/instance: observability-tempo
  ingress:
    - fromCIDR:
        - 10.20.11.0/24
        - 10.20.12.0/24
      toPorts:
        - ports:
            - port: "9411"
              protocol: TCP
            - port: "4318"
              protocol: TCP
            - port: "14250"
              protocol: TCP
            - port: "55680"
              protocol: TCP
            - port: "55681"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-observability-nlb-loki
spec:
  description: "NLB SNAT 경유 Loki 수집 ingress 허용 (alloy-ops → NLB ENI → Loki)"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/instance: observability-loki
  ingress:
    - fromCIDR:
        - 10.20.11.0/24
        - 10.20.12.0/24
      toPorts:
        - ports:
            - port: "3100"
              protocol: TCP
            - port: "9095"
              protocol: TCP