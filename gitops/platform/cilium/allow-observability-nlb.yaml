apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-observability-nlb-tempo
spec:
  description: "NLB SNAT 경유 Tempo 수집 ingress 허용 (alloy-ops → NLB ENI → Tempo)"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
      app.kubernetes.io/instance: observability-tempo
  ingress:
    - fromCIDR:
        # chaining mode에서 unmanaged pod(alloy 등) 소스가 개별 /24가 아니라
        # VPC2 전체(cidr:10.20.0.0/16 + reserved:world) 단일 CIDR identity(16777220)로 잡힘.
        # /24 selector는 이 /16 identity를 매칭 못 해 audit 발생 → /16으로 확장해 커버.
        # (동일 identity가 thanos-receive에선 이미 L4-Only ALLOWED로 통과됨 = /16 매칭 실증)
        - 10.20.0.0/16
      toPorts:
        - ports:
            - port: "3200"
              protocol: TCP
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
            - port: "9411"
              protocol: TCP
            - port: "14250"
              protocol: TCP
            - port: "14268"
              protocol: TCP
            - port: "55678"
              protocol: TCP
            - port: "55680"
              protocol: TCP
            - port: "55681"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-observability-nlb-loki
spec:
  description: "NLB SNAT 경유 Loki 수집 ingress 허용 (alloy-ops → NLB ENI → Loki)"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/instance: observability-loki
  ingress:
    - fromCIDR:
        # chaining mode에서 unmanaged pod(alloy 등) 소스가 개별 /24가 아니라
        # VPC2 전체(cidr:10.20.0.0/16 + reserved:world) 단일 CIDR identity(16777220)로 잡힘.
        # /24 selector는 이 /16 identity를 매칭 못 해 audit 발생 → /16으로 확장해 커버.
        # (동일 identity가 thanos-receive에선 이미 L4-Only ALLOWED로 통과됨 = /16 매칭 실증)
        - 10.20.0.0/16
      toPorts:
        - ports:
            - port: "3100"
              protocol: TCP
            - port: "9095"
              protocol: TCP