apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns-ingress
spec:
  description: "kube-dns 파드가 클러스터 모든 endpoint로부터 53 ingress 허용"
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  ingress:
    - fromEndpoints:          # 기존 - 관리 endpoint용, 삭제 금지
        - {}
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - fromEntities:             # 신규 - unmanaged 소스(argocd, ebs-csi 등) 대응
        - cluster               # cidr는 reserved:unmanaged 매칭 불가 -> cluster 필요
                                # (DNS는 본래 클러스터 전체 허용 대상, world는 미포함)
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
  egress:
    - toCIDR:
        - 10.20.0.2/32  # ops VPC DNS
        - 10.10.0.2/32  # service VPC DNS
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP