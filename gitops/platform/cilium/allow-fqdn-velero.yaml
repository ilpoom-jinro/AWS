apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-fqdn-velero
spec:
  description: "velero → S3/EC2/KMS FQDN egress 허용"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: velero
      app.kubernetes.io/name: velero
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*.amazonaws.com"
    - toFQDNs:
        # S3 path-style: VPC gateway endpoint 사용 시 toFQDNs 불안정 가능 → Hubble 확인 후 필요 시 toCIDR/toEntities:world로 교체
        - matchName: "s3.ap-northeast-2.amazonaws.com"
        # S3 virtual-hosted style: <bucket>.s3.ap-northeast-2.amazonaws.com
        - matchPattern: "*.s3.ap-northeast-2.amazonaws.com"
        # velero kopia maintain job은 S3 dualstack 엔드포인트(IPv4/IPv6 겸용) 사용
        # (financial-velero-backup-<계정>.s3.dualstack.ap-northeast-2.amazonaws.com) —
        # 위 non-dualstack 패턴과 매칭 안 돼 audit에서 AUDIT만 찍히고 enforce 시 끊김 확인
        - matchPattern: "*.s3.dualstack.ap-northeast-2.amazonaws.com"   # 추가: velero dualstack 백업 버킷
        - matchName: "s3.dualstack.ap-northeast-2.amazonaws.com"        # 추가: dualstack 엔드포인트 자체
        - matchName: "ec2.ap-northeast-2.amazonaws.com"
        - matchName: "kms.ap-northeast-2.amazonaws.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP