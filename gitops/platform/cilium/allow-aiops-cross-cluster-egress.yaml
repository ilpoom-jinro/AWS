apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-aiops-cross-cluster-egress
spec:
  description: "aiops-orchestrator cross-cluster kubeconfig/token and service EKS API egress"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: aiops-mas
      app: aiops-orchestrator
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*.amazonaws.com"
    - toFQDNs:
        - matchName: "eks.ap-northeast-2.amazonaws.com"
        - matchName: "sts.ap-northeast-2.amazonaws.com"
        - matchName: "sts.amazonaws.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toCIDR:
        - 10.10.0.0/16
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
