apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-ztunnel-hbone
spec:
  # Istio Ambient ztunnel은 hostNetwork DaemonSet으로 실행 → Cilium에서 entity: host/remote-node로 보임
  # ztunnel ↔ waypoint(pod) 간 HBONE 터널(15008)이 막히면 enforce 시 메시 내 mTLS 전부 끊김
  description: "Istio ztunnel HBONE 15008 TCP 양방향 허용"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
  egress:
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "15008"
              protocol: TCP