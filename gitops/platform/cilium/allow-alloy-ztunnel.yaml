apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-alloy-ztunnel
spec:
  description: "alloy-ops → ztunnel 15020 egress 허용 (ztunnel은 hostNetwork → entity: host/remote-node)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: observability
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: observability-alloy-ops
  egress:
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "15020"
              protocol: TCP