apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-alloy-ztunnel
spec:
  description: "alloy-ops → ztunnel 15020 egress 허용"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: observability
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: observability-alloy-ops
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: istio-system
            app: ztunnel
      toPorts:
        - ports:
            - port: "15020"
              protocol: TCP
    - toCIDR:
        - 10.20.11.0/24  # financial-vpc2-private-a
        - 10.20.12.0/24  # financial-vpc2-private-b
        - 10.20.31.0/24  # financial-vpc2-monitor-a
      toPorts:
        - ports:
            - port: "15020"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-ztunnel-alloy-ingress
spec:
  description: "ztunnel 15020 ingress 허용 (alloy-ops에서 수신)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: istio-system
      app: ztunnel
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: alloy
            app.kubernetes.io/instance: observability-alloy-ops
      toPorts:
        - ports:
            - port: "15020"
              protocol: TCP