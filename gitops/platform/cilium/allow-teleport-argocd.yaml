apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-teleport-to-argocd
spec:
  description: "teleport-app-service → argocd-server 8080 egress 허용 (Teleport ArgoCD UI 프록시)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: teleport-apps
      app.kubernetes.io/name: teleport-app-service
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
            app.kubernetes.io/name: argocd-server
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-argocd-from-teleport
spec:
  description: "argocd-server 8080 ingress 허용 (teleport-app-service에서 수신)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: argocd
      app.kubernetes.io/name: argocd-server
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: teleport-apps
            app.kubernetes.io/name: teleport-app-service
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP