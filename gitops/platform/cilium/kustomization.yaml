apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Istio Ambient 충돌 방지 (항상 최우선)
  - allow-ambient-hostprobes.yaml

  # 시스템 기반 allow
  - allow-dns.yaml
  - allow-dns-ingress.yaml
  - allow-kube-apiserver.yaml
  - allow-node-local.yaml
  - allow-ztunnel-hbone.yaml
  - allow-ebs-csi-ec2-endpoint.yaml

  # 네임스페이스별 intra allow (시스템)
  - allow-intra-namespace.yaml

  # apiserver admission webhook allow (ops + service 양쪽)
  - allow-apiserver-albc-webhook.yaml
  - allow-apiserver-kyverno-webhook.yaml
  - allow-apiserver-metrics-server.yaml

  # 앱별 allow (ops 클러스터)
  - allow-finops-mas.yaml
  - allow-secops-mas.yaml
  - allow-observability-nlb.yaml
  - allow-alloy-ztunnel.yaml
  - allow-apiserver-eso-webhook.yaml
  - allow-teleport-argocd.yaml
  - allow-teleport-finops-ui.yaml
  - allow-teleport-secops-ui.yaml
  - allow-teleport-aiops-ui.yaml
  - allow-intra-aiops-mas.yaml
  - allow-alertmanager-to-aiops.yaml
  - allow-teleport-app-service-to-proxy.yaml
  - allow-argocd-to-service-api.yaml
  - allow-aiops-cross-cluster-egress.yaml
  - allow-aiops-mas-bedrock.yaml
  - allow-kyverno-cosign-egress-ops.yaml
  - allow-db-init-rds.yaml
  - allow-temporal-cluster.yaml
  - allow-observability-velero-metrics.yaml
  - allow-alloy-egress.yaml
  - allow-alloy-ops-scraping.yaml
  - allow-albc-metrics-from-alloy-ops.yaml
  - allow-platform-mas-sqs.yaml
  - allow-mas-rds.yaml
  - allow-secops-mas-sqs.yaml
  - allow-secops-mas-bedrock.yaml
  - allow-secops-mas-loki.yaml
  - allow-loki-from-secops-mas.yaml
  - allow-finops-orchestrator-sqs.yaml

  # 앱별 allow (service 클러스터)
  - allow-stock-demo.yaml
  - allow-alloy-service-ztunnel.yaml
  - allow-alloy-service-scraping.yaml
  - allow-alloy-service-to-ops-nlb.yaml
  - allow-kyverno-cosign-egress-svc.yaml

  # FQDN egress
  - allow-fqdn-finops-mas.yaml
  - allow-fqdn-secops-mas.yaml
  - allow-fqdn-velero.yaml
  - allow-fqdn-albc.yaml
  - allow-fqdn-eso.yaml
  - allow-fqdn-stock-api-rds.yaml
  - allow-fqdn-trivy.yaml
  - allow-platform-mas-slack.yaml
    
  # default-deny는 반드시 마지막 (policyAuditMode=true 동안 AUDIT만, enforce 전환 시 여기서 통제)
  - default-deny.yaml
