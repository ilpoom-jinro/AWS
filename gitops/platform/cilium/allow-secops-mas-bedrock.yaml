apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-secops-mas-bedrock
spec:
  description: "secops-mas → Bedrock VPC Endpoint(runtime/agent-runtime) egress 허용 (toCIDR 보강)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: secops-mas
      app.kubernetes.io/part-of: secops-mas
  egress:
    - toCIDR:
        - 10.20.11.0/24  # financial-vpc2-private-a (Bedrock endpoint ENI)
        - 10.20.12.0/24  # financial-vpc2-private-b (Bedrock endpoint ENI)
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
