# finops-mas 네임스페이스 Cilium 정책 (ops 클러스터)
#
# 확인된 의존성 (manifest 기반):
#   finops-ui             → finops-orchestrator:80(8000)
#   finops-orchestrator   → finops-temporal:7233 (gRPC)
#   finops-orchestrator   → finops-db:5432 (PostgreSQL, 클러스터 내부 pod)
#   finops-*-agent (11개) → finops-temporal:7233 (gRPC)
#   finops-*-agent (11개) → finops-db:5432 (PostgreSQL)
#   finops-*-agent (11개) → AWS Bedrock (external, FQDN 파일에서 처리)
#   finops-cost-agent     → AWS Athena (external, FQDN 파일에서 처리)
#
# 공통 레이블: app.kubernetes.io/part-of: finops-mas
# finops-db: 외부 RDS가 아닌 클러스터 내부 PostgreSQL pod
---
# intra-finops-mas: 같은 네임스페이스 파드 간 전체 허용
# (ui→orchestrator, agents→temporal, agents→db 모두 포함)
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-intra-finops-mas
spec:
  description: "finops-mas 내부 파드 간 통신 허용"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: finops-mas
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: finops-mas
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: finops-mas
---
# finops-ui INGRESS: teleport-app-service 경유 노출
# 확인한 실제 라벨(job/deployment manifest 실측):
#   finops-ui: namespace finops-mas, app.kubernetes.io/name: finops-ui, containerPort 8000
#   teleport-app-service: namespace teleport-apps, app.kubernetes.io/name: teleport-app-service
#     (allow-teleport-argocd.yaml과 동일 라벨 재사용)
# teleport-apps는 default-deny 대상, finops-mas는 intra 정책만 있어 타 ns 소스 미커버 → 명시 필요.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-finops-ui-from-teleport
spec:
  description: "finops-ui:8000 ingress 허용 (teleport-app-service에서 수신)"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: finops-mas
      app.kubernetes.io/name: finops-ui
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: teleport-apps
            app.kubernetes.io/name: teleport-app-service
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
