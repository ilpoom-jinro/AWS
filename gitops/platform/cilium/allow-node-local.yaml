apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-node-local
spec:
  description: "파드 ↔ 노드(host) 통신 허용 — kubelet 헬스체크, node-local-dns"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
  egress:
    - toEntities:
        - host
        - remote-node