apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: service-project
  namespace: argocd
spec:
  description: 서비스 애플리케이션 — stock-demo (금융 컴플라이언스 배포 윈도우 적용)
  sourceRepos:
    - http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git
  destinations:
    # Service 클러스터 내 서비스
    - name: financial-service-eks
      namespace: stock-demo
  # 서비스 프로젝트에서는 클러스터 스코프 리소스 배포 금지
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: networking.k8s.io
      kind: Ingress
    # Istio Gateway(ambient) — 외부 ALB → mesh 진입점 + mTLS 경계
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    # 데모앱 전용 ALLOW (Kyverno deny-all zero-trust 위 명시 허용)
    - group: security.istio.io
      kind: AuthorizationPolicy
    # ESO ExternalSecret — stock-api-db K8s Secret 자동 동기화
    - group: external-secrets.io
      kind: ExternalSecret
