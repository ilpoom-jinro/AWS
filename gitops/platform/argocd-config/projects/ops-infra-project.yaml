apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ops-infra-project
  namespace: argocd
spec:
  description: 플랫폼 인프라 — 옵저버빌리티, 네트워킹, 정책 (ops + service 클러스터)
  sourceRepos:
    - http://internal-git-http.git.svc.cluster.local:3000/gitadmin/platform.git
  destinations:
    # Ops 클러스터 (in-cluster)
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: observability
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: istio-system
    - server: https://kubernetes.default.svc
      namespace: teleport-apps
    - server: https://kubernetes.default.svc
      namespace: kyverno
    - server: https://kubernetes.default.svc
      namespace: monitoring
    # Temporal (financial-ops-eks in-cluster)
    - server: https://kubernetes.default.svc
      namespace: temporal
    # Service 클러스터 (서버 URL이 동적이므로 등록 이름으로 참조)
    - name: financial-service-eks
      namespace: observability
    - name: financial-service-eks
      namespace: istio-system
    - name: financial-service-eks
      namespace: kyverno
    # aws-load-balancer-controller-service 가 배포되는 네임스페이스
    - name: financial-service-eks
      namespace: kube-system
    # External Secrets Operator (ESO)
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - name: financial-service-eks
      namespace: external-secrets
    # Velero 백업/복원
    - server: https://kubernetes.default.svc
      namespace: velero
    # 모든 등록 클러스터 → kyverno 네임스페이스 (ApplicationSet cluster generator 와일드카드 대응)
    - server: "*"
      namespace: kyverno
    # Tetragon (ops in-cluster)
    - server: https://kubernetes.default.svc
      namespace: tetragon
    # Tetragon (service 클러스터)
    - name: financial-service-eks
      namespace: tetragon
    # 모든 등록 클러스터 → tetragon 네임스페이스 (ApplicationSet cluster generator 와일드카드 대응)
    - server: "*"
      namespace: tetragon
      # metrics-server (service 클러스터 kube-system)
    - name: financial-service-eks
      namespace: kube-system
    # Trivy Operator (ops in-cluster)
    - server: https://kubernetes.default.svc
      namespace: trivy
    # Trivy Operator (service 클러스터)
    - name: financial-service-eks
      namespace: trivy
    # 모든 등록 클러스터 → trivy 네임스페이스 (ApplicationSet cluster generator 와일드카드 대응)
    - server: "*"
      namespace: trivy
  clusterResourceWhitelist:
    # applications/namespace-observability.yaml 등 raw Namespace 매니페스트를
    # platform-applications App-of-Apps가 직접 배포하므로 필수
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    # kyverno ApplicationSet이 배포하는 ClusterPolicy는 클러스터 스코프 리소스
    - group: kyverno.io
      kind: ClusterPolicy
    # admission webhook — kyverno, istio, aws-load-balancer-controller 공통
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    # aws-load-balancer-controller 가 생성하는 alb IngressClass 및 IngressClassParams
    - group: networking.k8s.io
      kind: IngressClass
    - group: elbv2.k8s.aws
      kind: IngressClassParams
    # ESO ClusterSecretStore — 클러스터 스코프 리소스
    - group: external-secrets.io
      kind: ClusterSecretStore
    # Velero CSI Data Mover가 감지하는 VolumeSnapshotClass
    - group: snapshot.storage.k8s.io
      kind: VolumeSnapshotClass
      # metrics-server가 등록하는 Aggregated API
    - group: apiregistration.k8s.io
      kind: APIService
    # Tetragon TracingPolicy — 클러스터 스코프 리소스 (tetragon/policies ApplicationSet 대비)
    - group: cilium.io
      kind: TracingPolicy
    # Cilium 네트워크 정책 — 클러스터 스코프 (cilium-policies ApplicationSet 대비)
    - group: cilium.io
      kind: CiliumClusterwideNetworkPolicy
    # Trivy Operator 컴플라이언스 스펙(k8s-cis-1.23 등) — 차트가 정적으로 렌더링하는
    # 클러스터 스코프 리소스 (실제 스캔 결과 Cluster*Report는 컨트롤러가 런타임 생성하므로 whitelist 불필요)
    - group: aquasecurity.github.io
      kind: ClusterComplianceReport
  namespaceResourceWhitelist:
    # 인프라 Helm 차트는 ServiceMonitor, PDB, MutatingWebhookConfiguration 등
    # 다양한 extension 리소스를 배포하므로 네임스페이스 수준은 와일드카드 허용
    - group: "*"
      kind: "*"
