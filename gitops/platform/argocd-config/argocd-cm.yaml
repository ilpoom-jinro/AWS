apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # CRD는 262144 bytes 초과로 ArgoCD annotation 방식 관리 불가.
  # 아래 그룹들은 Helm 차트 기본값이며, gitops YAML로 명시해 Helm 싱크 시 유실되지 않도록 관리.
  # CRD 제외는 j2 템플릿과 동일하게 Kyverno CRD 문제 해결 목적으로 추가.
  resource.exclusions: |
    - apiGroups:
      - ''
      - discovery.k8s.io
      kinds:
      - Endpoints
      - EndpointSlice
    - apiGroups:
      - coordination.k8s.io
      kinds:
      - Lease
    - apiGroups:
      - authentication.k8s.io
      - authorization.k8s.io
      kinds:
      - SelfSubjectReview
      - TokenReview
      - LocalSubjectAccessReview
      - SelfSubjectAccessReview
      - SelfSubjectRulesReview
      - SubjectAccessReview
    - apiGroups:
      - certificates.k8s.io
      kinds:
      - CertificateSigningRequest
    - apiGroups:
      - cert-manager.io
      kinds:
      - CertificateRequest
    - apiGroups:
      - cilium.io
      kinds:
      - CiliumIdentity
      - CiliumEndpoint
      - CiliumEndpointSlice
    - apiGroups:
      - kyverno.io
      - reports.kyverno.io
      - wgpolicyk8s.io
      kinds:
      - PolicyReport
      - ClusterPolicyReport
      - EphemeralReport
      - ClusterEphemeralReport
      - AdmissionReport
      - ClusterAdmissionReport
      - BackgroundScanReport
      - ClusterBackgroundScanReport
      - UpdateRequest
    - apiGroups:
      - apiextensions.k8s.io
      kinds:
      - CustomResourceDefinition
  # ExternalSecret health check: ArgoCD는 기본적으로 CRD의 readiness를 모름.
  # ESO가 Secrets Manager에서 값을 가져와 K8s Secret을 실제로 생성한 뒤에야
  # Healthy로 전환되도록 Lua 스크립트로 status.conditions[Ready]=True를 확인한다.
  # 이 설정이 없으면 sync-wave -1(ExternalSecret) → 0(Deployment) 순서가 무력화된다.
  resource.customizations: |
    external-secrets.io/ExternalSecret:
      health.lua: |
        local hs = {}
        if obj.status == nil then
          hs.status = "Progressing"
          hs.message = "Waiting for ExternalSecret to be reconciled"
          return hs
        end
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Ready" then
              if condition.status == "True" then
                hs.status = "Healthy"
                hs.message = condition.message
              else
                hs.status = "Degraded"
                hs.message = condition.message
              end
              return hs
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for Ready condition"
        return hs
