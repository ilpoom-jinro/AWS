apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: observability-indexer-db
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: observability-indexer-db
    creationPolicy: Owner
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        host: "{{ .host }}"
  dataFrom:
    - extract:
        key: financial-ops-rds-password
