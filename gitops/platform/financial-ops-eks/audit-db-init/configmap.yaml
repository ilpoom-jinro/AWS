# audit_logs DDL SQL — mas/deploy/local/init.sql에서 그대로 가져옴 (멱등)
# PG13+ 내장 gen_random_uuid() 사용 → extension 불필요
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-db-init-sql
  namespace: audit-db-init
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
data:
  audit_logs.sql: |
    CREATE TABLE IF NOT EXISTS audit_logs (
        id               UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        workflow_id      VARCHAR(64)  NOT NULL,
        contract_version VARCHAR(16)  NOT NULL,
        scenario         VARCHAR(32)  NOT NULL,
        event_type       VARCHAR(64)  NOT NULL,
        occurred_at      TIMESTAMPTZ  NOT NULL,
        actor            VARCHAR(128) NOT NULL,
        summary          TEXT         NOT NULL,
        payload          JSONB        NOT NULL
    );
    CREATE INDEX IF NOT EXISTS idx_audit_logs_workflow_occurred
        ON audit_logs (workflow_id, occurred_at);
