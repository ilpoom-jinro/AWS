apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-orchestrator
  namespace: aiops-mas
  labels:
    app: aiops-orchestrator
    mas.platform/agent: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-orchestrator
  template:
    metadata:
      labels:
        app: aiops-orchestrator
    spec:
      serviceAccountName: aiops-orchestrator
      containers:
        - name: aiops-orchestrator
          # kustomization images에서 실제 ECR 경로로 치환됨
          image: aiops-orchestrator-image
          imagePullPolicy: Always
          ports:
            # Alertmanager webhook 수신 포트 (trigger.py)
            - name: webhook
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: aiops-orchestrator-config
          env:
            # 감사로그(record_audit_log) RDS 연결 — Secret 주입
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-orchestrator-secrets
                  key: database-url
          # trigger(FastAPI)가 /health를 제공하므로 HTTP probe 사용.
          # 이 컨테이너는 worker와 trigger를 함께 띄우며, trigger의 응답은
          # 프로세스(및 이벤트 루프)가 살아있음을 의미한다.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
