apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aiops-orchestrator-secrets
  namespace: aiops-mas
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: aiops-orchestrator-secrets
    creationPolicy: Owner
    template:
      data:
        database-url: "postgresql+asyncpg://{{ .username }}:{{ .password }}@{{ .host }}:5432/{{ .dbname }}"
  dataFrom:
    - extract:
        key: financial-ops-rds-password
