apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-orchestrator-config
  namespace: aiops-mas
data:
  # 우리 config.py (nodes/collector가 참조)
  OPS_KUBE_CONTEXT:          "financial-ops-eks"
  SERVICE_KUBE_CONTEXT:      "financial-service-eks"
  OPS_EKS_CLUSTER_NAME:      "financial-ops-eks"
  SERVICE_EKS_CLUSTER_NAME:  "financial-service-eks"
  AWS_REGION:                "ap-northeast-2"
  THANOS_QUERY_URL:          "http://observability-thanos-query.observability.svc.cluster.local:9090"
  VERIFY_WAIT_SEC:           "300"
  RCA_CONFIDENCE_MIN:        "0.7"
  HIGH_LATENCY_P95_MS:       "1000"
  # 민수님 worker.py가 읽는 Temporal 환경변수 (TEMPORAL_ADDRESS, TASK_QUEUE)
  TEMPORAL_ADDRESS:          "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_TASK_QUEUE:       "aiops-task-queue"
  # 공용 Slack HITL Bot의 Temporal Activity queue와 일치해야 한다.
  HITL_TASK_QUEUE:           "hitl-approval-queue"
