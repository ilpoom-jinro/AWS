# Ops RDS 마스터 자격증명 (financial_admin) — init Job이 admin으로 접속해 DB/role 생성
# Secrets Manager: financial-ops-rds-password → k8s Secret: ops-rds-master
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ops-rds-master
  namespace: temporal
  annotations:
    # PreSync hook으로 지정해야 같은 PreSync hook인 temporal-db-init Job(wave -1)보다
    # 먼저 적용된다. hook 어노테이션 없이 sync-wave만 있으면 일반 Sync phase 리소스로
    # 취급되어 PreSync hook(Job)이 끝난 뒤에야 생성되는 순서 역전이 발생한다.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ops-rds-master
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: financial-ops-rds-password
