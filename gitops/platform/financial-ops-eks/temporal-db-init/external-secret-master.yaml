# Ops RDS 마스터 자격증명 (financial_admin) — init Job이 admin으로 접속해 DB/role 생성
# Secrets Manager: financial-ops-rds-password → k8s Secret: ops-rds-master
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ops-rds-master
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ops-rds-master
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: financial-ops-rds-password
