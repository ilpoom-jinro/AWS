# Temporal 전용 자격증명 (temporal_user) — init Job이 이 비밀번호로 CREATE ROLE
# Secrets Manager: temporal/rds-credentials → k8s Secret: temporal-rds-credentials
# (Secret 본체는 terraform secrets.tf 에서 생성 — apply 선행 필요)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-rds-credentials
  namespace: temporal
  annotations:
    # PreSync hook으로 지정해야 같은 PreSync hook인 temporal-db-init Job(wave -1)보다
    # 먼저 적용된다. hook 어노테이션 없이 sync-wave만 있으면 일반 Sync phase 리소스로
    # 취급되어 PreSync hook(Job)이 끝난 뒤에야 생성되는 순서 역전이 발생한다.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: temporal-rds-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: temporal/rds-credentials
