# Temporal 전용 자격증명 (temporal_user) — init Job이 이 비밀번호로 CREATE ROLE
# Secrets Manager: temporal/rds-credentials → k8s Secret: temporal-rds-credentials
# (Secret 본체는 terraform secrets.tf 에서 생성 — apply 선행 필요)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-rds-credentials
  namespace: temporal
  annotations:
    # 일반 Sync 리소스 + sync-wave로 순서 보장 (hook 미사용).
    # ArgoCD가 이 ExternalSecret이 Ready(SecretSynced)될 때까지 기다린 뒤 다음
    # wave(db-init Job, -1)로 진행 → Job 실행 시 시크릿이 이미 존재.
    # 주의: hook으로 만들면 prereqs 관리 리소스가 0개가 되어 "wipe out all
    # resources" 가드에 걸리고, hook 재생성으로 시크릿이 깜빡인다(파드 CreateContainerConfigError).
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: temporal-rds-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: temporal/rds-credentials
