# Temporal 전용 자격증명 (temporal_user) — init Job이 이 비밀번호로 CREATE ROLE
# Secrets Manager: temporal/rds-credentials → k8s Secret: temporal-rds-credentials
# (Secret 본체는 terraform secrets.tf 에서 생성 — apply 선행 필요)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-rds-credentials
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: temporal-rds-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: temporal/rds-credentials
