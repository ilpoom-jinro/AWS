# ExternalSecret: Slack HITL 봇 토큰
# Secrets Manager(slack-hitl-tokens) → K8s Secret(slack-hitl-tokens)
# bot.py가 읽는 env 이름(SLACK_BOT_TOKEN/APP_TOKEN/CHANNEL_ID)으로 재조합
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-hitl-tokens          # ExternalSecret 리소스명
  namespace: secops-mas            # secops-orchestrator와 동일 네임스페이스
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # 봇 Deployment보다 먼저 생성
spec:
  refreshInterval: 15m             # 15분마다 Secrets Manager와 동기화
  secretStoreRef:
    name: aws-secretsmanager        # 클러스터 공통 SecretStore
    kind: ClusterSecretStore
  target:
    name: slack-hitl-tokens         # 생성될 K8s Secret 이름
    creationPolicy: Owner
    template:
      data:
        # 좌: 봇이 읽는 env 이름 / 우: Secrets Manager JSON 키
        SLACK_BOT_TOKEN: "{{ .slack_bot_token }}"
        SLACK_APP_TOKEN: "{{ .slack_app_token }}"
        SLACK_CHANNEL_ID: "{{ .slack_channel_id }}"
  dataFrom:
    - extract:
        key: slack-hitl-tokens      # Secrets Manager 시크릿명