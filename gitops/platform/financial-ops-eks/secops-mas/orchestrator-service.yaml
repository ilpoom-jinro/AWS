# UI가 orchestrator API(api.py, 8000)를 호출하기 위한 ClusterIP 서비스
apiVersion: v1
kind: Service
metadata:
  name: secops-orchestrator
  namespace: secops-mas
  labels:
    app: secops-orchestrator
    mas.platform/agent: secops
spec:
  type: ClusterIP
  selector:
    app: secops-orchestrator
  ports:
    - name: http
      port: 8000
      targetPort: http
