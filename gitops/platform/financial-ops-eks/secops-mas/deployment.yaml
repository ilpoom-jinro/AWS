apiVersion: apps/v1
kind: Deployment
metadata:
  name: secops-orchestrator
  namespace: secops-mas
  labels:
    app: secops-orchestrator
    mas.platform/agent: secops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secops-orchestrator
  template:
    metadata:
      labels:
        app: secops-orchestrator
    spec:
      serviceAccountName: secops-orchestrator
      containers:
        - name: secops-orchestrator
          image: secops-orchestrator-image        # kustomization images에서 실제 ECR 경로로 치환
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: secops-orchestrator-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: secops-orchestrator-secrets
                  key: database-url
          # run.py로 worker+poller+HTTP API(api.py)를 함께 실행 → /health 제공(8000).
          #   (이전엔 순수 워커라 HTTP가 없어 프로브를 뺐으나, 이제 API가 있어 프로브 사용)
          ports:
            - name: http
              containerPort: 8000
          # 프로브: run.py가 worker+poller+uvicorn을 한 이벤트 루프에서 돌려,
          #   poller의 SQS 롱폴링 등으로 순간 지연 시 timeout=1s면 /health가 실패한다.
          #   timeout/주기/failureThreshold에 여유를 줘 오탐 재시작을 막는다.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              # app.run(worker+poller+FastAPI) 여유분. OOM은 아니었으나 일이 늘어 소폭 상향.
              memory: "768Mi"
