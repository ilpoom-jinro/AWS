apiVersion: apps/v1
kind: Deployment
metadata:
  name: secops-orchestrator
  namespace: secops-mas
  labels:
    app: secops-orchestrator
    mas.platform/agent: secops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secops-orchestrator
  template:
    metadata:
      labels:
        app: secops-orchestrator
    spec:
      serviceAccountName: secops-orchestrator
      containers:
        - name: secops-orchestrator
          image: secops-orchestrator-image        # kustomization images에서 실제 ECR 경로로 치환
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: secops-orchestrator-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: secops-orchestrator-secrets
                  key: database-url
          # run.py로 worker+poller+HTTP API(api.py)를 함께 실행 → /health 제공(8000).
          #   (이전엔 순수 워커라 HTTP가 없어 프로브를 뺐으나, 이제 API가 있어 프로브 사용)
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
