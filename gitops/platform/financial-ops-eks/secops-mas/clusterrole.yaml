apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secops-orchestrator
rules:
  # apply_isolation(mas/pods/secops/orchestrator/app/activities.py)이 격리 대상
  # 워크로드의 네임스페이스에 CiliumNetworkPolicy(namespaced, CCNP 아님 — build_isolation_policy가
  # CNP만 만듦)를 생성한다. 격리 대상 네임스페이스는 침투 탐지 시점에 정해지고 고정돼
  # 있지 않아(어떤 워크로드가 공격자로 잡힐지 미리 알 수 없음) Role이 아니라 ClusterRole이
  # 필요하다.
  #
  # 2026-07-17 실측: 이 RBAC 자체가 아예 없어서 apply_isolation이 dry-run 서버 검증
  # 단계(k8s API 호출 자체는 발생)부터 403 Forbidden으로 실패했다(1차 승인 후 8회 이상
  # 재시도). git log 확인 결과 apply_isolation 기능이 코드에 생긴 이래(#324, LangGraph→
  # Temporal 전환) 이 RBAC이 추가된 적이 한 번도 없었다 — 즉 실클러스터 apply_isolation은
  # 이번까지 한 번도 성공한 적이 없었던 것으로 보인다.
  #
  # verbs — 코드(_apply_isolation_policy) 기준으로 최소만 부여:
  #   get:    409(이미 존재) 시 재적용 전 기존 리소스의 resourceVersion 조회에 필요.
  #   create: 최초 생성.
  #   update: 위 재적용(replace_namespaced_custom_object)에 필요.
  #   delete는 안 넣음 — 코드 전체에 격리 해제(un-isolate) 경로가 없다(grep 확인,
  #     "delete_namespaced_custom_object"/"release_isolation" 등 전무). 운영자가 수동으로
  #     정리할 때는 본인 kubectl 권한을 쓰지 이 ServiceAccount를 거치지 않는다.
  #
  # resourceNames로 좁히는 것은 검토했으나 불가 — 이름 규칙이 isolate-{workload_name}으로
  # 런타임에 정해지고, Kubernetes RBAC의 resourceNames는 와일드카드/접두어 매칭을
  # 지원하지 않는 정확한 문자열 목록만 가능하다(사전에 알 수 없는 이름은 못 넣음).
  #
  # 네임스페이스 제한(예: kube-system/temporal 등 critical 네임스페이스 제외)도 ClusterRole
  # 자체로는 불가 — 대신 코드 쪽에 이중 방어를 추가함(apply_isolation의 CRITICAL_NAMESPACES
  # 재확인, activities.py). RBAC은 "어느 네임스페이스든 만들 수 있다"는 넓은 권한이지만,
  # 실제로 어느 네임스페이스에 만들지는 여전히 코드(blast_radius_safe 게이트 + 이 이중
  # 방어)가 통제한다.
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "create", "update"]
