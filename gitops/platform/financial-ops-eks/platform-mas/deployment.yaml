apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-hitl
  namespace: platform-mas
  labels:
    app: slack-hitl
    mas.platform/agent: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-hitl
  template:
    metadata:
      labels:
        app: slack-hitl
    spec:
      serviceAccountName: slack-hitl
      containers:
        - name: slack-hitl
          image: slack-hitl-image        # kustomization images에서 실제 ECR 경로로 치환
          imagePullPolicy: Always
          # slack-hitl-tokens Secret/ExternalSecret 없음 — SLACK_CHANNEL_ID가 그 Secret의
          # 마지막 키였는데 SLACK_CHANNEL_SECOPS/AIOPS/FINOPS로 이전되며 Secret이 완전히
          # 비게 돼서 secretRef 자체를 제거함(빈 Secret 참조는 무의미하고, ExternalSecret이
          # 지워지면 Owner인 이 Secret도 같이 삭제돼 optional 없는 secretRef는 pod 기동 실패 위험).
          envFrom:
            - configMapRef:
                name: slack-hitl-config    # TEMPORAL_ADDRESS, HITL_TASK_QUEUE, OUTBOUND/INBOUND_QUEUE_URL, SLACK_CHANNEL_*
          # 주의: 봇은 SQS 라우터(Socket Mode 아님)라 수신 포트 없음.
          #   HTTP liveness/readiness 프로브 두면 프로브 실패로 CrashLoop → 두지 않음.
          #   프로세스 죽으면 k8s가 재시작.
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"