apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-hitl
  namespace: platform-mas
  labels:
    app: slack-hitl
    mas.platform/agent: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-hitl
  template:
    metadata:
      labels:
        app: slack-hitl
    spec:
      serviceAccountName: slack-hitl
      containers:
        - name: slack-hitl
          image: slack-hitl-image        # kustomization images에서 실제 ECR 경로로 치환
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: slack-hitl-config    # TEMPORAL_ADDRESS, HITL_TASK_QUEUE
            - secretRef:
                name: slack-hitl-tokens    # SLACK_BOT_TOKEN/APP_TOKEN/CHANNEL_ID (ESO 생성)
          # 주의: 봇은 Slack Socket Mode 아웃바운드 워커라 수신 포트 없음.
          #   HTTP liveness/readiness 프로브 두면 프로브 실패로 CrashLoop → 두지 않음.
          #   프로세스 죽으면 k8s가 재시작.
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"