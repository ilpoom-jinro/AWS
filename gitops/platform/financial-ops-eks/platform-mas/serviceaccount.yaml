apiVersion: v1
kind: ServiceAccount
metadata:
  name: slack-hitl
  namespace: platform-mas
  # Pod Identity association 있음 — financial-ops-slack-hitl-role(vpc/ops/pod-identity.tf).
  # 봇이 라우터로 전환되며 inbound/outbound SQS(financial-slack-hitl-inbound/outbound)에
  # 직접 접근해야 해서 추가됨. Slack 토큰 자체는 여전히 ESO가 K8s Secret으로 꽂아주고
  # 봇은 그 중 SLACK_CHANNEL_ID만 env로 읽는다(BOT/APP_TOKEN은 outbound Lambda 전용).