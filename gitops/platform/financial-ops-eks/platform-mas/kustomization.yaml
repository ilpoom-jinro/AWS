apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - slack-hitl-external-secret.yaml
  - configmap.yaml
  - deployment.yaml
  # service.yaml 없음 — 봇은 순수 아웃바운드 워커(수신 포트 없음)

images:
  - name: slack-hitl-image
    newName: REPLACE_WITH_ECR_REGISTRY/financial/mas/platform/slack-hitl
    newTag: latest