# Secrets Manager(financial-slack-hitl-tokens) → K8s Secret(slack-hitl-tokens)
# ESO 컨트롤러(external-secrets ns)가 financial-* 패턴으로 대신 읽어 이 ns에 꽂음
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: slack-hitl-tokens
  namespace: platform-mas
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # 봇 Deployment보다 먼저
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: slack-hitl-tokens
    creationPolicy: Owner
    template:
      data:
        # SLACK_BOT_TOKEN/APP_TOKEN은 이 K8s Secret에 안 넣음 — 봇 pod가 라우터로
        # 전환되며 Slack을 직접 호출하지 않게 됨. bot_token은 financial-slack-outbound
        # Lambda가 자기 IAM으로 Secrets Manager를 직접 읽어 쓴다(이 Secret 경유 아님).
        SLACK_CHANNEL_ID: "{{ .slack_channel_id }}"
  dataFrom:
    - extract:
        key: financial-slack-hitl-tokens   # financial-* = ESO IAM 허용 패턴 + secrets.tf 껍데기와 일치