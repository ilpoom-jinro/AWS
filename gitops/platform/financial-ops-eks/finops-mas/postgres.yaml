apiVersion: v1
kind: Secret
metadata:
  name: finops-db
  namespace: finops-mas
type: Opaque
stringData:
  POSTGRES_DB: finops
  POSTGRES_USER: finops
  POSTGRES_PASSWORD: finops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-db
  namespace: finops-mas
  labels:
    app.kubernetes.io/name: finops-db
    app.kubernetes.io/part-of: finops-mas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finops-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finops-db
        app.kubernetes.io/part-of: finops-mas
    spec:
      tolerations:
        - key: dedicated
          operator: Equal
          value: monitoring
          effect: NoSchedule
      containers:
        - name: postgres
          image: REPLACE_WITH_ECR_REGISTRY/financial/mas/finops/postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: finops-db
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - finops
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: finops-db
  namespace: finops-mas
  labels:
    app.kubernetes.io/name: finops-db
    app.kubernetes.io/part-of: finops-mas
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: finops-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
