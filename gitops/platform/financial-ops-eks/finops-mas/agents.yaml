apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-business-control-agent
  namespace: finops-mas
  labels:
    app.kubernetes.io/name: finops-business-control-agent
    app.kubernetes.io/part-of: finops-mas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finops-business-control-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finops-business-control-agent
        app.kubernetes.io/part-of: finops-mas
    spec:
      serviceAccountName: finops-agent
      tolerations:
        - key: dedicated
          operator: Equal
          value: monitoring
          effect: NoSchedule
      containers:
        - name: agent
          image: finops-business-control-agent-image
          imagePullPolicy: IfNotPresent
          env:
            - name: AGENT_KEY
              value: business_control
            - name: AGENT_NAME
              value: Business Control Agent
            - name: AGENT_TASK_QUEUE
              value: finops-business-control-agent-task-queue
            - name: TEMPORAL_ADDRESS
              value: finops-temporal.finops-mas.svc.cluster.local:7233
            - name: DATABASE_URL
              value: postgresql://finops:finops@finops-db.finops-mas.svc.cluster.local:5432/finops
            - name: AWS_REGION
              value: ap-northeast-2
            - name: AWS_STS_REGIONAL_ENDPOINTS
              value: regional
            - name: FINOPS_SPOT_INSTANCE_TYPES
              value: m7i-flex.large,m7i.large,m6i.large
            - name: BEDROCK_MODEL
              value: global.anthropic.claude-haiku-4-5-20251001-v1:0
            - name: BEDROCK_REGION
              value: ap-northeast-2
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: finops-business-control-agent
  namespace: finops-mas
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: finops-business-control-agent
  ports:
    - name: http
      port: 80
      targetPort: http
---
