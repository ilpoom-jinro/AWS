apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-orchestrator
  namespace: finops-mas
  labels:
    app.kubernetes.io/name: finops-orchestrator
    app.kubernetes.io/part-of: finops-mas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finops-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finops-orchestrator
        app.kubernetes.io/part-of: finops-mas
    spec:
      serviceAccountName: finops-orchestrator
      nodeSelector:
        role: monitoring
      tolerations:
        - key: dedicated
          operator: Equal
          value: monitoring
          effect: NoSchedule
      containers:
        - name: finops-orchestrator
          image: finops-orchestrator-image
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql://finops:finops@finops-db.finops-mas.svc.cluster.local:5432/finops
            - name: TEMPORAL_ADDRESS
              value: finops-temporal.finops-mas.svc.cluster.local:7233
            - name: AWS_REGION
              value: ap-northeast-2
            - name: FINOPS_EKS_CLUSTER_NAME
              value: financial-ops-eks
            - name: FINOPS_SPOT_INSTANCE_TYPES
              value: m7i-flex.large,m7i.large,m6i.large
            - name: FINOPS_COMMAND_COLLECTORS_ENABLED
              value: "true"
            - name: BEDROCK_MODEL
              value: global.anthropic.claude-haiku-4-5-20251001-v1:0
            - name: BEDROCK_REGION
              value: ap-northeast-2
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
