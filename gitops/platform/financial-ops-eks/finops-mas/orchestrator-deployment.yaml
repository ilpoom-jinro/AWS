apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-orchestrator
  namespace: finops-mas
  labels:
    app.kubernetes.io/name: finops-orchestrator
    app.kubernetes.io/part-of: finops-mas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finops-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finops-orchestrator
        app.kubernetes.io/part-of: finops-mas
    spec:
      serviceAccountName: finops-orchestrator
      nodeSelector:
        role: monitoring
      tolerations:
        - key: dedicated
          operator: Equal
          value: monitoring
          effect: NoSchedule
      containers:
        - name: finops-orchestrator
          image: finops-orchestrator-image
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: finops-db-credentials
                  key: DATABASE_URL
            - name: TEMPORAL_ADDRESS
              value: finops-temporal.finops-mas.svc.cluster.local:7233
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
