apiVersion: v1
kind: ServiceAccount
metadata:
  name: finops-orchestrator
  namespace: finops-mas
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: finops-orchestrator-readonly
  namespace: finops-mas
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: finops-orchestrator-readonly
  namespace: finops-mas
subjects:
  - kind: ServiceAccount
    name: finops-orchestrator
    namespace: finops-mas
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: finops-orchestrator-readonly
