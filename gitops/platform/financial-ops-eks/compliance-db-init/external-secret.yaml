# Ops RDS 마스터 자격증명 — init Job이 financial_admin으로 접속해 DDL 실행
# audit-db-init/external-secret.yaml과 동일 패턴, 네임스페이스만 compliance-db-init으로 분리
# (ClusterSecretStore는 클러스터 범위)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ops-rds-master
  namespace: compliance-db-init
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ops-rds-master
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: financial-ops-rds-password
