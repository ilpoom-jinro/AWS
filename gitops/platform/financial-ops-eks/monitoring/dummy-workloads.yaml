apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-monitoring-agent
  namespace: monitoring
  labels:
    app: dummy-monitoring-agent
    role: monitoring
    finops-idle-candidate: "true"
    purpose: finops-idle-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dummy-monitoring-agent
  template:
    metadata:
      labels:
        app: dummy-monitoring-agent
        role: monitoring
        finops-idle-candidate: "true"
        purpose: finops-idle-demo
    spec:
      containers:
        - name: dummy-monitoring-agent
          image: 609540154179.dkr.ecr.ap-northeast-2.amazonaws.com/financial/mas/finops/ui:latest
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dummy-monitoring-agent
  namespace: monitoring
  labels:
    app: dummy-monitoring-agent
    purpose: finops-idle-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dummy-monitoring-agent
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
