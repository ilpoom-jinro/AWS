# postmortem_reports 테이블 초기화 패키지 (compliance-db-init과 동일 패턴)
# sync-wave로 순서 보장 (configmap -3 → external-secret -2 → job -1)
#
# configMapGenerator 사용 이유:
#   SQL 파일 내용이 바뀌면 생성 ConfigMap 이름 해시가 바뀌고, Job의 volume 참조도
#   kustomize가 자동으로 새 이름으로 rewrite → Job spec 변경 → (Replace=true) 재실행.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: postmortem-db-init
resources:
  - external-secret.yaml
  - job.yaml
configMapGenerator:
  - name: postmortem-db-init-sql
    files:
      - postmortem_reports.sql=sql/postmortem_reports.sql
    options:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
