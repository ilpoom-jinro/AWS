apiVersion: v1
kind: Secret
metadata:
  name: stock-api-secret
  namespace: stock-demo
type: Opaque
stringData:
  DB_PASSWORD: CHANGE_ME
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-api
  namespace: stock-demo
  labels:
    app: stock-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-api
  template:
    metadata:
      labels:
        app: stock-api
    spec:
      containers:
        - name: stock-api
          image: stock-api-image:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DB_HOST
              value: financial-service-db.czsmqag04fdj.ap-northeast-2.rds.amazonaws.com
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: financial_service
            - name: DB_USER
              value: financial_admin
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-api-secret
                  key: DB_PASSWORD
            - name: CORS_ORIGINS
              value: "*"

            # OpenTelemetry tracing settings
            - name: OTEL_TRACING_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: stock-demo-api
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://observability-alloy-service.observability.svc.cluster.local:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: http/protobuf
            - name: DEPLOYMENT_ENVIRONMENT
              value: service-eks

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: stock-demo
spec:
  type: ClusterIP
  selector:
    app: stock-api
  ports:
    - name: http
      port: 8000
      targetPort: http
