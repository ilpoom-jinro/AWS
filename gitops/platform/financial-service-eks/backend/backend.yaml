apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-api
  namespace: stock-demo
  labels:
    app: stock-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-api
  template:
    metadata:
      labels:
        app: stock-api
    spec:
      serviceAccountName: stock-api
      containers:
        - name: stock-api
          image: stock-api-image:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: stock-api-db
                  key: DB_HOST
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: financial_service
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: stock-api-db
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stock-api-db
                  key: DB_PASSWORD
            - name: CORS_ORIGINS
              value: "https://ilpumjinro.store,https://aws.ilpumjinro.store"

            # OpenTelemetry tracing settings
            - name: OTEL_TRACING_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: stock-demo-api
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://observability-alloy-service.observability.svc.cluster.local:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: http/protobuf
            - name: DEPLOYMENT_ENVIRONMENT
              value: service-eks

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          
          # readinessProbe 위/아래 같은 레벨에 추가
          resources:
            requests:
              cpu: 100m       # HPA 사용률 계산의 기준값
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: stock-demo
spec:
  type: ClusterIP
  selector:
    app: stock-api
  ports:
    - name: http
      port: 8000
      targetPort: http
