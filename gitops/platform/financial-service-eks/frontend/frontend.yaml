apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-web-deployment-info
  namespace: stock-demo
data:
  deployment.json: |
    {
      "environment": "AWS",
      "label": "AWS PRIMARY",
      "region": "ap-northeast-2"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-web
  namespace: stock-demo
  labels:
    app: stock-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-web
  template:
    metadata:
      labels:
        app: stock-web
      annotations:
        ilpoomjinro.store/deployment-info-version: "v1"
    spec:
      containers:
        - name: stock-web
          image: stock-web-image:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: deployment-info
              mountPath: /usr/share/nginx/html/deployment.json
              subPath: deployment.json
              readOnly: true
      volumes:
        - name: deployment-info
          configMap:
            name: stock-web-deployment-info
---
apiVersion: v1
kind: Service
metadata:
  name: stock-web
  namespace: stock-demo
  labels:
    app: stock-web
spec:
  # ClusterIP: 외부 노출은 ALB Ingress(ingress.yaml)가 담당. 기존 type:LoadBalancer는
  # in-tree CLB를 만들어 single-node 환경에서 NodePort 경로 문제로 접속 불가였음.
  type: ClusterIP
  selector:
    app: stock-web
  ports:
    - name: http
      port: 80
      targetPort: http
