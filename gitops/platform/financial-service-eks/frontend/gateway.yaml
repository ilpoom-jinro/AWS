# Istio Gateway (ambient) — 외부 ALB → mesh 진입점.
# ALB가 평문으로 이 Gateway(Envoy)를 때리고, Gateway가 mTLS로 stock-web에 전달한다.
# stock-demo는 PeerAuthentication STRICT(mesh 기본)라 ALB가 파드를 직접 평문으로 때리면
# ztunnel이 RST → 항상 unhealthy였음. Gateway가 mesh 경계가 되어
# "외부 HTTPS(ALB) + 내부 mTLS(mesh)"를 동시에 달성한다.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: stock-gw
  namespace: stock-demo
  annotations:
    # ClusterIP: 기존 ALB를 재사용(NLB 중복 생성/비용 방지). ALB Ingress가 이 service를 backend로 참조.
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# Gateway → stock-web 라우팅 (Gateway 이후는 mesh mTLS).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stock-route
  namespace: stock-demo
spec:
  parentRefs:
    - name: stock-gw
  rules:
    - filters:
        # HSTS 주입: ALB는 응답 헤더를 못 넣으므로 Gateway(Envoy) L7에서 주입.
        # 클라이언트→ALB가 HTTPS이므로 ALB가 이 응답을 HTTPS로 돌려줄 때
        # 브라우저가 HSTS 헤더를 존중한다. (80은 redirect되므로 HSTS 응답 자체가 안 감)
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            # set: 기존 헤더가 있으면 덮어씀 → HSTS가 항상 하나만 존재하도록 보장
            set:
              - name: Strict-Transport-Security
                # max-age 5분으로 짧게 시작. HTTPS 안정 확인 후 점진 확대.
                # includeSubDomains 미적용: aws./gcp. 서브도메인이 HTTPS 준비되기 전엔 금지
                # (한 번 걸면 max-age 동안 브라우저가 서브도메인까지 HTTPS 강제)
                value: "max-age=300"
      backendRefs:
        - name: stock-web
          port: 80
---
# Kyverno가 자동 생성하는 deny-all AuthorizationPolicy(zero-trust 기본 차단) 위에
# 명시적 ALLOW. 현재는 포괄 허용(rules: [{}])이며, 운영 강화 시 source별로 좁힐 것:
#   - Gateway 인입(외부)        : Gateway 워크로드 selector
#   - stock-web                 : from principals = Gateway SA
#   - stock-api(backend)        : from principals = stock-web SA
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-stock-traffic
  namespace: stock-demo
spec:
  action: ALLOW
  rules:
    - {}
