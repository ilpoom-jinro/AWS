apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - frontend/frontend.yaml
  - frontend/ingress.yaml
  - frontend/gateway.yaml
  - backend/backend.yaml
  - HPA/hpa.yaml
  - stock-demo/waypoint.yaml
  - stock-demo/serviceaccount.yaml
  - stock-demo/external-secret.yaml

images:
  - name: stock-api-image
    newName: REPLACE_WITH_ECR_REGISTRY/financial/demo-app-backend
    newTag: latest
  - name: stock-web-image
    newName: REPLACE_WITH_ECR_REGISTRY/financial/demo-app-frontend
    newTag: latest
