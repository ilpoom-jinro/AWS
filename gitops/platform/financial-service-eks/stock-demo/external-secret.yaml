apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stock-api-db
  namespace: stock-demo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: stock-api-db
    creationPolicy: Merge
    template:
      data:
        DB_HOST: "{{ .host }}"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: financial-service-rds-password
