# SecOps 워커 Pod가 Istio AuthorizationPolicy를 apply하려면 ServiceAccount에 RBAC 필요.
# 실제 SA 이름/네임스페이스는 배포 설정에 맞게 조정 (Platform/민수님 소유).
# 격리 대상 네임스페이스마다 Role+RoleBinding. (여러 ns면 ClusterRole로 확장)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secops-isolation-applier
  namespace: financial-api          # 격리 대상 네임스페이스 (예시)
rules:
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["create", "get", "list", "update", "patch"]   # replace=update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secops-isolation-applier
  namespace: financial-api
subjects:
  - kind: ServiceAccount
    name: secops-orchestrator        # SecOps 워커 SA (배포 설정에 맞게)
    namespace: secops                # 워커가 도는 네임스페이스 (예시)
roleRef:
  kind: Role
  name: secops-isolation-applier
  apiGroup: rbac.authorization.k8s.io
