name: mas-analyzer-agent
role: analyzer
image: "{{ mas_runtime_image }}"
service_account_name: mas-analyzer-agent
service_name: mas-analyzer-agent
replicas: 1
container_port: 8080
service_port: 8080
bedrock_model_id: "{{ mas_bedrock_model_id }}"
bedrock_max_tokens: "{{ mas_bedrock_max_tokens }}"
prometheus_url: "{{ mas_prometheus_url }}"
cpu_request: 100m
memory_request: 128Mi
cpu_limit: 500m
memory_limit: 512Mi
kubernetes_readonly: false
service_enabled: true
