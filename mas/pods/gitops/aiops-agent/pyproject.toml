[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "aiops-agent"
version = "0.1.0"
description = "VPC2 상주 AIOps Bedrock Agent — LangGraph 기반 장애 탐지·복구"
requires-python = ">=3.12"
dependencies = [
    # LangGraph / LangChain
    "langgraph>=0.2",
    "langchain-aws>=0.1",

    # AWS
    "boto3>=1.34",
    "botocore>=1.34",
    "pydantic-settings>=2.2",
    "pydantic>=2.6",

    # Kubernetes
    "kubernetes>=30.1",

    # FastAPI 서버
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "python-multipart>=0.0.9",    # form 파싱 (Slack WebHook)

    # HTTP
    "httpx>=0.27",

    # Slack
    "slack-sdk>=3.33",

    # 유틸
    "pyyaml>=6.0",
    "typing-extensions>=4.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.14",
    "ruff>=0.4",
    "mypy>=1.9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
