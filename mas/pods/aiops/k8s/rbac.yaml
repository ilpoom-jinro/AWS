# [MAS 권한 경계] Agent는 읽기 전용. 변경(patch/update/delete) 권한 없음.
# 실제 복구 실행은 Platform Core SA가 담당.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-readonly
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status", "events", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]   # patch/update 제거됨
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aiops-agent-readonly
subjects:
  - kind: ServiceAccount
    name: aiops-agent
    namespace: aiops
