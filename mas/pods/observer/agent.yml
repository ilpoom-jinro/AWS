name: mas-observer-agent
role: observer
image_repository: financial/mas-observer
image: "{{ mas_observer_image }}"
service_account_name: mas-observer-agent
service_name: mas-observer-agent
replicas: 1
container_port: 8080
service_port: 8080
bedrock_model_id: ""
bedrock_max_tokens: 1000
prometheus_url: "{{ mas_prometheus_url }}"
cpu_request: 100m
memory_request: 128Mi
cpu_limit: 500m
