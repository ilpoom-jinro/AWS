apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent
  namespace: aiops
  labels:
    app: aiops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent
  template:
    metadata:
      labels:
        app: aiops-agent
    spec:
      serviceAccountName: aiops-agent

      # [v0.2 수정] nodeSelector 제거 — 모니터링 노드 그룹에 dedicated 레이블이
      # 설정되어 있지 않으면 영구 Pending이 되므로 toleration만 유지.
      # 레이블이 확인되면 nodeSelector를 다시 활성화할 것.
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "monitoring"
          effect: "NoSchedule"
      # nodeSelector:
      #   dedicated: monitoring

      containers:
        - name: aiops-agent
          image: 218549830271.dkr.ecr.ap-northeast-2.amazonaws.com/financial/aiops-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: aiops-agent-config

          # [v0.2 추가] kubeconfig 경로 (entrypoint.sh가 생성, K8sClient가 사용)
          env:
            - name: KUBECONFIG
              value: /tmp/kubeconfig
            - name: HOME
              value: /tmp

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 60   # kubeconfig 생성 시간 고려
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-agent-svc
  namespace: aiops
  labels:
    app: aiops-agent
spec:
  selector:
    app: aiops-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
