# [v0.2 신규] Slack Interactivity WebHook 수신용 Ingress (선택 사항)
# - Slack Request URL은 공개 HTTPS여야 하므로 ACM 인증서 ARN 필수
# - 적용 전 certificate-arn과 host를 실제 값으로 교체
# - AWS Load Balancer Controller가 클러스터에 설치되어 있어야 함
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiops-agent-ingress
  namespace: aiops
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_CERT_ARN
spec:
  rules:
    - host: aiops.example.com   # 실제 도메인으로 교체
      http:
        paths:
          - path: /slack/actions
            pathType: Exact
            backend:
              service:
                name: aiops-agent-svc
                port:
                  number: 8080
