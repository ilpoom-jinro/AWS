apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent
  namespace: aiops
  labels:
    app: aiops-agent
    mas.platform/agent: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent
  template:
    metadata:
      labels:
        app: aiops-agent
    spec:
      serviceAccountName: aiops-agent
      containers:
        - name: aiops-agent
          # terraform output aiops_agent_ecr_url로 교체
          image: REPLACE_WITH_ECR_REGISTRY/financial/aiops-agent:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: aiops-agent-config
          env:
            # shared.config가 요구하는 RDS 감사로그 연결 (Secret 주입)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-agent-secrets
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
