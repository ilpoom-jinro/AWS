[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aiops-agent"
version = "0.3.0"
description = "VPC2 상주 AIOps Bedrock Agent — LangGraph 기반 장애 탐지·복구"
requires-python = ">=3.12"
dependencies = [
    # LangGraph
    "langgraph>=0.2",

    # AWS
    "boto3>=1.34",
    "botocore>=1.34",

    # 설정
    "pydantic>=2.6",
    "pydantic-settings>=2.2",

    # Kubernetes
    "kubernetes>=30.1",

    # FastAPI 서버
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "python-multipart>=0.0.9",

    # HTTP
    "httpx>=0.27",

    # Slack
    "slack-sdk>=3.33",

    # 유틸
    "pyyaml>=6.0",
    "typing-extensions>=4.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["aiops*"]

[tool.ruff]
line-length = 100
target-version = "py312"
