apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent
  namespace: aiops
  labels:
    app: aiops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent
  template:
    metadata:
      labels:
        app: aiops-agent
    spec:
      serviceAccountName: aiops-agent

      # [v0.2 수정] nodeSelector 제거 — 모니터링 노드 그룹에 dedicated 레이블이
      # 설정되어 있지 않으면 영구 Pending이 되므로 toleration만 유지.
      # [v0.3] 노드 레이블이 role=monitoring으로 확정됨 (vpc/ops/eks.tf labels).
      #        단, single_az_mode=true에서는 모니터링 노드 1대에 Thanos/Loki/
      #        Grafana/Alloy가 모두 올라가므로 nodeSelector 해제 비권장
      #        (toleration만 유지해 일반/모니터링 어느 쪽이든 배치 가능).
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "monitoring"
          effect: "NoSchedule"
      # nodeSelector:
      #   role: monitoring

      containers:
        - name: aiops-agent
          # [v0.3] 계정 이관 대응: 계정 ID 하드코딩 제거.
          # terraform output aiops_agent_ecr_url 값으로 교체 (예: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com)
          image: REPLACE_WITH_ECR_REGISTRY/financial/aiops-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: aiops-agent-config

          # [v0.2 추가] kubeconfig 경로 (entrypoint.sh가 생성, K8sClient가 사용)
          env:
            - name: KUBECONFIG
              value: /tmp/kubeconfig
            - name: HOME
              value: /tmp

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 60   # kubeconfig 생성 시간 고려
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-agent-svc
  namespace: aiops
  labels:
    app: aiops-agent
spec:
  selector:
    app: aiops-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
