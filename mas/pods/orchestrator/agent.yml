name: mas-orchestrator
role: orchestrator
image_repository: financial/mas-orchestrator
image: "{{ mas_orchestrator_image }}"
service_account_name: mas-orchestrator
service_name: mas-orchestrator
replicas: 1
container_port: 8080
service_port: 8080
bedrock_model_id: ""
bedrock_max_tokens: 1000
prometheus_url: "{{ mas_prometheus_url }}"
observer_url: "http://mas-observer-agent.mas.svc.cluster.local:8080"
analyzer_url: "http://mas-analyzer-agent.mas.svc.cluster.local:8080"
cpu_request: 100m
memory_request: 128Mi
cpu_limit: 500m
memory_limit: 512Mi
kubernetes_readonly: false
service_enabled: true
