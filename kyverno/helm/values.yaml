# =============================================================================
# Kyverno Helm Values
# Chart: kyverno/kyverno  (https://kyverno.github.io/kyverno/)
# 구성: Single-node — replicas=1, no PodDisruptionBudget
# 대상 클러스터: financial-service-eks, financial-ops-eks
# =============================================================================

# Admission Controller — 정책 웹훅을 처리하는 핵심 컴포넌트
admissionController:
  replicas: 1
  service:
    port: 443
    type: ClusterIP
    annotations: {}
  metricsService:
    create: true
    port: 8000
    type: ClusterIP

# Background Controller — 기존 리소스에 대한 정책 평가 (PolicyReport 생성)
backgroundController:
  replicas: 1
  metricsService:
    create: true
    port: 8000
    type: ClusterIP

# Cleanup Controller — TTL 기반 리소스 자동 삭제 정책 처리
cleanupController:
  replicas: 1
  service:
    port: 443
    type: ClusterIP
    annotations: {}
  metricsService:
    create: true
    port: 8000
    type: ClusterIP

# Reports Controller — PolicyReport / ClusterPolicyReport 생성·관리
reportsController:
  replicas: 1
  metricsService:
    create: true
    port: 8000
    type: ClusterIP

# config.preserve: false — Kyverno ConfigMap을 ArgoCD가 덮어쓸 수 있도록 허용
# true(기본값)이면 Kyverno가 ConfigMap을 자체 관리하여 ArgoCD sync 시 충돌 발생
config:
  preserve: false

# kyverno-clean-reports CronJob은 bitnami/kubectl 이미지를 사용합니다.
# registry는 buildspec-gitops-bootstrap.yml의 --set 플래그로 런타임에 주입됩니다.
cleanupJobs:
  admissionReports:
    image:
      repository: financial/kyverno/kubectl
      tag: "1.30.2"  # Note: keep in sync with KUBECTL_VERSION in .github/workflows/ecr-images.yml
  clusterAdmissionReports:
    image:
      repository: financial/kyverno/kubectl
      tag: "1.30.2"  # Note: keep in sync with KUBECTL_VERSION in .github/workflows/ecr-images.yml
