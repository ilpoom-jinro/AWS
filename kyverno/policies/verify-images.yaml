# =============================================================================
# ClusterPolicy: verify-images
# 목적: ECR push 이미지의 Cosign 서명을 KMS 공개키로 검증합니다.
#
# 위험성:
#   Enforce 전환 시 Cosign 서명이 없는 이미지를 사용하는 모든 워크로드가
#   차단됩니다. 반드시 Audit 모드로 시작하여 PolicyReport 에서 미서명
#   이미지 위반이 0건임을 확인한 뒤 Enforce 로 전환하세요.
#
# 검증 방식 (오프라인 공개키):
#   Cilium Network Policy 가 외부 egress 를 DROP 하므로 런타임에 KMS API /
#   Rekor transparency log 호출이 불가합니다.
#   이 정책은 key-cosign KMS CMK(ECC_NIST_P256) 에서 추출한 공개키 PEM 을
#   직접 임베드하여 오프라인으로 서명을 검증합니다.
#
# Audit → Enforce 전환 (PolicyReport 에서 미서명 위반 0건 확인 후 실행):
#   kubectl patch clusterpolicy verify-images \
#     --type=merge \
#     -p '{"spec":{"validationFailureAction":"Enforce"}}'
#
# 예외 네임스페이스:
#   kube-system — coredns / kube-proxy / vpc-cni 등 EKS 관리 이미지.
#                 AWS 에서 직접 제공하므로 key-cosign 으로 서명되지 않습니다.
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-images
  annotations:
    policies.kyverno.io/title: Verify ECR Image Signatures
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: "1.10.0"
    policies.kyverno.io/description: >-
      ECR 에 push 된 이미지가 KMS key-cosign(ECC_NIST_P256) 으로 Cosign 서명됐는지
      공개키 PEM 임베드 방식으로 오프라인 검증합니다. kube-system 의 EKS 관리 이미지는
      AWS 에서 직접 제공하므로 검증에서 제외합니다.
spec:
  # Audit: 위반을 허용하되 PolicyReport 에 기록 (Enforce 전환 명령어는 상단 주석 참고)
  validationFailureAction: Audit

  # background: true → 이미 실행 중인 Pod 도 정책 평가 대상 (PolicyReport 생성)
  background: true

  rules:
    - name: verify-ecr-image-signatures
      # 모든 네임스페이스의 Pod 생성·업데이트 요청을 검사
      match:
        any:
          - resources:
              kinds:
                - Pod
      # EKS 관리 이미지(coredns / kube-proxy / vpc-cni)는 AWS 제공이라 서명 불가
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system  # coredns / kube-proxy / vpc-cni — AWS 제공, 서명 없음
      verifyImages:
        - imageReferences:
            - "*.dkr.ecr.ap-northeast-2.amazonaws.com/financial/*"
          # 태그 기반 배포 이미지를 허용. 서명은 digest 에 연결되어 있어 검증 통과.
          verifyDigest: false
          # 이미지 레퍼런스를 digest 형식으로 변환하지 않음 (verifyDigest: false 와 함께 필수)
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keys:
                    # key-cosign KMS CMK(ECC_NIST_P256) 에서 추출한 공개키 PEM (오프라인 검증용)
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEE30HzepeEfGV2buLiHa+j1ibYbey
                      /pUJPoAEnNjI1+qjJ+mgt48HNG5fE8irtbSfkwDD3laJy8Yw9uRvNIgxJA==
                      -----END PUBLIC KEY-----
                    rekor:
                      ignoreTlog: true
                    ctlog:
                      ignoreSCT: true
