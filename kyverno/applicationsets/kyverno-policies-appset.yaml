# =============================================================================
# ApplicationSet: kyverno-policies
# 목적: 내부 Gitea 의 kyverno/policies/ 경로에 있는 ClusterPolicy 를
#       ArgoCD 에 등록된 모든 클러스터에 자동 배포합니다.
#
# 소스: 내부 Gitea (buildspec-gitops-bootstrap.yml 에서 정책 파일 push)
#   경로: kyverno/policies/
#   URL: http://internal-git-http.git.svc.cluster.local:3000/gitops/platform.git
#
# 정책 추가 방법:
#   kyverno/policies/ 에 새 ClusterPolicy YAML 을 추가하고 커밋하면
#   buildspec-gitops-bootstrap.yml 재실행 시 Gitea 에 반영되고 ArgoCD 가 자동 동기화합니다.
#
# 새 클러스터 자동 적용:
#   argocd cluster add 로 클러스터를 등록하면 즉시 모든 정책이 배포됩니다.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno-policies
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    # ArgoCD 에 등록된 모든 클러스터 대상
    - clusters: {}

  template:
    metadata:
      name: "kyverno-policies-{{.name}}"
    spec:
      project: default

      source:
        repoURL: http://internal-git-http.git.svc.cluster.local:3000/gitops/platform.git
        targetRevision: main
        # ClusterPolicy YAML 파일들이 위치하는 경로
        path: kyverno/policies

      destination:
        server: "{{.server}}"
        # ClusterPolicy 는 클러스터 스코프 리소스이나 ArgoCD 는 네임스페이스를 요구함
        # kyverno 네임스페이스를 관례적으로 사용 (실제 리소스는 클러스터 전체에 적용됨)
        namespace: kyverno

      syncPolicy:
        automated:
          prune: true    # Gitea 에서 삭제된 정책은 클러스터에서도 제거
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
