aws_region: ap-northeast-2

ops_eks_cluster_name: financial-ops-eks
ops_kube_context: financial-ops-eks

service_eks_cluster_name: financial-service-eks
service_kube_context: financial-service-eks

argocd_namespace: argocd
argocd_release_name: argocd
argocd_chart_ref: /opt/helm-charts/argo-cd
argocd_image_repository: "{{ lookup('env', 'ARGOCD_IMAGE_REPOSITORY') }}"
argocd_image_tag: "{{ lookup('env', 'ARGOCD_IMAGE_TAG') | default('latest', true) }}"
argocd_redis_image_repository: "{{ lookup('env', 'ARGOCD_REDIS_IMAGE_REPOSITORY') }}"
argocd_redis_image_tag: "{{ lookup('env', 'ARGOCD_REDIS_IMAGE_TAG') | default('latest', true) }}"

istio_namespace: istio-system
istio_base_chart_ref: /opt/helm-charts/base
istio_istiod_chart_ref: /opt/helm-charts/istiod
istio_cni_chart_ref: /opt/helm-charts/cni
istio_ztunnel_chart_ref: /opt/helm-charts/ztunnel
istio_image_hub: "{{ lookup('env', 'ISTIO_IMAGE_HUB') }}"
istio_image_tag: "{{ lookup('env', 'ISTIO_IMAGE_TAG') | default('1.30.0', true) }}"
istio_helm_timeout: 15m
istio_rollout_timeout: 300s
addon_helm_timeout: 15m
rollout_timeout: 600s
service_ambient_namespaces:
  - stock-demo
ops_ambient_namespaces:
  - agents

cilium_namespace: kube-system
cilium_chart_ref: /opt/helm-charts/cilium
cilium_image_repository: "{{ lookup('env', 'CILIUM_IMAGE_REPOSITORY') }}"
cilium_image_tag: "{{ lookup('env', 'CILIUM_IMAGE_TAG') | default('v1.16.5', true) }}"
cilium_operator_image_repository: "{{ lookup('env', 'CILIUM_OPERATOR_IMAGE_REPOSITORY') }}"
cilium_envoy_image_repository: "{{ lookup('env', 'CILIUM_ENVOY_IMAGE_REPOSITORY') }}"
cilium_hubble_relay_image_repository: "{{ lookup('env', 'CILIUM_HUBBLE_RELAY_IMAGE_REPOSITORY') }}"
cilium_helm_timeout: 15m
cilium_rollout_timeout: 300s
internal_git_namespace: git
internal_git_release_name: internal-git
internal_git_service_name: internal-git-http
internal_git_image: "{{ lookup('env', 'INTERNAL_GIT_IMAGE') | default('gitea/gitea:1.22-rootless', true) }}"
internal_git_http_port: 3000
internal_git_local_http_port: 13000
internal_git_demo_local_http_port: 13001
internal_git_platform_local_http_port: 13002
internal_git_ssh_port: 2222
internal_git_admin_username: "{{ lookup('env', 'INTERNAL_GIT_ADMIN_USERNAME') | default('gitadmin', true) }}"
internal_git_admin_password: "{{ lookup('env', 'INTERNAL_GIT_ADMIN_PASSWORD') }}"
internal_git_admin_email: "gitadmin@internal.ops.local"
internal_git_org: gitops
internal_git_repo: platform

teleport_app_namespace: teleport-apps
teleport_app_join_secret_name: teleport-app-service-join-token
teleport_app_join_token: "{{ lookup('env', 'TELEPORT_APP_JOIN_TOKEN') | default('', true) }}"

gitops_repo_url: "http://internal-git-http.git.svc.cluster.local:3000/{{ internal_git_admin_username }}/{{ internal_git_repo }}.git"
gitops_repo_name: internal-gitops

demo_app_name: demo-app
demo_app_namespace: stock-demo
demo_app_path: financial-service-eks
demo_backend_name: backend
demo_frontend_name: frontend
demo_db_name: postgres
demo_backend_image: "{{ lookup('env', 'DEMO_BACKEND_IMAGE') | default('public.ecr.aws/docker/library/python:3.12-slim', true) }}"
demo_frontend_image: "{{ lookup('env', 'DEMO_FRONTEND_IMAGE') | default('public.ecr.aws/docker/library/nginx:1.27-alpine', true) }}"
demo_postgres_image: public.ecr.aws/docker/library/postgres:16-alpine
demo_db_name_value: stockdemo
demo_db_user: stockuser
demo_db_password: "{{ lookup('env', 'DEMO_DB_PASSWORD') | default('CHANGE_ME', true) }}"
demo_argocd_application_name: service-demo-app
