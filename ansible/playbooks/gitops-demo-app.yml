- name: Bootstrap demo-app GitOps deployment for the Service EKS cluster
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Stop because legacy demo-app GitOps bootstrap is disabled
      ansible.builtin.fail:
        msg: >
          gitops-demo-app.yml is disabled. The demo app is now deployed from
          gitops/platform/financial-service-eks through the service-demo-app
          Argo CD Application.
      when: not (allow_legacy_demo_app_bootstrap | default(false) | bool)

    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Update kubeconfig for the Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --alias {{ service_kube_context }}
      changed_when: false

    - name: Ensure service application namespace exists
      ansible.builtin.shell: >
          kubectl --context {{ service_kube_context }}
          create namespace {{ demo_app_namespace }}
          --dry-run=client -o yaml
          | kubectl --context {{ service_kube_context }} apply -f -
      changed_when: false

  tasks:
    - name: Ensure Argo CD manager service account exists in the Service cluster
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system

    - name: Ensure Argo CD manager has cluster admin access in the Service cluster
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system

    - name: Ensure long-lived token secret exists for Argo CD manager
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-manager-token
            namespace: kube-system
            annotations:
              kubernetes.io/service-account.name: argocd-manager
          type: kubernetes.io/service-account-token

    - name: Read Argo CD manager token
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n kube-system
          get secret argocd-manager-token
          -o jsonpath={.data.token}
      register: service_cluster_token_b64
      retries: 30
      delay: 2
      until: service_cluster_token_b64.stdout | length > 0
      changed_when: false
      no_log: true

    - name: Describe Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks describe-cluster
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --query cluster
          --output json
      register: service_cluster_description
      changed_when: false

    - name: Register Service EKS cluster in Argo CD
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-{{ service_eks_cluster_name }}
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: cluster
          stringData:
            name: "{{ service_eks_cluster_name }}"
            server: "{{ (service_cluster_description.stdout | from_json).endpoint }}"
            config: >-
              {{
                {
                  "bearerToken": service_cluster_token_b64.stdout | b64decode,
                  "tlsClientConfig": {
                    "insecure": false,
                    "caData": (service_cluster_description.stdout | from_json).certificateAuthority.data
                  }
                } | to_json
              }}
      no_log: true

    - name: Start local port-forward to internal Git service
      ansible.builtin.shell: |
        set -e
        rm -f /tmp/internal-git-demo-port-forward.log
        nohup kubectl --context {{ ops_kube_context }} -n {{ internal_git_namespace }} \
          port-forward svc/{{ internal_git_service_name }} {{ internal_git_demo_local_http_port }}:{{ internal_git_http_port }} \
          >/tmp/internal-git-demo-port-forward.log 2>&1 &
        echo $!
      changed_when: false
      register: internal_git_demo_port_forward_pid

    - name: Wait for internal Git demo port-forward listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ internal_git_demo_local_http_port }}"
        timeout: 30
      register: internal_git_demo_port_forward_wait
      failed_when: false

    - name: Show internal Git demo port-forward log when listener is not ready
      ansible.builtin.command:
        cmd: cat /tmp/internal-git-demo-port-forward.log
      when: internal_git_demo_port_forward_wait.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when internal Git demo port-forward listener is not ready
      ansible.builtin.fail:
        msg: "Internal Git demo port-forward did not open 127.0.0.1:{{ internal_git_demo_local_http_port }}. Check the port-forward log above."
      when: internal_git_demo_port_forward_wait.failed | default(false)

    - name: Wait for internal Git API through port-forward
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_demo_local_http_port }}/api/v1/version"
        method: GET
        status_code: 200
      register: internal_git_demo_api_probe
      retries: 60
      delay: 5
      until: internal_git_demo_api_probe.status == 200
      ignore_errors: true

    - name: Show internal Git demo port-forward log when API probe fails
      ansible.builtin.command:
        cmd: cat /tmp/internal-git-demo-port-forward.log
      when: internal_git_demo_api_probe.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when internal Git API is not ready through demo port-forward
      ansible.builtin.fail:
        msg: "Internal Git API did not respond through 127.0.0.1:{{ internal_git_demo_local_http_port }} during demo bootstrap. Check the port-forward log above."
      when: internal_git_demo_api_probe.failed | default(false)

    - name: Ensure GitOps organization exists
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_demo_local_http_port }}/api/v1/orgs"
        method: POST
        user: "{{ internal_git_admin_username }}"
        password: "{{ internal_git_admin_password }}"
        force_basic_auth: true
        status_code: [201, 422]
        body_format: json
        body:
          username: "{{ internal_git_org }}"
          full_name: GitOps
          visibility: public
      no_log: true

    - name: Ensure GitOps repository exists
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_demo_local_http_port }}/api/v1/orgs/{{ internal_git_org }}/repos"
        method: POST
        user: "{{ internal_git_admin_username }}"
        password: "{{ internal_git_admin_password }}"
        force_basic_auth: true
        status_code: [201, 409, 422]
        body_format: json
        body:
          name: "{{ internal_git_repo }}"
          description: Internal GitOps source of truth
          private: false
          auto_init: false
          default_branch: main
      no_log: true

    - name: Check whether the GitOps repository already has a main branch
      ansible.builtin.shell: |
        set -e
        git ls-remote \
          "http://{{ internal_git_admin_username }}:{{ internal_git_admin_password }}@127.0.0.1:{{ internal_git_demo_local_http_port }}/{{ internal_git_org }}/{{ internal_git_repo }}.git" \
          refs/heads/main
      register: internal_git_demo_main_branch
      failed_when: false
      changed_when: false
      no_log: true

    - name: Push initial GitOps repository commit
      ansible.builtin.shell: |
        set -e
        rm -rf /tmp/internal-gitops-bootstrap
        mkdir -p /tmp/internal-gitops-bootstrap/apps
        cd /tmp/internal-gitops-bootstrap
        git init -b main
        git config user.name "GitOps Bootstrap"
        git config user.email "gitops-bootstrap@internal.ops.local"
        cat > README.md <<'EOF'
        # Internal GitOps Repository

        This repository is bootstrapped automatically for the internal Argo CD control plane.
        EOF
        touch apps/.gitkeep
        git add README.md apps/.gitkeep
        git commit -m "Initial GitOps bootstrap"
        git remote add origin \
          "http://{{ internal_git_admin_username }}:{{ internal_git_admin_password }}@127.0.0.1:{{ internal_git_demo_local_http_port }}/{{ internal_git_org }}/{{ internal_git_repo }}.git"
        git push -u origin main
      when: internal_git_demo_main_branch.rc != 0 or internal_git_demo_main_branch.stdout | length == 0
      no_log: true

    - name: Push demo-app manifests to internal Git
      ansible.builtin.shell: |
        set -e
        rm -rf /tmp/internal-gitops-demo
        git clone "http://{{ internal_git_admin_username }}:{{ internal_git_admin_password }}@127.0.0.1:{{ internal_git_demo_local_http_port }}/{{ internal_git_org }}/{{ internal_git_repo }}.git" /tmp/internal-gitops-demo
        cd /tmp/internal-gitops-demo
        git config user.name "GitOps Bootstrap"
        git config user.email "gitops-bootstrap@internal.ops.local"
        mkdir -p "{{ demo_app_path }}"

        if [ ! -f "{{ demo_app_path }}/namespace.yaml" ]; then
          cat > "{{ demo_app_path }}/namespace.yaml" <<'EOF'
        apiVersion: v1
        kind: Namespace
        metadata:
          name: {{ demo_app_namespace }}
          labels:
            istio.io/dataplane-mode: ambient
        EOF
        fi

        if [ ! -f "{{ demo_app_path }}/db.yaml" ]; then
          cat > "{{ demo_app_path }}/db.yaml" <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{ demo_db_name }}-credentials
          namespace: {{ demo_app_namespace }}
        type: Opaque
        stringData:
          POSTGRES_DB: {{ demo_db_name_value }}
          POSTGRES_USER: {{ demo_db_user }}
          POSTGRES_PASSWORD: {{ demo_db_password }}
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: {{ demo_db_name }}-init
          namespace: {{ demo_app_namespace }}
        data:
          init.sql: |
            CREATE TABLE IF NOT EXISTS recommendations (
              id SERIAL PRIMARY KEY,
              name VARCHAR(100) NOT NULL,
              ticker VARCHAR(20) NOT NULL,
              reason TEXT NOT NULL,
              current_price INTEGER NOT NULL,
              recommended_price INTEGER NOT NULL,
              recommendation_date DATE NOT NULL,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );

            INSERT INTO recommendations
              (name, ticker, reason, current_price, recommended_price, recommendation_date)
            VALUES
              (
                'LG Energy Solution',
                '011070',
                'Battery packaging demand and operating margin recovery are expected to improve.',
                688000,
                577000,
                '2026-04-28'
              ),
              (
                'LS',
                '006260',
                'AI power infrastructure demand may support long-term cable and equipment growth.',
                505000,
                290500,
                '2026-03-19'
              ),
              (
                'Korea Financial Group',
                '071050',
                'Capital efficiency and investment banking earnings are expected to recover.',
                250000,
                246500,
                '2026-02-12'
              ),
              (
                'HD Hyundai Electric',
                '267260',
                'Grid equipment demand and infrastructure investment remain favorable.',
                1306000,
                351000,
                '2026-01-30'
              ),
              (
                'Samsung Electronics',
                '005930',
                'AI server demand and memory pricing recovery may improve earnings.',
                275750,
                76500,
                '2026-01-15'
              );
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{ demo_db_name }}
          namespace: {{ demo_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ demo_db_name }}
            app.kubernetes.io/part-of: {{ demo_app_name }}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: {{ demo_db_name }}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: {{ demo_db_name }}
                app.kubernetes.io/part-of: {{ demo_app_name }}
            spec:
              containers:
                - name: {{ demo_db_name }}
                  image: {{ demo_postgres_image }}
                  imagePullPolicy: IfNotPresent
                  envFrom:
                    - secretRef:
                        name: {{ demo_db_name }}-credentials
                  ports:
                    - name: postgres
                      containerPort: 5432
                  volumeMounts:
                    - name: init-sql
                      mountPath: /docker-entrypoint-initdb.d
              volumes:
                - name: init-sql
                  configMap:
                    name: {{ demo_db_name }}-init
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: {{ demo_db_name }}
          namespace: {{ demo_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ demo_db_name }}
            app.kubernetes.io/part-of: {{ demo_app_name }}
        spec:
          type: ClusterIP
          selector:
            app.kubernetes.io/name: {{ demo_db_name }}
          ports:
            - name: postgres
              port: 5432
              targetPort: postgres
        EOF
        fi

        if [ ! -f "{{ demo_app_path }}/backend.yaml" ]; then
          cat > "{{ demo_app_path }}/backend.yaml" <<'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{ demo_backend_name }}
          namespace: {{ demo_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ demo_backend_name }}
            app.kubernetes.io/part-of: {{ demo_app_name }}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: {{ demo_backend_name }}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: {{ demo_backend_name }}
                app.kubernetes.io/part-of: {{ demo_app_name }}
            spec:
              containers:
                - name: backend
                  image: {{ demo_backend_image }}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: DB_HOST
                      value: {{ demo_db_name }}
                    - name: DB_PORT
                      value: "5432"
                    - name: DB_NAME
                      valueFrom:
                        secretKeyRef:
                          name: {{ demo_db_name }}-credentials
                          key: POSTGRES_DB
                    - name: DB_USER
                      valueFrom:
                        secretKeyRef:
                          name: {{ demo_db_name }}-credentials
                          key: POSTGRES_USER
                    - name: DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: {{ demo_db_name }}-credentials
                          key: POSTGRES_PASSWORD
                    - name: CORS_ORIGINS
                      value: "*"
                    - name: OTEL_TRACING_ENABLED
                      value: "false"
                  ports:
                    - name: http
                      containerPort: 8000
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: http
                    initialDelaySeconds: 5
                    periodSeconds: 10
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: http
                    initialDelaySeconds: 20
                    periodSeconds: 20
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: {{ demo_backend_name }}
          namespace: {{ demo_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ demo_backend_name }}
            app.kubernetes.io/part-of: {{ demo_app_name }}
        spec:
          type: ClusterIP
          selector:
            app.kubernetes.io/name: {{ demo_backend_name }}
          ports:
            - name: http
              port: 8000
              targetPort: http
        EOF
        fi

        if [ ! -f "{{ demo_app_path }}/frontend.yaml" ]; then
          cat > "{{ demo_app_path }}/frontend.yaml" <<'EOF'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{ demo_frontend_name }}
          namespace: {{ demo_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ demo_frontend_name }}
            app.kubernetes.io/part-of: {{ demo_app_name }}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: {{ demo_frontend_name }}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: {{ demo_frontend_name }}
                app.kubernetes.io/part-of: {{ demo_app_name }}
            spec:
              containers:
                - name: frontend
                  image: {{ demo_frontend_image }}
                  imagePullPolicy: IfNotPresent
                  ports:
                    - name: http
                      containerPort: 80
                  readinessProbe:
                    httpGet:
                      path: /
                      port: http
                    initialDelaySeconds: 5
                    periodSeconds: 10
                  livenessProbe:
                    httpGet:
                      path: /
                      port: http
                    initialDelaySeconds: 20
                    periodSeconds: 20
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: {{ demo_frontend_name }}
          namespace: {{ demo_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ demo_frontend_name }}
            app.kubernetes.io/part-of: {{ demo_app_name }}
        spec:
          type: LoadBalancer
          selector:
            app.kubernetes.io/name: {{ demo_frontend_name }}
          ports:
            - name: http
              port: 80
              targetPort: http
        EOF
        fi

        python3 - <<'PY'
        from pathlib import Path
        import yaml

        manifest_path = Path("{{ demo_app_path }}/frontend.yaml")
        docs = list(yaml.safe_load_all(manifest_path.read_text()))

        for doc in docs:
          if not isinstance(doc, dict):
            continue
          if doc.get("kind") != "Service":
            continue
          metadata = doc.setdefault("metadata", {})
          if metadata.get("name") != "{{ demo_frontend_name }}":
            continue
          metadata.setdefault("annotations", {})
          spec = doc.setdefault("spec", {})
          spec["type"] = "LoadBalancer"

        manifest_path.write_text(
          "---\n".join(yaml.safe_dump(doc, sort_keys=False) for doc in docs)
        )
        PY

        git add "{{ demo_app_path }}"
        git diff --cached --quiet && exit 0
        git commit -m "Bootstrap demo-app GitOps manifests"
        git push origin main
      no_log: true

    - name: Create Argo CD Application for the demo app
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "{{ demo_argocd_application_name }}"
            namespace: "{{ argocd_namespace }}"
          spec:
            project: default
            source:
              repoURL: "{{ gitops_repo_url }}"
              targetRevision: main
              path: "{{ demo_app_path }}"
            destination:
              name: "{{ service_eks_cluster_name }}"
              namespace: "{{ demo_app_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true

    - name: Wait for demo-app Argo CD Application to exist
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ argocd_namespace }}
          get application/{{ demo_argocd_application_name }}
      register: demo_app_application_probe
      retries: 30
      delay: 5
      until: demo_app_application_probe.rc == 0
      changed_when: false

    - name: Stop internal Git demo port-forward
      ansible.builtin.shell: |
        kill {{ internal_git_demo_port_forward_pid.stdout }} >/dev/null 2>&1 || true
      changed_when: false
      failed_when: false
