- name: Bootstrap service applications through Argo CD
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Update kubeconfig for the Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --alias {{ service_kube_context }}
      changed_when: false

    - name: Ensure service application namespace exists
      ansible.builtin.shell: >
          kubectl --context {{ service_kube_context }}
          create namespace {{ service_app_namespace }}
          --dry-run=client -o yaml
          | kubectl --context {{ service_kube_context }} apply -f -
      changed_when: false

  tasks:
    - name: Ensure Argo CD manager service account exists in the Service cluster
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system

    - name: Ensure Argo CD manager has cluster admin access in the Service cluster
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system

    - name: Ensure long-lived token secret exists for Argo CD manager
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-manager-token
            namespace: kube-system
            annotations:
              kubernetes.io/service-account.name: argocd-manager
          type: kubernetes.io/service-account-token

    - name: Read Argo CD manager token
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n kube-system
          get secret argocd-manager-token
          -o jsonpath={.data.token}
      register: service_cluster_token_b64
      retries: 30
      delay: 2
      until: service_cluster_token_b64.stdout | length > 0
      changed_when: false
      no_log: true

    - name: Describe Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks describe-cluster
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --query cluster
          --output json
      register: service_cluster_description
      changed_when: false

    - name: Register Service EKS cluster in Argo CD
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-{{ service_eks_cluster_name }}
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: cluster
          stringData:
            name: "{{ service_eks_cluster_name }}"
            server: "{{ (service_cluster_description.stdout | from_json).endpoint }}"
            config: >-
              {{
                {
                  "bearerToken": service_cluster_token_b64.stdout | b64decode,
                  "tlsClientConfig": {
                    "insecure": false,
                    "caData": (service_cluster_description.stdout | from_json).certificateAuthority.data
                  }
                } | to_json
              }}
      no_log: true

    - name: Start local port-forward to internal Git service
      ansible.builtin.shell: |
        set -e
        rm -f /tmp/internal-git-demo-port-forward.log
        nohup kubectl --context {{ ops_kube_context }} -n {{ internal_git_namespace }} \
          port-forward svc/{{ internal_git_service_name }} {{ internal_git_demo_local_http_port }}:{{ internal_git_http_port }} \
          >/tmp/internal-git-demo-port-forward.log 2>&1 &
        echo $!
      changed_when: false
      register: internal_git_demo_port_forward_pid

    - name: Wait for internal Git demo port-forward listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ internal_git_demo_local_http_port }}"
        timeout: 30
      register: internal_git_demo_port_forward_wait
      failed_when: false

    - name: Show internal Git demo port-forward log when listener is not ready
      ansible.builtin.command:
        cmd: cat /tmp/internal-git-demo-port-forward.log
      when: internal_git_demo_port_forward_wait.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when internal Git demo port-forward listener is not ready
      ansible.builtin.fail:
        msg: "Internal Git demo port-forward did not open 127.0.0.1:{{ internal_git_demo_local_http_port }}. Check the port-forward log above."
      when: internal_git_demo_port_forward_wait.failed | default(false)

    - name: Wait for internal Git API through port-forward
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_demo_local_http_port }}/api/v1/version"
        method: GET
        status_code: 200
      register: internal_git_demo_api_probe
      retries: 30
      delay: 2
      until: internal_git_demo_api_probe.status == 200
      ignore_errors: true

    - name: Show internal Git demo port-forward log when API probe fails
      ansible.builtin.command:
        cmd: cat /tmp/internal-git-demo-port-forward.log
      when: internal_git_demo_api_probe.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when internal Git API is not ready through demo port-forward
      ansible.builtin.fail:
        msg: "Internal Git API did not respond through 127.0.0.1:{{ internal_git_demo_local_http_port }} during demo bootstrap. Check the port-forward log above."
      when: internal_git_demo_api_probe.failed | default(false)

    - name: Push service app manifests to internal Git
      ansible.builtin.shell: |
        set -e
        rm -rf /tmp/internal-gitops-service-apps
        git clone "http://{{ internal_git_admin_username }}:{{ internal_git_admin_password }}@127.0.0.1:{{ internal_git_demo_local_http_port }}/{{ internal_git_org }}/{{ internal_git_repo }}.git" /tmp/internal-gitops-service-apps
        cd /tmp/internal-gitops-service-apps
        git config user.name "GitOps Bootstrap"
        git config user.email "gitops-bootstrap@internal.ops.local"

        {% for app in service_apps %}
        mkdir -p "{{ app.path }}"
        cat > "{{ app.path }}/deployment.yaml" <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{ app.name }}
          namespace: {{ service_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ app.name }}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: {{ app.name }}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: {{ app.name }}
            spec:
              containers:
                - name: {{ app.container_name }}
                  image: {{ app.image }}
                  imagePullPolicy: IfNotPresent
                  ports:
                    - name: http
                      containerPort: {{ app.container_port }}
        EOF
        cat > "{{ app.path }}/service.yaml" <<EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: {{ app.name }}
          namespace: {{ service_app_namespace }}
          labels:
            app.kubernetes.io/name: {{ app.name }}
        spec:
          type: ClusterIP
          selector:
            app.kubernetes.io/name: {{ app.name }}
          ports:
            - name: http
              port: {{ app.service_port }}
              targetPort: http
        EOF
        git add "{{ app.path }}/deployment.yaml" "{{ app.path }}/service.yaml"
        {% endfor %}

        git diff --cached --quiet && exit 0
        git commit -m "Deploy service frontend and backend apps"
        git push origin main
      no_log: true

    - name: Create Argo CD Applications for service apps
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "{{ item.argocd_application_name }}"
            namespace: "{{ argocd_namespace }}"
          spec:
            project: default
            source:
              repoURL: "{{ gitops_repo_url }}"
              targetRevision: main
              path: "{{ item.path }}"
            destination:
              name: "{{ service_eks_cluster_name }}"
              namespace: "{{ service_app_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
      loop: "{{ service_apps }}"

    - name: Wait for service app deployments to be created in the Service cluster
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n {{ service_app_namespace }}
          get deployment/{{ item.name }}
      register: service_app_deployment_probe
      retries: 60
      delay: 5
      until: service_app_deployment_probe.rc == 0
      changed_when: false
      loop: "{{ service_apps }}"

    - name: Wait for service app deployments in the Service cluster
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n {{ service_app_namespace }}
          rollout status deployment/{{ item.name }}
          --timeout={{ rollout_timeout }}
      changed_when: false
      loop: "{{ service_apps }}"

    - name: Stop internal Git demo port-forward
      ansible.builtin.shell: |
        kill {{ internal_git_demo_port_forward_pid.stdout }} >/dev/null 2>&1 || true
      changed_when: false
      failed_when: false
