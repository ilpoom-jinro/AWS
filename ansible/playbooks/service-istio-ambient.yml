- name: Install Istio ambient mesh on Service and Ops EKS clusters
  hosts: localhost
  gather_facts: false

  vars:
    istio_clusters:
      - name: service
        cluster_name: "{{ service_eks_cluster_name }}"
        kube_context: "{{ service_kube_context }}"
        ambient_namespaces: "{{ service_ambient_namespaces }}"
      - name: ops
        cluster_name: "{{ ops_eks_cluster_name }}"
        kube_context: "{{ ops_kube_context }}"
        ambient_namespaces: "{{ ops_ambient_namespaces }}"

    istio_values:
      profile: ambient
      global:
        hub: "{{ istio_image_hub }}"
        tag: "{{ istio_image_tag }}"
      hub: "{{ istio_image_hub }}"
      tag: "{{ istio_image_tag }}"

  tasks:
    - name: Update kubeconfig for Istio target clusters
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ item.cluster_name }}
          --alias {{ item.kube_context }}
      loop: "{{ istio_clusters }}"
      changed_when: false

    - name: Check Kubernetes API reachability for Istio target clusters
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.kube_context }}
          get --raw=/version
          --request-timeout=10s
      loop: "{{ istio_clusters }}"
      register: istio_api_reachability
      changed_when: false
      ignore_errors: true

    - name: Print Kubernetes API reachability failures
      ansible.builtin.debug:
        msg:
          cluster: "{{ item.item.name }}"
          context: "{{ item.item.kube_context }}"
          stdout: "{{ item.stdout | default('') }}"
          stderr: "{{ item.stderr | default('') }}"
          rc: "{{ item.rc | default('') }}"
      loop: "{{ istio_api_reachability.results | default([]) }}"
      when: item.failed | default(false)

    - name: Stop when Kubernetes API is not reachable
      ansible.builtin.fail:
        msg: "Kubernetes API is not reachable from CodeBuild. Check VPC peering, routes, EKS cluster security group 443, CodeBuild egress, and private DNS."
      when: >
        istio_api_reachability.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | list
        | length > 0

    - name: Ensure Istio namespace exists
      ansible.builtin.shell: >
          kubectl --context {{ item.kube_context }}
          create namespace {{ istio_namespace }}
          --dry-run=client -o yaml
          | kubectl --context {{ item.kube_context }} apply -f -
      loop: "{{ istio_clusters }}"
      changed_when: false

    - name: Install or upgrade Istio base
      kubernetes.core.helm:
        context: "{{ item.kube_context }}"
        release_name: istio-base
        release_namespace: "{{ istio_namespace }}"
        chart_ref: "{{ istio_base_chart_ref }}"
        create_namespace: true
        wait: true
        timeout: "{{ istio_helm_timeout }}"
      loop: "{{ istio_clusters }}"

    - name: Install or upgrade Istio discovery control plane
      kubernetes.core.helm:
        context: "{{ item.kube_context }}"
        release_name: istiod
        release_namespace: "{{ istio_namespace }}"
        chart_ref: "{{ istio_istiod_chart_ref }}"
        create_namespace: true
        values: "{{ istio_values }}"
        wait: true
        timeout: "{{ istio_helm_timeout }}"
      loop: "{{ istio_clusters }}"
      register: istiod_helm_results
      ignore_errors: true

    - name: Show Istio pod state when istiod install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          get pods -o wide
      loop: "{{ istiod_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show Istio recent events when istiod install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          get events --sort-by=.lastTimestamp
      loop: "{{ istiod_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Describe istiod deployment when istiod install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          describe deployment istiod
      loop: "{{ istiod_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show istiod Helm status when istiod install fails
      ansible.builtin.command:
        cmd: >
          helm --kube-context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          status istiod
      loop: "{{ istiod_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when istiod install fails
      ansible.builtin.fail:
        msg: "istiod Helm install failed. Check the pod, event, deployment, and Helm status output above."
      when: >
        istiod_helm_results.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | list
        | length > 0

    - name: Install or upgrade Istio CNI for ambient mode
      kubernetes.core.helm:
        context: "{{ item.kube_context }}"
        release_name: istio-cni
        release_namespace: "{{ istio_namespace }}"
        chart_ref: "{{ istio_cni_chart_ref }}"
        create_namespace: true
        values: "{{ istio_values }}"
        wait: true
        timeout: "{{ istio_helm_timeout }}"
      loop: "{{ istio_clusters }}"
      register: istio_cni_helm_results
      ignore_errors: true

    - name: Show Istio CNI pod state when install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          get pods -o wide
      loop: "{{ istio_cni_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show Istio CNI recent events when install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          get events --sort-by=.lastTimestamp
      loop: "{{ istio_cni_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Describe Istio CNI daemonset when install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          describe daemonset istio-cni-node
      loop: "{{ istio_cni_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show Istio CNI Helm status when install fails
      ansible.builtin.command:
        cmd: >
          helm --kube-context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          status istio-cni
      loop: "{{ istio_cni_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when Istio CNI install fails
      ansible.builtin.fail:
        msg: "Istio CNI Helm install failed. Check the pod, event, daemonset, and Helm status output above."
      when: >
        istio_cni_helm_results.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | list
        | length > 0

    - name: Install or upgrade Istio ztunnel
      kubernetes.core.helm:
        context: "{{ item.kube_context }}"
        release_name: ztunnel
        release_namespace: "{{ istio_namespace }}"
        chart_ref: "{{ istio_ztunnel_chart_ref }}"
        create_namespace: true
        values: "{{ istio_values }}"
        wait: true
        timeout: "{{ istio_helm_timeout }}"
      loop: "{{ istio_clusters }}"
      register: ztunnel_helm_results
      ignore_errors: true

    - name: Show ztunnel pod state when install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          get pods -o wide
      loop: "{{ ztunnel_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show ztunnel recent events when install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          get events --sort-by=.lastTimestamp
      loop: "{{ ztunnel_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Describe ztunnel daemonset when install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          describe daemonset ztunnel
      loop: "{{ ztunnel_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show ztunnel Helm status when install fails
      ansible.builtin.command:
        cmd: >
          helm --kube-context {{ item.item.kube_context }}
          -n {{ istio_namespace }}
          status ztunnel
      loop: "{{ ztunnel_helm_results.results | default([]) }}"
      when: item.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when ztunnel install fails
      ansible.builtin.fail:
        msg: "ztunnel Helm install failed. Check the pod, event, daemonset, and Helm status output above."
      when: >
        ztunnel_helm_results.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | list
        | length > 0

    - name: Ensure ambient namespaces exist
      ansible.builtin.shell: >
          kubectl --context {{ item.0.kube_context }}
          create namespace {{ item.1 }}
          --dry-run=client -o yaml
          | kubectl --context {{ item.0.kube_context }} apply -f -
      loop: "{{ istio_clusters | subelements('ambient_namespaces') }}"
      changed_when: false

    - name: Enroll selected namespaces into Istio ambient mesh
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.0.kube_context }}
          label namespace {{ item.1 }}
          istio.io/dataplane-mode=ambient
          --overwrite
      loop: "{{ istio_clusters | subelements('ambient_namespaces') }}"
      changed_when: false

    - name: Verify Istio pods
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ item.kube_context }}
          -n {{ istio_namespace }}
          get pods
      loop: "{{ istio_clusters }}"
      changed_when: false
