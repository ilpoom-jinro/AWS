- name: Install Prometheus on the Internal Ops EKS cluster
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Ensure Prometheus namespace exists
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ prometheus_namespace }}"

  tasks:
    - name: Install or upgrade Prometheus
      kubernetes.core.helm:
        context: "{{ ops_kube_context }}"
        release_name: "{{ prometheus_release_name }}"
        release_namespace: "{{ prometheus_namespace }}"
        chart_ref: "{{ prometheus_chart_ref }}"
        create_namespace: true
        update_repo_cache: false
        values: "{{ lookup('template', '../templates/prometheus-values.yml.j2') | from_yaml }}"
        wait: true
        timeout: "{{ addon_helm_timeout }}"
      register: prometheus_helm_result
      ignore_errors: true

    - name: Show Prometheus pod state when Helm install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          get pods -o wide
      when: prometheus_helm_result.failed | default(false)
      register: prometheus_pod_state
      changed_when: false
      failed_when: false

    - name: Print Prometheus pod state when Helm install fails
      ansible.builtin.debug:
        var: prometheus_pod_state.stdout_lines
      when: prometheus_helm_result.failed | default(false)

    - name: Show Prometheus recent events when Helm install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          get events --sort-by=.lastTimestamp
      when: prometheus_helm_result.failed | default(false)
      register: prometheus_recent_events
      changed_when: false
      failed_when: false

    - name: Print Prometheus recent events when Helm install fails
      ansible.builtin.debug:
        var: prometheus_recent_events.stdout_lines
      when: prometheus_helm_result.failed | default(false)

    - name: Describe Prometheus server deployment when Helm install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          describe deployment {{ prometheus_release_name }}-server
      when: prometheus_helm_result.failed | default(false)
      register: prometheus_server_describe
      changed_when: false
      failed_when: false

    - name: Print Prometheus server deployment description when Helm install fails
      ansible.builtin.debug:
        var: prometheus_server_describe.stdout_lines
      when: prometheus_helm_result.failed | default(false)

    - name: Stop when Prometheus Helm install fails
      ansible.builtin.fail:
        msg: "Prometheus Helm install failed. Check pod state and events above."
      when: prometheus_helm_result.failed | default(false)

    - name: Wait for Prometheus server rollout
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          rollout status deployment/{{ prometheus_release_name }}-server
          --timeout={{ rollout_timeout }}
      register: prometheus_rollout_result
      changed_when: false
      ignore_errors: true

    - name: Restart Prometheus server rollout when previous progress deadline is exceeded
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          rollout restart deployment/{{ prometheus_release_name }}-server
      when: >
        prometheus_rollout_result.failed | default(false)
        and 'exceeded its progress deadline' in (prometheus_rollout_result.stderr | default(''))
      changed_when: true

    - name: Wait for Prometheus server rollout after restart
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          rollout status deployment/{{ prometheus_release_name }}-server
          --timeout={{ rollout_timeout }}
      register: prometheus_rollout_retry_result
      when: >
        prometheus_rollout_result.failed | default(false)
        and 'exceeded its progress deadline' in (prometheus_rollout_result.stderr | default(''))
      changed_when: false
      ignore_errors: true

    - name: Set Prometheus rollout failure fact
      ansible.builtin.set_fact:
        prometheus_rollout_failed: >-
          {{
            (
              prometheus_rollout_result.failed | default(false)
              and not (
                'exceeded its progress deadline' in (prometheus_rollout_result.stderr | default(''))
                and not (prometheus_rollout_retry_result.failed | default(false))
              )
            )
          }}

    - name: Show Prometheus pod state when rollout fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          get pods -o wide
      when: prometheus_rollout_failed
      register: prometheus_rollout_pod_state
      changed_when: false
      failed_when: false

    - name: Print Prometheus pod state when rollout fails
      ansible.builtin.debug:
        var: prometheus_rollout_pod_state.stdout_lines
      when: prometheus_rollout_failed

    - name: Show Prometheus recent events when rollout fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          get events --sort-by=.lastTimestamp
      when: prometheus_rollout_failed
      register: prometheus_rollout_recent_events
      changed_when: false
      failed_when: false

    - name: Print Prometheus recent events when rollout fails
      ansible.builtin.debug:
        var: prometheus_rollout_recent_events.stdout_lines
      when: prometheus_rollout_failed

    - name: Describe Prometheus server deployment when rollout fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ prometheus_namespace }}
          describe deployment {{ prometheus_release_name }}-server
      when: prometheus_rollout_failed
      register: prometheus_rollout_deployment_describe
      changed_when: false
      failed_when: false

    - name: Print Prometheus server deployment description when rollout fails
      ansible.builtin.debug:
        var: prometheus_rollout_deployment_describe.stdout_lines
      when: prometheus_rollout_failed

    - name: Show Prometheus server pod logs when rollout fails
      ansible.builtin.shell: |
        set -e
        selector='app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server'
        if ! kubectl --context {{ ops_kube_context }} -n {{ prometheus_namespace }} get pods -l "$selector" --no-headers 2>/dev/null | grep -q .; then
          selector='component=server'
        fi
        kubectl --context {{ ops_kube_context }} -n {{ prometheus_namespace }} logs -l "$selector" --all-containers=true --tail=120
      when: prometheus_rollout_failed
      register: prometheus_rollout_logs
      changed_when: false
      failed_when: false

    - name: Print Prometheus server pod logs when rollout fails
      ansible.builtin.debug:
        var: prometheus_rollout_logs.stdout_lines
      when: prometheus_rollout_failed

    - name: Stop when Prometheus server rollout fails
      ansible.builtin.fail:
        msg: "Prometheus server rollout failed. Check pod state, events, deployment description, and logs above."
      when: prometheus_rollout_failed
