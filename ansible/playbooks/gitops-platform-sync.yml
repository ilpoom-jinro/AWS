- name: Sync the GitHub-managed platform seed into the internal GitOps repository
  hosts: localhost
  gather_facts: false
  vars:
    gitops_platform_seed_dir: "{{ playbook_dir }}/../../gitops/platform"
    gitops_platform_workdir: /tmp/internal-gitops-platform

  pre_tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Ensure the GitOps platform seed exists
      ansible.builtin.stat:
        path: "{{ gitops_platform_seed_dir }}/bootstrap/platform-app-of-apps.yaml"
      register: gitops_platform_seed

    - name: Stop when the GitOps platform seed is missing
      ansible.builtin.fail:
        msg: "GitOps platform seed was not found at {{ gitops_platform_seed_dir }}."
      when: not gitops_platform_seed.stat.exists

    - name: Read the Ops VPC ID from the EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks describe-cluster
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --query cluster.resourcesVpcConfig.vpcId
          --output text
      register: ops_vpc_id
      changed_when: false

    - name: Read the Service VPC ID from the EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks describe-cluster
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --query cluster.resourcesVpcConfig.vpcId
          --output text
      register: service_vpc_id
      changed_when: false

    - name: Read the AWS account ID for the private ECR registry
      ansible.builtin.command:
        cmd: >
          aws sts get-caller-identity
          --query Account
          --output text
      register: aws_account_id
      changed_when: false

    - name: Read the VPC3 Teleport private IP
      ansible.builtin.command:
        cmd: >
          aws ec2 describe-instances
          --region {{ aws_region }}
          --filters
          Name=tag:Name,Values=financial-vpc3-teleport
          Name=instance-state-name,Values=running
          --query Reservations[0].Instances[0].PrivateIpAddress
          --output text
      register: teleport_private_ip
      changed_when: false

    - name: Read the Loki internal NLB security group ID
      ansible.builtin.command:
        cmd: >
          aws ec2 describe-security-groups
          --region {{ aws_region }}
          --filters
          Name=vpc-id,Values={{ ops_vpc_id.stdout }}
          Name=group-name,Values=financial-vpc2-loki-nlb-sg
          --query SecurityGroups[0].GroupId
          --output text
      register: loki_nlb_sg_id
      changed_when: false

    - name: Read the Thanos Receive internal NLB security group ID
      ansible.builtin.command:
        cmd: >
          aws ec2 describe-security-groups
          --region {{ aws_region }}
          --filters
          Name=vpc-id,Values={{ ops_vpc_id.stdout }}
          Name=group-name,Values=financial-vpc2-thanos-receive-nlb-sg
          --query SecurityGroups[0].GroupId
          --output text
      register: thanos_receive_nlb_sg_id
      changed_when: false

    - name: Read the Tempo internal NLB security group ID
      ansible.builtin.command:
        cmd: >
          aws ec2 describe-security-groups
          --region {{ aws_region }}
          --filters
          Name=vpc-id,Values={{ ops_vpc_id.stdout }}
          Name=group-name,Values=financial-vpc2-tempo-nlb-sg
          --query SecurityGroups[0].GroupId
          --output text
      register: tempo_nlb_sg_id
      changed_when: false

    - name: Read the Service RDS endpoint
      ansible.builtin.command:
        cmd: >
          aws rds describe-db-instances
          --region {{ aws_region }}
          --db-instance-identifier financial-service-db
          --query DBInstances[0].Endpoint.Address
          --output text
      register: service_rds_endpoint
      changed_when: false

    - name: Read the Ops RDS endpoint
      ansible.builtin.command:
        cmd: >
          aws rds describe-db-instances
          --region {{ aws_region }}
          --db-instance-identifier financial-ops-db
          --query DBInstances[0].Endpoint.Address
          --output text
      register: ops_rds_endpoint
      changed_when: false

    # WAF ACL ARN은 SSM Parameter Store 경유로 읽는다. seed CodeBuild가 도는
    # 격리 ops VPC에는 wafv2 엔드포인트가 없어 `aws wafv2` 호출은 connect timeout
    # (SSM 엔드포인트는 존재). WAF가 아직 apply되지 않아 파라미터가 없어도
    # seed를 막지 않도록 failed_when: false (WAF는 선택 기능 → 미적용 시 어노테이션 제거).
    - name: Read the Service ALB WAF web ACL ARN (optional; via SSM)
      ansible.builtin.command:
        cmd: >
          aws ssm get-parameter
          --region {{ aws_region }}
          --name /financial/waf/service-alb-acl-arn
          --query Parameter.Value
          --output text
      register: waf_acl_arn
      changed_when: false
      failed_when: false

    - name: Stop when an automatically discovered AWS value is missing
      ansible.builtin.fail:
        msg: "Failed to discover the Ops VPC ID, Service VPC ID, monitoring NLB security group IDs, or Service RDS endpoint."
      when: >
        ops_vpc_id.stdout in ["", "None"] or
        service_vpc_id.stdout in ["", "None"] or
        teleport_private_ip.stdout in ["", "None"] or
        loki_nlb_sg_id.stdout in ["", "None"] or
        thanos_receive_nlb_sg_id.stdout in ["", "None"] or
        tempo_nlb_sg_id.stdout in ["", "None"] or
        service_rds_endpoint.stdout in ["", "None"] or
        ops_rds_endpoint.stdout in ["", "None"]

  tasks:
    - name: Start local port-forward to the internal Git service
      ansible.builtin.shell: |
        set -e
        rm -f /tmp/internal-git-platform-port-forward.log
        nohup kubectl --context {{ ops_kube_context }} -n {{ internal_git_namespace }} \
          port-forward svc/{{ internal_git_service_name }} {{ internal_git_platform_local_http_port }}:{{ internal_git_http_port }} \
          >/tmp/internal-git-platform-port-forward.log 2>&1 &
        echo $!
      changed_when: false
      register: internal_git_platform_port_forward_pid

    - name: Wait for the internal Git port-forward listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ internal_git_platform_local_http_port }}"
        timeout: 30

    - name: Ensure platform repository exists in Gitea
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_platform_local_http_port }}/api/v1/user/repos"
        method: POST
        user: "{{ internal_git_admin_username }}"
        password: "{{ internal_git_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ internal_git_repo }}"
          private: true
          auto_init: true
          default_branch: main
        status_code: [201, 409]
      no_log: true

    - name: Ensure Teleport app-service namespace exists
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ teleport_app_namespace }}"

    - name: Ensure Teleport app-service join token secret exists
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ teleport_app_join_secret_name }}"
            namespace: "{{ teleport_app_namespace }}"
          type: Opaque
          stringData:
            token: "{{ teleport_app_join_token }}"
      no_log: true
      when: teleport_app_join_token | length > 0

    - name: Push the platform seed to the internal GitOps repository
      ansible.builtin.shell: |
        set -e
        rm -rf "{{ gitops_platform_workdir }}"
        git clone \
          "http://{{ internal_git_admin_username }}:{{ internal_git_admin_password }}@127.0.0.1:{{ internal_git_platform_local_http_port }}/{{ internal_git_admin_username }}/{{ internal_git_repo }}.git" \
          "{{ gitops_platform_workdir }}"
        cd "{{ gitops_platform_workdir }}"
        git config user.name "GitOps Platform Sync"
        git config user.email "gitops-platform-sync@internal.ops.local"

        python3 - <<'PY'
        import json
        from pathlib import Path

        preserve_paths = sorted(
            path
            for path in Path("financial-ops-eks").rglob("kustomization.yaml")
            if path.exists()
        )

        preserved = {}
        for path in preserve_paths:
            if not path.exists():
                continue
            try:
                import yaml
                doc = yaml.safe_load(path.read_text()) or {}
            except Exception:
                continue

            images = {}
            for image in doc.get("images", []) or []:
                if not isinstance(image, dict):
                    continue
                name = image.get("name")
                new_tag = image.get("newTag")
                new_name = image.get("newName")
                if not name or not new_tag or new_tag == "latest":
                    continue
                images[name] = {
                    "newName": new_name,
                    "newTag": new_tag,
                }
            if images:
                preserved[str(path)] = images

        Path("/tmp/gitops-preserved-mas-image-tags.json").write_text(
            json.dumps(preserved, indent=2, sort_keys=True)
        )
        if preserved:
            print("Preserved MAS image tags before platform seed sync:")
            print(json.dumps(preserved, indent=2, sort_keys=True))
        else:
            print("No immutable MAS image tags to preserve before platform seed sync.")
        PY

        rm -rf applications bootstrap financial-ops-eks financial-service-eks helmChart
        rm -f MY_TASKS.md TEAM_REQUESTS.md
        cp -R "{{ gitops_platform_seed_dir }}/." .
        find . -name .DS_Store -delete

        python3 - <<'PY'
        import os
        from pathlib import Path

        replacements = {
            "REPLACE_WITH_ECR_REGISTRY": f"{os.environ['AWS_ACCOUNT_ID']}.dkr.ecr.{os.environ['AWS_REGION']}.amazonaws.com",
            "REPLACE_WITH_ACCOUNT_ID": os.environ["AWS_ACCOUNT_ID"],
            "REPLACE_WITH_OPS_VPC_ID": os.environ["OPS_VPC_ID"],
            "REPLACE_WITH_SERVICE_VPC_ID": os.environ["SERVICE_VPC_ID"],
            "REPLACE_WITH_TELEPORT_PROXY_SERVER": os.environ["TELEPORT_PROXY_SERVER"],
            "REPLACE_WITH_TELEPORT_APP_PUBLIC_SUFFIX": os.environ["TELEPORT_APP_PUBLIC_SUFFIX"],
            "REPLACE_WITH_OPS_LOKI_NLB_SG_ID": os.environ["LOKI_NLB_SG_ID"],
            "REPLACE_WITH_OPS_THANOS_RECEIVE_NLB_SG_ID": os.environ["THANOS_RECEIVE_NLB_SG_ID"],
            "REPLACE_WITH_OPS_TEMPO_NLB_SG_ID": os.environ["TEMPO_NLB_SG_ID"],
            "REPLACE_WITH_SERVICE_RDS_ENDPOINT": os.environ["SERVICE_RDS_ENDPOINT"],
            "REPLACE_WITH_OPS_RDS_ENDPOINT": os.environ["OPS_RDS_ENDPOINT"],
        }

        # WAF는 선택 기능. SSM 파라미터가 있으면(=WAF apply됨) ARN을 주입하고,
        # 없으면(빈 값/None) placeholder가 든 어노테이션 줄 자체를 제거한다.
        # (빈 문자열로 치환하면 wafv2-acl-arn: "" 가 되어 LB 컨트롤러가 거부)
        waf_arn = os.environ.get("WAF_ACL_ARN", "").strip()

        for path in Path(".").rglob("*"):
            if path.suffix not in [".yaml", ".yml", ".md"]:
                continue
            content = path.read_text()
            for placeholder, value in replacements.items():
                content = content.replace(placeholder, value)
            if "REPLACE_WITH_WAF_ACL_ARN" in content:
                if waf_arn and waf_arn != "None":
                    content = content.replace("REPLACE_WITH_WAF_ACL_ARN", waf_arn)
                else:
                    content = "".join(
                        line for line in content.splitlines(keepends=True)
                        if "REPLACE_WITH_WAF_ACL_ARN" not in line
                    )
            path.write_text(content)
        PY

        python3 - <<'PY'
        import json
        from pathlib import Path
        import yaml

        preserved_path = Path("/tmp/gitops-preserved-mas-image-tags.json")
        if not preserved_path.exists():
            raise SystemExit(0)

        preserved = json.loads(preserved_path.read_text() or "{}")
        if not preserved:
            print("No preserved MAS image tags to restore after platform seed sync.")
            raise SystemExit(0)

        restored = False
        for raw_path, images_by_name in preserved.items():
            path = Path(raw_path)
            if not path.exists():
                continue

            doc = yaml.safe_load(path.read_text()) or {}
            images = doc.setdefault("images", [])
            for image in images:
                if not isinstance(image, dict):
                    continue
                name = image.get("name")
                preserved_image = images_by_name.get(name)
                if not preserved_image:
                    continue

                if preserved_image.get("newName"):
                    image["newName"] = preserved_image["newName"]
                image["newTag"] = preserved_image["newTag"]
                restored = True

            existing_names = {
                image.get("name")
                for image in images
                if isinstance(image, dict) and image.get("name")
            }
            for name, preserved_image in images_by_name.items():
                if name in existing_names:
                    continue
                restored_image = {"name": name}
                if preserved_image.get("newName"):
                    restored_image["newName"] = preserved_image["newName"]
                restored_image["newTag"] = preserved_image["newTag"]
                images.append(restored_image)
                restored = True

            path.write_text(yaml.safe_dump(doc, sort_keys=False))

        if restored:
            print("Restored immutable MAS image tags after platform seed sync.")
        else:
            print("No MAS image tags were restored after platform seed sync.")
        PY

        git add -A

        if git diff --cached --quiet; then
          echo "Internal GitOps repository is already up to date."
          exit 0
        fi

        git commit -m "Sync platform GitOps seed"
        git push origin main
      no_log: true
      environment:
        AWS_ACCOUNT_ID: "{{ aws_account_id.stdout }}"
        AWS_REGION: "{{ aws_region }}"
        OPS_VPC_ID: "{{ ops_vpc_id.stdout }}"
        SERVICE_VPC_ID: "{{ service_vpc_id.stdout }}"
        TELEPORT_PROXY_SERVER: "{{ teleport_private_ip.stdout }}:3080"
        TELEPORT_APP_PUBLIC_SUFFIX: "teleport.local"
        LOKI_NLB_SG_ID: "{{ loki_nlb_sg_id.stdout }}"
        THANOS_RECEIVE_NLB_SG_ID: "{{ thanos_receive_nlb_sg_id.stdout }}"
        TEMPO_NLB_SG_ID: "{{ tempo_nlb_sg_id.stdout }}"
        SERVICE_RDS_ENDPOINT: "{{ service_rds_endpoint.stdout }}"
        OPS_RDS_ENDPOINT: "{{ ops_rds_endpoint.stdout }}"
        WAF_ACL_ARN: "{{ waf_acl_arn.stdout }}"

    - name: Install ESO CRDs on Ops EKS
      ansible.builtin.shell: >
        helm template external-secrets
        {{ gitops_platform_seed_dir }}/helmChart/charts/external-secrets
        --namespace external-secrets
        -s templates/crds/clustersecretstore.yaml
        -s templates/crds/clusterexternalsecret.yaml
        -s templates/crds/externalsecret.yaml
        -s templates/crds/secretstore.yaml
        -s templates/crds/pushsecret.yaml
        | kubectl apply --context {{ ops_kube_context }} -f - --server-side --force-conflicts
        --field-manager=external-secrets
      changed_when: false

    - name: Register the platform app-of-apps in Argo CD
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        src: "{{ gitops_platform_seed_dir }}/bootstrap/platform-app-of-apps.yaml"

    - name: Update kubeconfig for the Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --alias {{ service_kube_context }}
      changed_when: false

    - name: Install ESO CRDs on Service EKS
      ansible.builtin.shell: >
        helm template external-secrets
        {{ gitops_platform_seed_dir }}/helmChart/charts/external-secrets
        --namespace external-secrets
        -s templates/crds/clustersecretstore.yaml
        -s templates/crds/clusterexternalsecret.yaml
        -s templates/crds/externalsecret.yaml
        -s templates/crds/secretstore.yaml
        -s templates/crds/pushsecret.yaml
        | kubectl apply --context {{ service_kube_context }} -f - --server-side --force-conflicts
        --field-manager=external-secrets
      changed_when: false

    - name: Ensure stock-demo namespace exists in Service EKS
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: stock-demo
            labels:
              # Istio Ambient 메시 등록 (ztunnel L4 처리 시작)
              mesh.istio.io/enroll: "true"
              # L7 메트릭(istio_request_duration_milliseconds 등)을 위해
              # 이 네임스페이스 트래픽을 waypoint proxy로 통과시킨다.
              # → aiops high_latency / error_rate 탐지의 데이터 소스
              istio.io/use-waypoint: stock-demo-waypoint

    - name: Wait for stock-api-db ExternalSecret to exist in Service EKS
      kubernetes.core.k8s_info:
        context: "{{ service_kube_context }}"
        api_version: external-secrets.io/v1beta1
        kind: ExternalSecret
        name: stock-api-db
        namespace: stock-demo
      register: stock_api_db_externalsecret_info
      until: stock_api_db_externalsecret_info.resources | length > 0
      retries: 60
      delay: 10
      
    - name: Force refresh stock-api-db ExternalSecret in Service EKS
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n stock-demo
          annotate externalsecret stock-api-db
          force-sync={{ lookup('pipe', 'date +%s') }}
          --overwrite
      changed_when: true
      failed_when: false

    - name: Wait for stock-api-db ExternalSecret to be ready in Service EKS
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n stock-demo
          wait externalsecret/stock-api-db
          --for=condition=Ready
          --timeout=300s
      changed_when: false
      
    - name: Wait for ESO to create stock-api-db secret in Service EKS
      kubernetes.core.k8s_info:
        context: "{{ service_kube_context }}"
        api_version: v1
        kind: Secret
        name: stock-api-db
        namespace: stock-demo
      register: stock_api_db_info
      until: stock_api_db_info.resources | length > 0
      retries: 60
      delay: 30

    - name: Remove legacy stock-api-secret from Service EKS
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: absent
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: stock-api-secret
            namespace: stock-demo

    - name: Delete previous stock-api RDS init job in Service EKS
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: absent
        wait: true
        wait_timeout: 60
        definition:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: stock-api-rds-init
            namespace: stock-demo

    - name: Run stock-api RDS init job in Service EKS
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        wait: true
        wait_condition:
          type: Complete
          status: "True"
        # RDS 재기동 또는 초기 생성 직후에는 PostgreSQL 접속 가능 시점이 늦어질 수 있다.
        # Job의 재시도 전체 시간보다 짧게 기다리면 성공 직전에 bootstrap이 실패한다.
        wait_timeout: 2700
        definition:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: stock-api-rds-init
            namespace: stock-demo
          spec:
            backoffLimit: 3
            activeDeadlineSeconds: 2400
            ttlSecondsAfterFinished: 3600
            template:
              metadata:
                labels: 
                  app.kubernetes.io/name: stock-api-rds-init
              spec:
                restartPolicy: Never
                securityContext:
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: rds-init
                    image: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/financial/mas/finops/postgres:16-alpine"
                    imagePullPolicy: IfNotPresent
                    env:
                      - name: PGPASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: stock-api-db
                            key: DB_PASSWORD
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      runAsNonRoot: true
                      runAsUser: 999
                      runAsGroup: 999
                    command:
                      - /bin/sh
                      - -c
                      - |
                        set -eu
                        # user=financial_admin: SingleUser rotation replaces only the password; username never changes.
                        DB_DSN="host={{ service_rds_endpoint.stdout }} port=5432 dbname=financial_service user=financial_admin sslmode=require connect_timeout=10"

                        for attempt in $(seq 1 30); do
                          if psql "${DB_DSN}" -c 'select 1' >/dev/null 2>&1; then
                            break
                          fi

                          echo "Waiting for RDS to accept PostgreSQL connections (${attempt}/30)..."
                          sleep 10

                          if [ "${attempt}" = "30" ]; then
                            echo "RDS did not become ready in time."
                            exit 1
                          fi
                        done

                        psql "${DB_DSN}" \
                          -v ON_ERROR_STOP=1 <<'SQL'
                        CREATE TABLE IF NOT EXISTS recommendations (
                          id SERIAL PRIMARY KEY,
                          name VARCHAR(100) NOT NULL,
                          ticker VARCHAR(20) NOT NULL,
                          current_price INTEGER NOT NULL,
                          recommended_price INTEGER NOT NULL,
                          recommendation_date DATE NOT NULL,
                          created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
                        );

                        TRUNCATE TABLE recommendations RESTART IDENTITY;

                        INSERT INTO recommendations
                          (name, ticker, current_price, recommended_price, recommendation_date)
                        VALUES
                          ('LG에너지솔루션', '373220', 450000, 500000, CURRENT_DATE),
                          ('LS', '006260', 320000, 350000, CURRENT_DATE),
                          ('한국금융지주', '071050', 110000, 130000, CURRENT_DATE),
                          ('HD현대일렉트릭', '267260', 450000, 520000, CURRENT_DATE),
                          ('삼성전자', '005930', 85000, 95000, CURRENT_DATE);
                        SQL
      no_log: true

    - name: Restart stock-api deployment to pick up new credentials
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n stock-demo
          rollout restart deployment/stock-api
      changed_when: true
      failed_when: false

    - name: Check if Loki, Thanos Receive and Tempo services exist in observability namespace
      ansible.builtin.shell: |
        kubectl --context {{ ops_kube_context }} -n observability \
          get svc observability-loki observability-thanos-receive observability-tempo 2>/dev/null
      register: monitoring_svcs_check
      changed_when: false
      failed_when: false

    - name: Skip NLB wait — observability stack not yet deployed
      ansible.builtin.debug:
        msg: "Observability stack not deployed yet. Skipping NLB DNS configuration. Re-run after Loki and Thanos are up."
      when: monitoring_svcs_check is not defined or monitoring_svcs_check.rc != 0

    - name: Wait for the Loki and Thanos Receive internal NLB DNS names
      ansible.builtin.shell: |
        set -e

        for attempt in $(seq 1 90); do
          loki_dns="$(kubectl --context {{ ops_kube_context }} -n observability \
            get svc observability-loki \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

          thanos_dns="$(kubectl --context {{ ops_kube_context }} -n observability \
            get svc observability-thanos-receive \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

          tempo_dns="$(kubectl --context {{ ops_kube_context }} -n observability \
            get svc observability-tempo \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

          if [ -n "${loki_dns}" ] && [ -n "${thanos_dns}" ] && [ -n "${tempo_dns}" ]; then
            printf '%s|%s|%s\n' \
              "${loki_dns}" \
              "${thanos_dns}" \
              "${tempo_dns}"
            exit 0
          fi

          echo "Waiting for monitoring internal NLB DNS names (${attempt}/90)..." >&2
          sleep 10
        done

        echo "Timed out waiting for monitoring internal NLB DNS names." >&2
        exit 1
      register: monitoring_nlb_dns
      changed_when: false
      when: monitoring_svcs_check is defined and monitoring_svcs_check.rc == 0

    - name: Store the discovered internal NLB DNS names
      ansible.builtin.set_fact:
        loki_nlb_dns: "{{ monitoring_nlb_dns.stdout.split('|')[0] }}"
        thanos_receive_nlb_dns: "{{ monitoring_nlb_dns.stdout.split('|')[1] }}"
        tempo_nlb_dns: "{{ monitoring_nlb_dns.stdout.split('|')[2] }}"
      when:
        - monitoring_svcs_check is defined
        - monitoring_svcs_check.rc == 0
        - monitoring_nlb_dns is defined
        - monitoring_nlb_dns.stdout is defined

    - name: Push discovered NLB DNS names into the internal GitOps repository
      ansible.builtin.shell: |
        set -e
        cd "{{ gitops_platform_workdir }}"

        python3 - <<'PY'
        import os
        from pathlib import Path

        path = Path("helmChart/alloy-service/values.yaml")
        content = path.read_text()
        content = content.replace("loki-internal-nlb.example.local", os.environ["LOKI_NLB_DNS"])
        content = content.replace("thanos-receive-internal-nlb.example.local", os.environ["THANOS_RECEIVE_NLB_DNS"])
        content = content.replace("tempo-internal-nlb.example.local", os.environ["TEMPO_NLB_DNS"])
        path.write_text(content)
        PY

        git add helmChart/alloy-service/values.yaml

        if git diff --cached --quiet; then
          echo "Alloy NLB endpoints are already up to date."
          exit 0
        fi

        git commit -m "Configure Service Alloy monitoring NLB endpoints"
        git push origin main
      no_log: true
      when:
        - monitoring_svcs_check is defined
        - monitoring_svcs_check.rc == 0
        - loki_nlb_dns is defined
        - thanos_receive_nlb_dns is defined
        - tempo_nlb_dns is defined
      environment:
        LOKI_NLB_DNS: "{{ loki_nlb_dns }}"
        THANOS_RECEIVE_NLB_DNS: "{{ thanos_receive_nlb_dns }}"
        TEMPO_NLB_DNS: "{{ tempo_nlb_dns }}"

  post_tasks:
    - name: Stop local internal Git port-forward
      ansible.builtin.command:
        cmd: kill {{ internal_git_platform_port_forward_pid.stdout }}
      changed_when: false
      failed_when: false
