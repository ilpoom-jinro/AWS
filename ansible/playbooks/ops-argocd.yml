- name: Install Argo CD on the Internal Ops EKS cluster
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Ensure Argo CD namespace exists
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ argocd_namespace }}"

  tasks:
    - name: Add Argo Helm repository
      kubernetes.core.helm_repository:
        name: "{{ argocd_chart_repo_name }}"
        repo_url: "{{ argocd_chart_repo_url }}"

    - name: Install or upgrade Argo CD
      kubernetes.core.helm:
        context: "{{ ops_kube_context }}"
        release_name: "{{ argocd_release_name }}"
        release_namespace: "{{ argocd_namespace }}"
        chart_ref: "{{ argocd_chart_ref }}"
        create_namespace: true
        update_repo_cache: true
        values: "{{ lookup('template', '../templates/argocd-values.yml.j2') | from_yaml }}"
        wait: true
        timeout: 10m

    - name: Create internal Git repository secret when repo URL is provided
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ gitops_repo_name }}"
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: "{{ gitops_repo_url }}"
            project: default
      when: gitops_repo_url | length > 0
