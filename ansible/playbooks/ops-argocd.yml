- name: Install Argo CD on the Internal Ops EKS cluster
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Ensure Argo CD namespace exists
      ansible.builtin.shell: >
          kubectl --context {{ ops_kube_context }}
          create namespace {{ argocd_namespace }}
          --dry-run=client -o yaml
          | kubectl --context {{ ops_kube_context }} apply -f -
      changed_when: false

  tasks:
    - name: Install or upgrade Argo CD
      kubernetes.core.helm:
        context: "{{ ops_kube_context }}"
        release_name: "{{ argocd_release_name }}"
        release_namespace: "{{ argocd_namespace }}"
        chart_ref: "{{ argocd_chart_ref }}"
        create_namespace: true
        update_repo_cache: false
        values: "{{ lookup('template', '../templates/argocd-values.yml.j2') | from_yaml }}"
        wait: true
        timeout: "{{ addon_helm_timeout }}"
      register: argocd_helm_result
      ignore_errors: true

    - name: Show Argo CD pod state when Helm install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ argocd_namespace }}
          get pods -o wide
      when: argocd_helm_result.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Show Argo CD recent events when Helm install fails
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ argocd_namespace }}
          get events --sort-by=.lastTimestamp
      when: argocd_helm_result.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when Argo CD Helm install fails
      ansible.builtin.fail:
        msg: "Argo CD Helm install failed. Check pod state and events above."
      when: argocd_helm_result.failed | default(false)

    - name: Create internal Git repository secret when repo URL is provided
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ gitops_repo_name }}"
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: "{{ gitops_repo_url }}"
            project: default
      when: gitops_repo_url | length > 0
