- name: Install internal Git service on the Internal Ops EKS cluster
  hosts: localhost
  gather_facts: false

  pre_tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Ensure internal Git namespace exists
      ansible.builtin.shell: >
          kubectl --context {{ ops_kube_context }}
          create namespace {{ internal_git_namespace }}
          --dry-run=client -o yaml
          | kubectl --context {{ ops_kube_context }} apply -f -
      changed_when: false

    - name: Create gp3 StorageClass
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: gp3
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"
          provisioner: ebs.csi.aws.com
          volumeBindingMode: WaitForFirstConsumer
          reclaimPolicy: Delete
          parameters:
            type: gp3
            encrypted: "true"

  tasks:
    - name: Create PersistentVolumeClaim for Gitea data
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: internal-git-data
            namespace: "{{ internal_git_namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: gp3
            resources:
              requests:
                storage: 10Gi

    - name: Create PersistentVolumeClaim for Gitea config
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: internal-git-config
            namespace: "{{ internal_git_namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: gp3
            resources:
              requests:
                storage: 1Gi

    - name: Install or update internal Git deployment
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ internal_git_release_name }}"
            namespace: "{{ internal_git_namespace }}"
            labels:
              app.kubernetes.io/name: internal-git
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: internal-git
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: internal-git
              spec:
                securityContext:
                  fsGroup: 1000
                containers:
                  - name: gitea
                    image: "{{ internal_git_image }}"
                    imagePullPolicy: IfNotPresent
                    ports:
                      - name: http
                        containerPort: 3000
                      - name: ssh
                        containerPort: 2222
                    readinessProbe:
                      httpGet:
                        path: /api/v1/version
                        port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 24
                    livenessProbe:
                      httpGet:
                        path: /api/v1/version
                        port: http
                      initialDelaySeconds: 60
                      periodSeconds: 20
                      timeoutSeconds: 3
                      failureThreshold: 6
                    env:
                      - name: GITEA__server__HTTP_PORT
                        value: "3000"
                      - name: GITEA__server__SSH_PORT
                        value: "2222"
                      - name: GITEA__server__ROOT_URL
                        value: "http://{{ internal_git_service_name }}.{{ internal_git_namespace }}.svc.cluster.local:3000/"
                      - name: GITEA__database__DB_TYPE
                        value: sqlite3
                      - name: GITEA__security__INSTALL_LOCK
                        value: "true"
                    volumeMounts:
                      - name: gitea-data
                        mountPath: /var/lib/gitea
                      - name: gitea-config
                        mountPath: /etc/gitea
                volumes:
                  - name: gitea-data
                    persistentVolumeClaim:
                      claimName: internal-git-data
                  - name: gitea-config
                    persistentVolumeClaim:
                      claimName: internal-git-config

    - name: Expose internal Git service inside the cluster
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ internal_git_service_name }}"
            namespace: "{{ internal_git_namespace }}"
            labels:
              app.kubernetes.io/name: internal-git
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: internal-git
            ports:
              - name: http
                port: "{{ internal_git_http_port }}"
                targetPort: http
              - name: ssh
                port: "{{ internal_git_ssh_port }}"
                targetPort: ssh

    - name: Wait for internal Git deployment rollout
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ ops_kube_context }}
          -n {{ internal_git_namespace }}
          rollout status deployment/{{ internal_git_release_name }}
          --timeout={{ rollout_timeout }}
      changed_when: false

    - name: Ensure internal Git admin user exists
      ansible.builtin.shell: |
        set -e
        kubectl --context {{ ops_kube_context }} -n {{ internal_git_namespace }} \
          exec deploy/{{ internal_git_release_name }} -- \
          gitea admin user create \
            --username "{{ internal_git_admin_username }}" \
            --password "{{ internal_git_admin_password }}" \
            --email "{{ internal_git_admin_email }}" \
            --admin \
            --must-change-password=false \
            --config /etc/gitea/app.ini \
          || true
      changed_when: false
      no_log: true

    - name: Start local port-forward to internal Git service
      ansible.builtin.shell: |
        set -e
        rm -f /tmp/internal-git-port-forward.log
        nohup kubectl --context {{ ops_kube_context }} -n {{ internal_git_namespace }} \
          port-forward svc/{{ internal_git_service_name }} {{ internal_git_local_http_port }}:{{ internal_git_http_port }} \
          >/tmp/internal-git-port-forward.log 2>&1 &
        echo $!
      changed_when: false
      register: internal_git_port_forward_pid

    - name: Wait for internal Git port-forward listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ internal_git_local_http_port }}"
        timeout: 30
      register: internal_git_port_forward_wait
      failed_when: false

    - name: Show internal Git port-forward log when listener is not ready
      ansible.builtin.command:
        cmd: cat /tmp/internal-git-port-forward.log
      when: internal_git_port_forward_wait.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when internal Git port-forward listener is not ready
      ansible.builtin.fail:
        msg: "Internal Git port-forward did not open 127.0.0.1:{{ internal_git_local_http_port }}. Check the port-forward log above."
      when: internal_git_port_forward_wait.failed | default(false)

    - name: Wait for internal Git API through port-forward
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_local_http_port }}/api/v1/version"
        method: GET
        status_code: 200
      register: internal_git_api_probe
      retries: 60
      delay: 5
      until: internal_git_api_probe.status == 200
      ignore_errors: true

    - name: Show internal Git port-forward log when API probe fails
      ansible.builtin.command:
        cmd: cat /tmp/internal-git-port-forward.log
      when: internal_git_api_probe.failed | default(false)
      changed_when: false
      failed_when: false

    - name: Stop when internal Git API is not ready through port-forward
      ansible.builtin.fail:
        msg: "Internal Git API did not respond through 127.0.0.1:{{ internal_git_local_http_port }}. Check the port-forward log above."
      when: internal_git_api_probe.failed | default(false)

    - name: Create platform repository under admin user in Gitea
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ internal_git_local_http_port }}/api/v1/user/repos"
        method: POST
        user: "{{ internal_git_admin_username }}"
        password: "{{ internal_git_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ internal_git_repo }}"
          private: true
          auto_init: true
          default_branch: main
        status_code: [201, 409]
      no_log: true

    - name: Stop internal Git bootstrap port-forward
      ansible.builtin.shell: |
        kill {{ internal_git_port_forward_pid.stdout }} >/dev/null 2>&1 || true
      changed_when: false
      failed_when: false
