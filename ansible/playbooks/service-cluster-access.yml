- name: Prepare local kubeconfig entries for Ops and Service EKS clusters
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Update kubeconfig for the Ops EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ ops_eks_cluster_name }}
          --alias {{ ops_kube_context }}
      changed_when: false

    - name: Update kubeconfig for the Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks update-kubeconfig
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --alias {{ service_kube_context }}
      changed_when: false

    - name: Ensure the stock demo namespace exists
      ansible.builtin.shell: >
          kubectl --context {{ service_kube_context }}
          create namespace stock-demo
          --dry-run=client -o yaml
          | kubectl --context {{ service_kube_context }} apply -f -
      changed_when: false

    - name: Ensure Argo CD manager service account exists in the Service cluster
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system

    # ──────────────────────────────────────────────────────────────────────────
    # argocd-manager RBAC 최소 권한 (cluster-admin 제거)
    #
    # 구조:
    #   ClusterRole argocd-manager-cluster-reader  → 전체 read + Namespace CRUD
    #   ClusterRole argocd-manager-namespace-writer → 네임스페이스 리소스 CRUD
    #   ClusterRole argocd-manager-cluster-writer  → CRD / ClusterRole / Webhook / IngressClass CRUD
    #   ClusterRole argocd-manager-kyverno-writer   → ClusterPolicy CRUD (클러스터 스코프)
    #   ClusterRoleBinding × 3  → cluster-reader, cluster-writer, kyverno-writer 전역 바인딩
    #   RoleBinding × 4         → namespace-writer를 네임스페이스별로 바인딩
    # ──────────────────────────────────────────────────────────────────────────

    - name: 기존 cluster-admin ClusterRoleBinding 제거
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: absent
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-cluster-admin
      failed_when: false

    - name: ClusterRole 생성 — argocd-manager-cluster-reader
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: argocd-manager-cluster-reader
          rules:
            # ArgoCD가 클러스터 전체 상태를 감시하기 위해 모든 리소스 읽기 필요
            - apiGroups: ["*"]
              resources: ["*"]
              verbs: [get, list, watch]
            # CreateNamespace=true 옵션 지원: 네임스페이스 생성/삭제 권한
            - apiGroups: [""]
              resources: [namespaces]
              verbs: [create, update, patch, delete]

    - name: ClusterRole 생성 — argocd-manager-namespace-writer
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: argocd-manager-namespace-writer
          rules:
            - apiGroups: ["", "apps", "batch"]
              resources:
                - deployments
                - statefulsets
                - daemonsets
                - replicasets
                - pods
                - services
                - configmaps
                - secrets
                - serviceaccounts
                - jobs
                - cronjobs
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [networking.k8s.io]
              resources: [ingresses]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [policy]
              resources: [poddisruptionbudgets]
              verbs: [get, list, watch, create, update, patch, delete]
            # Istio CRD 리소스 (istio-system RoleBinding에서 사용)
            - apiGroups: ["security.istio.io", "telemetry.istio.io"]
              resources: ["*"]
              verbs: [get, list, watch, create, update, patch, delete]
            # 네임스페이스 스코프 RBAC (kyverno RoleBinding에서 사용 — Helm 차트가 생성)
            - apiGroups: [rbac.authorization.k8s.io]
              resources: [roles, rolebindings]
              verbs: [get, list, watch, create, update, patch, delete]

    - name: ClusterRole 생성 — argocd-manager-cluster-writer
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: argocd-manager-cluster-writer
          rules:
            - apiGroups: [apiextensions.k8s.io]
              resources: [customresourcedefinitions]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [rbac.authorization.k8s.io]
              resources: [clusterroles, clusterrolebindings]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [admissionregistration.k8s.io]
              resources: [mutatingwebhookconfigurations, validatingwebhookconfigurations]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [networking.k8s.io]
              resources: [ingressclasses]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [elbv2.k8s.aws]
              resources: [ingressclassparams, targetgroupbindings, targetgroupbindings/status, albtargetcontrolconfigs]
              verbs: [get, list, watch, create, update, patch, delete]
            - apiGroups: [gateway.networking.k8s.io]
              resources: ["*"]
              verbs: [get, list, watch, create, update, patch, delete]
            # ALBC ClusterRole이 부여하는 권한 — argocd-manager가 보유해야 privilege escalation 없이 생성 가능
            - apiGroups: [""]
              resources: [events]
              verbs: [create, patch]
            - apiGroups: [""]
              resources: [configmaps]
              verbs: [create, delete, update]
            - apiGroups: [""]
              resources: [services]
              verbs: [patch, update]
            - apiGroups: [""]
              resources: [pods/status, services/status]
              verbs: [patch, update]
            - apiGroups: ["extensions", "networking.k8s.io"]
              resources: [ingresses, ingresses/status]
              verbs: [patch, update]
            - apiGroups: [aga.k8s.aws]
              resources: ["*"]
              verbs: [get, list, watch, patch, update]
            - apiGroups: [gateway.k8s.aws]
              resources: ["*"]
              verbs: [get, list, watch, patch, update]
            # Argo CD creates a ClusterRole that grants Kyverno permission to
            # generate Istio AuthorizationPolicy resources. Kubernetes requires
            # the caller to already hold the permissions it grants.
            - apiGroups: [security.istio.io]
              resources: [authorizationpolicies]
              verbs: [get, list, watch, create, update, patch, delete]
            # observability-alloy-service ClusterRole이 /metrics nonResourceURL 권한을 포함하므로
            # argocd-manager가 해당 권한을 보유해야 privilege escalation 없이 ClusterRole 생성 가능.
            - nonResourceURLs: ["/metrics"]
              verbs: [get]

    - name: ClusterRole 생성 — argocd-manager-kyverno-writer
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: argocd-manager-kyverno-writer
          rules:
            # ClusterPolicy는 클러스터 스코프 리소스 → RoleBinding으로 부여 불가
            - apiGroups: [kyverno.io, wgpolicyk8s.io]
              resources: ["*"]
              verbs: [get, list, watch, create, update, patch, delete]

    - name: ClusterRoleBinding 생성 — argocd-manager-cluster-reader
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-cluster-reader
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: argocd-manager-cluster-reader
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system

    - name: ClusterRoleBinding 생성 — argocd-manager-cluster-writer
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-cluster-writer
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: argocd-manager-cluster-writer
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system

    - name: ClusterRoleBinding 생성 — argocd-manager-kyverno-writer
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-kyverno-writer
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: argocd-manager-kyverno-writer
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system

    - name: "네임스페이스 생성 (RoleBinding 전 사전 조건) — {{ item }}"
      ansible.builtin.shell: >
        kubectl --context {{ service_kube_context }}
        create namespace {{ item }}
        --dry-run=client -o yaml
        | kubectl --context {{ service_kube_context }} apply -f -
      loop:
        - observability
        - stock-demo
        - kyverno
        # istio-system은 Istio 설치 시 이미 존재하므로 별도 생성 불필요
      changed_when: false

    - name: "RoleBinding 생성 — argocd-manager-namespace-writer in {{ item }}"
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: argocd-manager-writer
            namespace: "{{ item }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: argocd-manager-namespace-writer
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system
      loop:
        - observability   # observability-alloy-service 배포 대상
        - istio-system    # istio-policies-service 배포 대상
        - stock-demo      # service-demo-app 배포 대상
        - kyverno         # kyverno ApplicationSet 배포 대상
        - kube-system     # aws-load-balancer-controller-service 배포 대상

    - name: Ensure long-lived token secret exists for Argo CD manager
      kubernetes.core.k8s:
        context: "{{ service_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-manager-token
            namespace: kube-system
            annotations:
              kubernetes.io/service-account.name: argocd-manager
          type: kubernetes.io/service-account-token

    - name: Read Argo CD manager token
      ansible.builtin.command:
        cmd: >
          kubectl --context {{ service_kube_context }}
          -n kube-system
          get secret argocd-manager-token
          -o jsonpath={.data.token}
      register: service_cluster_token_b64
      retries: 30
      delay: 2
      until: service_cluster_token_b64.stdout | length > 0
      changed_when: false
      no_log: true

    - name: Describe Service EKS cluster
      ansible.builtin.command:
        cmd: >
          aws eks describe-cluster
          --region {{ aws_region }}
          --name {{ service_eks_cluster_name }}
          --query cluster
          --output json
      register: service_cluster_description
      changed_when: false

    - name: Register Service EKS cluster in Argo CD
      kubernetes.core.k8s:
        context: "{{ ops_kube_context }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-{{ service_eks_cluster_name }}
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: cluster
          stringData:
            name: "{{ service_eks_cluster_name }}"
            server: "{{ (service_cluster_description.stdout | from_json).endpoint }}"
            config: >-
              {{
                {
                  "bearerToken": service_cluster_token_b64.stdout | b64decode,
                  "tlsClientConfig": {
                    "insecure": false,
                    "caData": (service_cluster_description.stdout | from_json).certificateAuthority.data
                  }
                } | to_json
              }}
      no_log: true

