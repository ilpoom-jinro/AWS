version: 0.2

phases:
  build:
    commands:
      - cd /workspace/ansible
      - |
        set -euo pipefail

        aws eks update-kubeconfig \
          --region ap-northeast-2 \
          --name financial-ops-eks \
          --alias financial-ops-eks

        aws eks update-kubeconfig \
          --region ap-northeast-2 \
          --name financial-service-eks \
          --alias financial-service-eks

        for CONTEXT in financial-ops-eks financial-service-eks; do
          if ! kubectl --context "${CONTEXT}" -n kyverno get svc kyverno-svc >/dev/null 2>&1; then
            echo "Kyverno service is missing on ${CONTEXT}; removing stale webhook configurations."

            for webhook in $(kubectl --context "${CONTEXT}" get validatingwebhookconfigurations \
              -o name 2>/dev/null | grep kyverno || true); do
              kubectl --context "${CONTEXT}" delete "${webhook}" --ignore-not-found
            done

            for webhook in $(kubectl --context "${CONTEXT}" get mutatingwebhookconfigurations \
              -o name 2>/dev/null | grep kyverno || true); do
              kubectl --context "${CONTEXT}" delete "${webhook}" --ignore-not-found
            done
          fi
        done
      - |
        set -euo pipefail

        # ── AWS Load Balancer Controller CRDs — ArgoCD CRD exclusion으로 sync 제외됨.
        # ansible-playbook이 app-of-apps를 등록하면 ArgoCD가 즉시 sync를 시작하므로
        # IngressClassParams / TargetGroupBinding apply 전에 CRD가 반드시 먼저
        # 설치되어야 함. TargetGroupBinding CRD는 service 클러스터의 target-type:ip
        # ALB 동작에도 필수이므로 ops + service 양 클러스터 모두에 직접 apply.
        # (service 컨텍스트를 먼저 처리해 루프 종료 시 current 컨텍스트가
        #  financial-ops-eks로 남도록 함 — 이후 단계는 ops 컨텍스트를 가정) ──
        for CLUSTER in financial-service-eks financial-ops-eks; do
          aws eks update-kubeconfig \
            --region ap-northeast-2 \
            --name "${CLUSTER}" \
            --alias "${CLUSTER}"

          kubectl --context "${CLUSTER}" apply --server-side \
            -f /workspace/gitops/platform/helmChart/charts/aws-load-balancer-controller/crds/crds.yaml \
            -f /workspace/gitops/platform/helmChart/charts/aws-load-balancer-controller/crds/gateway-crds.yaml
        done
      - |
        ansible-playbook -i inventory/hosts.yml -e @group_vars/all.yml playbooks/gitops-platform-sync.yml || {
          echo "Platform GitOps sync failed. Collecting Ops cluster diagnostics..."
          aws eks update-kubeconfig --region ap-northeast-2 --name financial-ops-eks --alias financial-ops-eks || true
          kubectl --context financial-ops-eks get pods -n git -o wide || true
          kubectl --context financial-ops-eks get pods -n argocd -o wide || true
          kubectl --context financial-ops-eks get applications.argoproj.io -n argocd || true
          exit 1
        }
      - aws eks update-kubeconfig --region ap-northeast-2 --name financial-ops-eks --alias financial-ops-eks
      - |
        set -euo pipefail

        # ── 내부 Gitea 포트 포워딩 (13002 — bootstrap 플레이북이 쓰는 13000/13001 과 충돌 방지) ──
        kubectl --context financial-ops-eks \
          -n git port-forward svc/internal-git-http 13002:3000 \
          >/tmp/kyverno-git-pf.log 2>&1 &
        KYVERNO_GIT_PF_PID=$!
        trap 'kill "${KYVERNO_GIT_PF_PID}" >/dev/null 2>&1 || true' EXIT

        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:13002/api/v1/version >/dev/null 2>&1; then
            break
          fi
          if [ "${i}" -eq 30 ]; then
            echo "Gitea port-forward timed out."
            cat /tmp/kyverno-git-pf.log || true
            exit 1
          fi
          sleep 2
        done

        # ── ECR 레지스트리 URL 구성 ──
        ECR_REGISTRY="$(aws sts get-caller-identity --query Account --output text).dkr.ecr.ap-northeast-2.amazonaws.com"
        echo "Injecting ECR registry: ${ECR_REGISTRY}"

        HELM_FLAGS=(
          --namespace kyverno
          -f /workspace/kyverno/helm/values.yaml
          --set "admissionController.initContainer.image.registry=${ECR_REGISTRY}"
          --set "admissionController.initContainer.image.repository=financial/kyverno/kyvernopre"
          --set "admissionController.initContainer.image.tag=latest"
          --set "admissionController.container.image.registry=${ECR_REGISTRY}"
          --set "admissionController.container.image.repository=financial/kyverno/kyverno"
          --set "admissionController.container.image.tag=latest"
          --set "backgroundController.image.registry=${ECR_REGISTRY}"
          --set "backgroundController.image.repository=financial/kyverno/background-controller"
          --set "backgroundController.image.tag=latest"
          --set "cleanupController.image.registry=${ECR_REGISTRY}"
          --set "cleanupController.image.repository=financial/kyverno/cleanup-controller"
          --set "cleanupController.image.tag=latest"
          --set "reportsController.image.registry=${ECR_REGISTRY}"
          --set "reportsController.image.repository=financial/kyverno/reports-controller"
          --set "reportsController.image.tag=latest"
          --set "migration.image.registry=${ECR_REGISTRY}"
          --set "migration.image.repository=financial/kyverno/kyverno-cli"
          --set "migration.image.tag=latest"
          --set "migration.enabled=false"
          --set "migrationJob.enabled=false"
          --set "cleanupJobs.admissionReports.image.registry=${ECR_REGISTRY}"
          --set "cleanupJobs.clusterAdmissionReports.image.registry=${ECR_REGISTRY}"
          --set "webhooksCleanup.image.registry=${ECR_REGISTRY}"
          --set "policyReportsCleanup.image.registry=${ECR_REGISTRY}"
        )

        # ── kyverno 네임스페이스 사전 생성 (없으면 namespace-scoped 리소스 apply 실패) ──
        kubectl --context financial-ops-eks create namespace kyverno --dry-run=client -o yaml \
          | kubectl --context financial-ops-eks apply -f -
        kubectl --context financial-service-eks create namespace kyverno --dry-run=client -o yaml \
          | kubectl --context financial-service-eks apply -f -

        # ── CRD는 ArgoCD 관리 대상 제외 — 양 클러스터에 직접 apply ──
        # non-CRD 리소스는 Gitea → ArgoCD가 관리하므로 CRD만 필터링.
        # 전체 apply 시 argocd-controller와 field manager 충돌 및 immutable Job 에러 발생.
        helm template kyverno /opt/helm-charts/kyverno "${HELM_FLAGS[@]}" --include-crds \
          | python3 -c 'import sys,yaml;[sys.stdout.write("---\n"+yaml.dump(d)) for d in yaml.safe_load_all(sys.stdin) if d and d.get("kind")=="CustomResourceDefinition"]' \
          | kubectl --context financial-ops-eks apply --server-side -f -
        helm template kyverno /opt/helm-charts/kyverno "${HELM_FLAGS[@]}" --include-crds \
          | python3 -c 'import sys,yaml;[sys.stdout.write("---\n"+yaml.dump(d)) for d in yaml.safe_load_all(sys.stdin) if d and d.get("kind")=="CustomResourceDefinition"]' \
          | kubectl --context financial-service-eks apply --server-side -f -

        # ── Gitea용 매니페스트 — CRD 제외 (ArgoCD가 관리하는 non-CRD 리소스만) ──
        # helm template은 crds/ 디렉토리만 --include-crds로 제어하므로
        # templates/ 안에 정의된 CRD(예: updaterequests.kyverno.io)는 별도 필터링 필요.
        helm template kyverno /opt/helm-charts/kyverno "${HELM_FLAGS[@]}" \
          | python3 -c 'import sys,yaml;[sys.stdout.write("---\n"+yaml.dump(d)) for d in yaml.safe_load_all(sys.stdin) if d and d.get("kind")!="CustomResourceDefinition"]' \
          > /tmp/kyverno-install.yaml

        # ── Gitea kyverno/ 경로에 렌더링된 매니페스트 및 정책 push ──
        rm -rf /tmp/kyverno-gitops
        git clone \
          "http://${INTERNAL_GIT_ADMIN_USERNAME}:${INTERNAL_GIT_ADMIN_PASSWORD}@127.0.0.1:13002/gitadmin/platform.git" \
          /tmp/kyverno-gitops
        cd /tmp/kyverno-gitops

        git config user.name "Kyverno Bootstrap Bot"
        git config user.email "kyverno-bootstrap@internal.ops.local"

        mkdir -p kyverno/install kyverno/policies
        cp /tmp/kyverno-install.yaml kyverno/install/kyverno.yaml
        cp /workspace/kyverno/policies/*.yaml kyverno/policies/

        git add kyverno/
        if git diff --cached --quiet; then
          echo "Kyverno files already up to date in Gitea."
        else
          git commit -m "bootstrap: Kyverno install manifests and policies"
          git push origin main
        fi

        # ── ArgoCD ApplicationSet 적용 ──
        kubectl --context financial-ops-eks apply \
          -f /workspace/kyverno/applicationsets/kyverno-install-appset.yaml \
          -f /workspace/kyverno/applicationsets/kyverno-policies-appset.yaml

        kill "${KYVERNO_GIT_PF_PID}" >/dev/null 2>&1 || true
      - kubectl --context financial-ops-eks get applications.argoproj.io -n argocd || true
      - aws eks update-kubeconfig --region ap-northeast-2 --name financial-service-eks --alias financial-service-eks
      - kubectl --context financial-service-eks get deploy,svc,pods -n stock-demo -o wide || true
